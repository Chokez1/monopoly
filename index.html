<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Monopoly Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Space+Mono:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0b0f;
  --s1:#111318;
  --s2:#181a21;
  --s3:#1f212b;
  --s4:#272934;
  --s5:#2f3140;
  --bd:rgba(255,255,255,.05);
  --bd2:rgba(255,255,255,.09);
  --bd3:rgba(255,255,255,.15);
  --tx:#f0f0f8;
  --tx2:#8a89a8;
  --tx3:#4a4968;
  --gold:#d4a017;
  --gold2:#f5c842;
  --gold-bg:rgba(212,160,23,.08);
  --gold-bd:rgba(212,160,23,.2);
  --g:#10b981;--g-bg:rgba(16,185,129,.08);--g-bd:rgba(16,185,129,.2);
  --r:#ef4444;--r-bg:rgba(239,68,68,.08);--r-bd:rgba(239,68,68,.2);
  --am:#f59e0b;--am-bg:rgba(245,158,11,.08);--am-bd:rgba(245,158,11,.2);
  --bl:#3b82f6;--bl-bg:rgba(59,130,246,.08);--bl-bd:rgba(59,130,246,.2);
  --pu:#8b5cf6;--pu-bg:rgba(139,92,246,.08);--pu-bd:rgba(139,92,246,.2);
  --or:#f97316;--or-bg:rgba(249,115,22,.08);--or-bd:rgba(249,115,22,.2);
  --rr:14px;--rs:10px;--rxs:8px;--rpill:999px;
  --ff:'Inter',sans-serif;
  --ffd:'Playfair Display',serif;
  --ffm:'Space Mono',monospace;
  --nh:64px;
  --hh:56px;
  --safe-b:env(safe-area-inset-bottom,0px);
}

html{height:100%;overflow-x:hidden}

body{
  font-family:var(--ff);
  background:var(--bg);
  color:var(--tx);
  min-height:100%;
  overflow-x:hidden;
  overflow-y:auto;
  font-size:15px;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}

/* ═══ SCROLLBAR */
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--s5);border-radius:4px}

/* ═══ LOGIN */
#login-screen{
  position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  padding:20px;z-index:999;
  background:
    radial-gradient(ellipse 80% 60% at 50% -10%,rgba(212,160,23,.1) 0%,transparent 70%),
    radial-gradient(ellipse 50% 40% at 90% 90%,rgba(16,185,129,.06) 0%,transparent 60%),
    var(--bg);
}
.login-wrap{width:100%;max-width:380px}
.login-brand{text-align:center;margin-bottom:32px}
.login-icon{
  width:72px;height:72px;margin:0 auto 16px;border-radius:20px;
  background:linear-gradient(135deg,#1a160a,#2d2510);
  border:1px solid var(--gold-bd);
  display:flex;align-items:center;justify-content:center;font-size:32px;
  box-shadow:0 0 48px rgba(212,160,23,.2),0 12px 32px rgba(0,0,0,.5);
  position:relative;
}
.login-icon::before{
  content:'';position:absolute;inset:0;border-radius:20px;
  background:radial-gradient(circle at 40% 30%,rgba(212,160,23,.15),transparent 60%);
}
.login-h{font-family:var(--ffd);font-size:26px;font-weight:900;letter-spacing:-.5px;color:var(--tx)}
.login-sub{font-size:12px;color:var(--tx3);margin-top:4px;letter-spacing:.5px;text-transform:uppercase;font-weight:500}
.login-card{
  background:var(--s1);
  border:1px solid var(--bd2);
  border-top:1px solid rgba(212,160,23,.15);
  border-radius:20px;
  padding:28px 24px;
  box-shadow:0 32px 80px rgba(0,0,0,.7),0 0 0 1px rgba(255,255,255,.03);
}
.login-tabs{display:flex;background:var(--bg);border:1px solid var(--bd);border-radius:var(--rs);padding:3px;gap:3px;margin-bottom:22px}
.ltab{flex:1;padding:9px;border:none;background:none;color:var(--tx3);font-size:12px;font-family:var(--ff);font-weight:700;border-radius:8px;cursor:pointer;transition:all .15s;letter-spacing:.5px;text-transform:uppercase}
.ltab.active{background:var(--s3);color:var(--tx);box-shadow:0 1px 8px rgba(0,0,0,.5)}
.lfield{margin-bottom:16px}
.lfield label{font-size:10px;color:var(--tx3);display:block;margin-bottom:6px;font-weight:700;letter-spacing:.8px;text-transform:uppercase}
.lfield input{
  width:100%;padding:12px 14px;background:var(--s2);border:1px solid var(--bd2);
  border-radius:var(--rxs);color:var(--tx);font-family:var(--ff);font-size:14px;
  outline:none;transition:border-color .15s,box-shadow .15s;
}
.lfield input:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-bg)}
.login-btn{
  width:100%;padding:14px;
  background:linear-gradient(135deg,#2a1f05,#3d2e07);
  border:1px solid var(--gold-bd);
  color:var(--gold2);border-radius:var(--rxs);font-family:var(--ff);
  font-size:13px;font-weight:700;cursor:pointer;letter-spacing:.8px;text-transform:uppercase;
  transition:all .15s;
  box-shadow:0 4px 20px rgba(212,160,23,.15);margin-top:4px;
}
.login-btn:hover{background:linear-gradient(135deg,#3d2e07,#52400a);box-shadow:0 6px 28px rgba(212,160,23,.25)}
.login-btn:active{transform:scale(.98)}
.login-err{color:var(--r);font-size:12px;text-align:center;margin-top:10px;padding:10px;background:var(--r-bg);border-radius:var(--rxs);border:1px solid var(--r-bd)}

/* ═══ APP SHELL */
#app{display:none;height:100%;flex-direction:column;overflow:hidden}
#app.visible{display:flex}

/* ═══ HEADER */
.hdr{
  height:var(--hh);flex-shrink:0;
  background:rgba(10,11,15,.92);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
  border-bottom:1px solid var(--bd);
  padding:0 16px;
  display:flex;align-items:center;justify-content:space-between;
  position:relative;z-index:50;
}
.hdr::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(212,160,23,.15),transparent);
}
.hdr-left{display:flex;align-items:center;gap:12px}
.hdr-dot{
  width:32px;height:32px;border-radius:10px;flex-shrink:0;
  background:linear-gradient(135deg,#2a1f05,#3d2e07);
  border:1px solid var(--gold-bd);
  display:flex;align-items:center;justify-content:center;font-size:15px;
  box-shadow:0 0 16px rgba(212,160,23,.15);
}
.hdr-name{font-family:var(--ffd);font-size:16px;font-weight:900;letter-spacing:-.3px;line-height:1.1}
.hdr-board{font-size:10px;color:var(--tx3);font-weight:500;margin-top:1px;letter-spacing:.3px}
.hdr-right{display:flex;align-items:center;gap:8px}
.sync-chip{
  display:flex;align-items:center;gap:5px;padding:5px 10px;
  background:var(--s2);border:1px solid var(--bd);border-radius:var(--rpill);
  font-size:10px;color:var(--tx3);font-weight:600;letter-spacing:.3px;
}
.sdot{width:5px;height:5px;border-radius:50%;background:var(--g);flex-shrink:0}
.sdot.off{background:var(--r)}
.sdot.sync{background:var(--am);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.hbtn{
  background:var(--s2);border:1px solid var(--bd2);color:var(--tx2);
  padding:7px 12px;border-radius:var(--rxs);cursor:pointer;font-size:11px;
  font-family:var(--ff);font-weight:600;transition:all .15s;white-space:nowrap;
  letter-spacing:.3px;
}
.hbtn:hover{background:var(--s3);color:var(--tx)}

/* ═══ LAYOUT */
.layout{display:flex;flex:1;overflow:hidden;min-height:0}

/* sidebar — desktop only */
.sidebar{
  display:none;width:210px;flex-shrink:0;
  background:var(--s1);border-right:1px solid var(--bd);
  overflow-y:auto;padding:12px 10px;
}
.snav-section{font-size:9px;color:var(--tx3);font-weight:700;text-transform:uppercase;letter-spacing:1px;padding:4px 10px 8px;margin-top:6px}
.snav-item{
  display:flex;align-items:center;gap:10px;padding:10px 12px;
  border-radius:var(--rs);cursor:pointer;font-size:13px;font-weight:500;
  color:var(--tx2);transition:all .15s;margin-bottom:2px;
  border:1px solid transparent;background:none;width:100%;font-family:var(--ff);text-align:left;
}
.snav-item.active{
  background:var(--gold-bg);color:var(--gold2);font-weight:600;
  border-color:var(--gold-bd);
}
.snav-item:hover:not(.active){background:var(--s2);color:var(--tx)}
.snav-icon{font-size:14px;width:18px;text-align:center;flex-shrink:0}

/* main scroll area */
.main{flex:1;overflow-y:auto;overflow-x:hidden}
.content{padding:16px;max-width:820px;margin:0 auto;padding-bottom:calc(var(--nh) + 24px + var(--safe-b))}

/* ═══ BOTTOM NAV (mobile) */
.bnav{
  position:fixed;bottom:0;left:0;right:0;
  height:calc(var(--nh) + var(--safe-b));
  padding-bottom:var(--safe-b);
  background:rgba(10,11,15,.97);backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);
  border-top:1px solid var(--bd);
  display:flex;align-items:stretch;z-index:50;padding-left:2px;padding-right:2px;
}
.bni{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;cursor:pointer;border:none;background:none;
  color:var(--tx3);font-family:var(--ff);font-size:9px;font-weight:600;
  letter-spacing:.3px;text-transform:uppercase;padding:6px 2px;
  border-radius:var(--rs);transition:color .15s;position:relative;
}
.bni.active{color:var(--gold2)}
.bni-icon{font-size:18px;line-height:1;transition:transform .2s cubic-bezier(.34,1.56,.64,1)}
.bni.active .bni-icon{transform:scale(1.18)}
.bni::after{
  content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  width:0;height:2px;background:var(--gold);
  border-radius:2px 2px 0 0;transition:width .2s;
}
.bni.active::after{width:24px}

/* ═══ FAB */
.fab{
  position:fixed;bottom:calc(var(--nh) + 14px + var(--safe-b));right:16px;
  width:52px;height:52px;border-radius:50%;
  background:linear-gradient(135deg,#2a1f05,#3d2e07);
  border:1px solid var(--gold-bd);
  color:var(--gold2);border:1px solid var(--gold-bd);font-size:24px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 24px rgba(212,160,23,.25),0 8px 32px rgba(0,0,0,.5);z-index:40;
  transition:transform .2s cubic-bezier(.34,1.56,.64,1),box-shadow .15s;
}
.fab:hover{transform:scale(1.1);box-shadow:0 8px 36px rgba(212,160,23,.35)}
.fab:active{transform:scale(.92)}

/* ═══ CARDS */
.card{
  background:var(--s1);border:1px solid var(--bd);border-radius:var(--rr);
  padding:16px;margin-bottom:12px;
}
.ct{
  font-size:9px;color:var(--tx3);margin-bottom:12px;font-weight:700;
  text-transform:uppercase;letter-spacing:1px;font-family:var(--ff);
}

/* ═══ BUTTONS */
.btn{
  padding:9px 14px;border-radius:var(--rxs);border:1px solid var(--bd2);
  background:var(--s2);color:var(--tx);cursor:pointer;font-size:12px;
  font-weight:600;font-family:var(--ff);transition:all .12s;
  display:inline-flex;align-items:center;gap:5px;white-space:nowrap;
  letter-spacing:.2px;
}
.btn:hover{background:var(--s3);border-color:var(--bd3)}
.btn:active{transform:scale(.96)}
.btn.pri{
  background:linear-gradient(135deg,#2a1f05,#3d2e07);
  color:var(--gold2);border-color:var(--gold-bd);
  box-shadow:0 2px 12px rgba(212,160,23,.15);
}
.btn.pri:hover{box-shadow:0 4px 20px rgba(212,160,23,.25)}
.btn.suc{background:var(--g-bg);color:var(--g);border-color:var(--g-bd)}
.btn.dan{background:var(--r-bg);color:var(--r);border-color:var(--r-bd)}
.btn.amb{background:var(--am-bg);color:var(--am);border-color:var(--am-bd)}
.btn.blu{background:var(--bl-bg);color:var(--bl);border-color:var(--bl-bd)}
.btn.pur{background:var(--pu-bg);color:var(--pu);border-color:var(--pu-bd)}
.btn.orn{background:var(--or-bg);color:var(--or);border-color:var(--or-bd)}
.btn.sm{padding:6px 10px;font-size:11px}
.btn.lg{padding:13px 18px;font-size:13px;width:100%;justify-content:center;border-radius:var(--rs)}
.btn:disabled{opacity:.25;cursor:not-allowed;transform:none;pointer-events:none}

/* ═══ INPUTS */
input,select,textarea{
  width:100%;padding:10px 12px;border:1px solid var(--bd2);border-radius:var(--rxs);
  background:var(--s2);color:var(--tx);font-size:13px;outline:none;
  font-family:var(--ff);transition:border-color .15s,box-shadow .15s;
  -webkit-appearance:none;-moz-appearance:none;appearance:none;
}
input:focus,select:focus,textarea:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-bg)}
select option{background:var(--s2)}
.fr{margin-bottom:14px}
.fr label{font-size:10px;color:var(--tx3);display:block;margin-bottom:5px;font-weight:700;text-transform:uppercase;letter-spacing:.7px}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* ═══ MODAL */
.moverlay{
  position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);display:flex;align-items:flex-end;
  justify-content:center;z-index:200;animation:fIn .15s ease;
}
@keyframes fIn{from{opacity:0}to{opacity:1}}
.modal{
  background:var(--s1);
  border:1px solid var(--bd2);
  border-top:1px solid rgba(212,160,23,.12);
  border-radius:22px 22px 0 0;
  padding:22px 20px;width:100%;max-height:92vh;overflow-y:auto;
  animation:sUp .22s cubic-bezier(.4,0,.2,1);
  padding-bottom:calc(22px + var(--safe-b));
}
@keyframes sUp{from{transform:translateY(24px);opacity:0}to{transform:translateY(0);opacity:1}}
.mhandle{width:36px;height:3px;background:var(--s5);border-radius:99px;margin:0 auto 20px;display:block}
.mtitle{font-family:var(--ffd);font-size:20px;font-weight:900;margin-bottom:18px;letter-spacing:-.4px;color:var(--tx)}
.mclose{
  float:right;background:var(--s3);border:1px solid var(--bd);
  font-size:12px;cursor:pointer;color:var(--tx2);
  width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--ff);line-height:1;
}
.mclose:hover{background:var(--s4);color:var(--tx)}

/* desktop modal center */
@media(min-width:768px){
  .moverlay{align-items:center}
  .modal{border-radius:var(--rr);max-width:480px;padding:28px 24px;border:1px solid var(--bd2)}
}

/* ═══ PLAYER CARDS */
.pcard{
  background:var(--s1);border:1px solid var(--bd);border-radius:var(--rr);
  padding:16px;margin-bottom:12px;position:relative;overflow:hidden;
  transition:border-color .15s,box-shadow .15s;
}
.pcard::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:var(--tc,var(--gold));border-radius:0;
}
.pcard:hover{border-color:var(--bd2);box-shadow:0 4px 24px rgba(0,0,0,.3)}
.pn{font-family:var(--ffd);font-size:18px;font-weight:900;letter-spacing:-.3px}
.pb{font-size:28px;font-weight:700;letter-spacing:-.5px;margin:2px 0 6px;font-family:var(--ffm);color:var(--tx)}
.agrid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:12px}
.abtn{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:10px 4px;background:var(--s2);border:1px solid var(--bd);
  border-radius:var(--rs);cursor:pointer;font-family:var(--ff);
  font-size:10px;font-weight:700;color:var(--tx2);letter-spacing:.3px;
  text-transform:uppercase;transition:all .12s;
}
.abtn:hover{background:var(--s3);color:var(--tx);border-color:var(--bd2)}
.abtn:active{transform:scale(.95)}
.abtn .ai{font-size:17px}
.abtn.suc{background:var(--g-bg);color:var(--g);border-color:var(--g-bd)}
.abtn.dan{background:var(--r-bg);color:var(--r);border-color:var(--r-bd)}
.abtn.amb{background:var(--am-bg);color:var(--am);border-color:var(--am-bd)}
.abtn.blu{background:var(--bl-bg);color:var(--bl);border-color:var(--bl-bd)}
.abtn.orn{background:var(--or-bg);color:var(--or);border-color:var(--or-bd)}
.abtn.pur{background:var(--pu-bg);color:var(--pu);border-color:var(--pu-bd)}

/* ═══ LEADERBOARD */
.lbcard{background:var(--s1);border:1px solid var(--bd);border-radius:var(--rr);overflow:hidden;margin-bottom:12px}
.lbrow{display:flex;align-items:center;padding:14px 16px;border-bottom:1px solid var(--bd);gap:12px;transition:background .1s}
.lbrow:last-child{border-bottom:none}
.lbrow:hover{background:var(--s2)}
.lbrank{font-family:var(--ffd);font-size:18px;font-weight:900;color:var(--tx3);width:32px;text-align:center;flex-shrink:0}
.lbrank.g1{color:var(--gold2)}
.lbrank.g2{color:#94a3b8}
.lbrank.g3{color:#c07a3a}
.lb-bar-wrap{height:2px;background:var(--s4);border-radius:99px;margin-top:8px;overflow:hidden}
.lb-bar{height:100%;border-radius:99px;transition:width .6s cubic-bezier(.4,0,.2,1)}

/* ═══ PROPERTY ROWS */
.prow{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px;border:1px solid var(--bd);border-radius:var(--rs);
  margin-bottom:7px;background:var(--s1);gap:9px;transition:border-color .15s;
}
.prow:hover{border-color:var(--bd2)}
.prow.mort{border-color:var(--am-bd);background:rgba(245,158,11,.03)}
.pleft{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.cbar{width:3px;border-radius:2px;flex-shrink:0}
.pname{font-size:13px;font-weight:600}
.pmeta{font-size:11px;color:var(--tx3);margin-top:2px}
.badge{
  display:inline-flex;align-items:center;gap:3px;padding:4px 8px;
  border-radius:var(--rpill);font-size:10px;font-weight:700;border:1px solid;
  letter-spacing:.3px;text-transform:uppercase;
}
.badge.owned{background:var(--g-bg);color:var(--g);border-color:var(--g-bd)}
.badge.free{background:var(--s2);color:var(--tx3);border-color:var(--bd)}
.badge.mortg{background:var(--am-bg);color:var(--am);border-color:var(--am-bd)}
.badge.bank{background:var(--bl-bg);color:var(--bl);border-color:var(--bl-bd)}
.badge.auct{background:var(--pu-bg);color:var(--pu);border-color:var(--pu-bd)}

/* ═══ TRANSACTIONS */
.trow{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--bd);gap:10px}
.trow:last-child{border-bottom:none}
.tico{
  width:36px;height:36px;border-radius:10px;background:var(--s2);
  border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;
  font-size:14px;flex-shrink:0;
}

/* ═══ STATS */
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.sbox{
  background:var(--s2);border-radius:var(--rs);padding:14px;text-align:center;
  border:1px solid var(--bd);
}
.snum{font-family:var(--ffm);font-size:22px;font-weight:700;letter-spacing:-.5px}
.slbl{font-size:9px;color:var(--tx3);margin-top:4px;font-weight:700;text-transform:uppercase;letter-spacing:.8px}

/* ═══ OVERVIEW / BANK TAB */
.economy-card{
  background:linear-gradient(135deg,rgba(212,160,23,.08),rgba(212,160,23,.03));
  border:1px solid var(--gold-bd);border-radius:var(--rr);padding:20px;margin-bottom:12px;
  position:relative;overflow:hidden;
}
.economy-card::before{
  content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;
  border-radius:50%;background:radial-gradient(circle,rgba(212,160,23,.07),transparent 70%);
}
.eco-title{font-size:9px;color:var(--gold2);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.eco-val{font-family:var(--ffm);font-size:32px;font-weight:700;letter-spacing:-1px;color:var(--tx)}
.eco-sub{font-size:11px;color:var(--tx3);margin-top:4px}
.bank-hero{
  background:linear-gradient(135deg,rgba(16,185,129,.08),rgba(16,185,129,.03));
  border:1px solid var(--g-bd);border-radius:var(--rr);padding:18px;margin-bottom:12px;
}
.ownership-row{
  display:flex;align-items:center;gap:12px;padding:12px 14px;
  border-bottom:1px solid var(--bd);
}
.ownership-row:last-child{border-bottom:none}
.ow-bar-bg{flex:1;height:4px;background:var(--s3);border-radius:99px;overflow:hidden}
.ow-bar{height:100%;border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1)}

/* ═══ SEARCH */
.swrap{position:relative;margin-bottom:14px}
.swrap input{padding-left:38px;background:var(--s1);border-radius:var(--rs)}
.sicon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--tx3);font-size:13px;pointer-events:none}

/* ═══ SETTINGS */
.admin-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.adm-btn{
  background:var(--s2);border:1px solid var(--bd);border-radius:var(--rs);
  padding:14px;cursor:pointer;transition:all .12s;text-align:left;
  font-family:var(--ff);display:flex;flex-direction:column;gap:3px;
}
.adm-btn:hover{background:var(--s3);border-color:var(--bd2)}
.adm-icon{font-size:20px;margin-bottom:4px}
.adm-lbl{font-size:12px;font-weight:700;color:var(--tx);font-family:var(--ff)}
.adm-sub{font-size:10px;color:var(--tx3);line-height:1.5}
.sep{height:1px;background:var(--bd);margin:14px 0}

/* ═══ INFO BOXES */
.info{padding:10px 13px;font-size:12px;color:var(--tx3);line-height:1.7;margin-bottom:12px;border-radius:var(--rxs);border:1px solid var(--bd)}
.info.amb{border-color:var(--am-bd);background:var(--am-bg);color:var(--am)}
.info.blu{border-color:var(--bl-bd);background:var(--bl-bg);color:var(--bl)}
.info.red{border-color:var(--r-bd);background:var(--r-bg);color:var(--r)}
.info.grn{border-color:var(--g-bd);background:var(--g-bg);color:var(--g)}

/* ═══ MISC */
.empty{text-align:center;color:var(--tx3);padding:52px 20px;font-size:13px;line-height:1.8}
.empty-icon{font-size:44px;margin-bottom:14px;display:block}
.gh{
  font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;
  color:var(--tx3);margin:20px 0 8px;padding:0 2px;font-family:var(--ff);
}
.divider{height:1px;background:var(--bd);margin:14px 0}
.page-title{
  font-family:var(--ffd);font-size:24px;font-weight:900;letter-spacing:-.5px;
  margin-bottom:16px;color:var(--tx);
}
.cdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;display:inline-block}
.pchip{
  display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:var(--rpill);
  font-size:10px;border:1px solid var(--bd);background:var(--s2);color:var(--tx2);font-weight:500;
}
.pchip.mort{border-color:var(--am-bd);background:var(--am-bg);color:var(--am)}

/* ═══ AUCTION */
.bid-row{display:flex;gap:8px;align-items:center;padding:10px 12px;background:var(--s2);border-radius:var(--rs);margin-bottom:6px;border:1px solid var(--bd)}

/* ═══ TOASTS */
#toast-cnt{
  position:fixed;bottom:calc(var(--nh) + 12px + var(--safe-b));
  left:50%;transform:translateX(-50%);
  z-index:999;display:flex;flex-direction:column;align-items:center;
  gap:6px;pointer-events:none;width:calc(100% - 32px);max-width:360px;
}
.toast{
  background:var(--s4);border:1px solid var(--bd2);color:var(--tx);
  padding:10px 18px;border-radius:var(--rpill);font-size:12px;font-weight:600;
  box-shadow:0 8px 32px rgba(0,0,0,.7);animation:tIn .22s cubic-bezier(.4,0,.2,1);
  white-space:nowrap;max-width:100%;overflow:hidden;text-overflow:ellipsis;
  letter-spacing:.2px;
}
.toast.suc{background:rgba(16,185,129,.15);color:var(--g);border-color:var(--g-bd)}
.toast.err{background:rgba(239,68,68,.15);color:var(--r);border-color:var(--r-bd)}
.toast.amb{background:rgba(245,158,11,.15);color:var(--am);border-color:var(--am-bd)}
@keyframes tIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ═══ DESKTOP BREAKPOINT */
@media(min-width:768px){
  :root{--nh:0px}
  .bnav{display:none}
  .sidebar{display:block}
  .fab{bottom:22px}
  #toast-cnt{bottom:20px}
  .content{padding-bottom:24px}
}

/* ═══ COLOR SWATCHES */
.cswatch{width:32px;height:32px;border-radius:50%;cursor:pointer;transition:all .15s;border:2px solid transparent}
.cswatch.sel{box-shadow:0 0 0 3px var(--gold),0 0 0 5px var(--bg)}
.cswatch:hover{transform:scale(1.1)}

/* ═══ MONOSPACE AMOUNTS */
.mono{font-family:var(--ffm);letter-spacing:-.5px}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-wrap">
    <div class="login-brand">
      <div class="login-icon">🎲</div>
      <div class="login-h">Monopoly Tracker</div>
      <div class="login-sub">Real-time game management</div>
    </div>
    <div class="login-card">
      <div class="login-tabs">
        <button class="ltab active" id="ltab-login" onclick="switchLTab('login')">Sign In</button>
        <button class="ltab" id="ltab-register" onclick="switchLTab('register')">Register</button>
      </div>
      <div class="lfield"><label>Username</label><input type="text" id="l-user" autocomplete="username" placeholder="your username"></div>
      <div class="lfield"><label>Password</label><input type="password" id="l-pass" autocomplete="current-password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <button class="login-btn" onclick="doLogin()">Continue →</button>
      <div id="login-err"></div>
    </div>
  </div>
</div>

<div id="app">
  <div class="hdr">
    <div class="hdr-left">
      <div class="hdr-dot">🎲</div>
      <div>
        <div class="hdr-name">Monopoly</div>
        <div class="hdr-board" id="hdr-board">Loading…</div>
      </div>
    </div>
    <div class="hdr-right">
      <div class="sync-chip"><div class="sdot" id="sdot"></div><span id="sync-lbl">Live</span></div>
      <button class="hbtn" onclick="doLogout()">Sign out</button>
    </div>
  </div>

  <div class="layout">
    <div class="sidebar" id="sidebar">
      <div class="snav-section">Main</div>
      <button class="snav-item active" id="sn-home" onclick="setTab('home')"><span class="snav-icon">🏠</span>Overview</button>
      <button class="snav-item" id="sn-teams" onclick="setTab('teams')"><span class="snav-icon">👥</span>Players</button>
      <button class="snav-item" id="sn-properties" onclick="setTab('properties')"><span class="snav-icon">🏘️</span>Properties</button>
      <button class="snav-item" id="sn-leaderboard" onclick="setTab('leaderboard')"><span class="snav-icon">🏆</span>Leaderboard</button>
      <div class="snav-section">Finance</div>
      <button class="snav-item" id="sn-bank" onclick="setTab('bank')"><span class="snav-icon">🏦</span>Bank</button>
      <button class="snav-item" id="sn-transactions" onclick="setTab('transactions')"><span class="snav-icon">💸</span>Ledger</button>
      <div style="height:1px;background:var(--bd);margin:10px 6px"></div>
      <button class="snav-item" id="sn-settings" onclick="setTab('settings')"><span class="snav-icon">⚙️</span>Settings</button>
    </div>

    <div class="main" id="main-scroll">
      <div class="content" id="content"></div>
    </div>
  </div>

  <nav class="bnav">
    <button class="bni active" id="bn-home" onclick="setTab('home')"><span class="bni-icon">🏠</span>Home</button>
    <button class="bni" id="bn-teams" onclick="setTab('teams')"><span class="bni-icon">👥</span>Players</button>
    <button class="bni" id="bn-properties" onclick="setTab('properties')"><span class="bni-icon">🏘️</span>Props</button>
    <button class="bni" id="bn-leaderboard" onclick="setTab('leaderboard')"><span class="bni-icon">🏆</span>Board</button>
    <button class="bni" id="bn-bank" onclick="setTab('bank')"><span class="bni-icon">🏦</span>Bank</button>
    <button class="bni" id="bn-settings" onclick="setTab('settings')"><span class="bni-icon">⚙️</span>Settings</button>
  </nav>
</div>

<button class="fab" id="fab" onclick="onFab()" style="display:none">＋</button>
<div id="toast-cnt"></div>
<div id="modal-root"></div>

<script>
function updatePropSearch(v){
  state.propSearch = v;
  render();
  requestAnimationFrame(()=>{
    const el = document.getElementById('prop-search');
    if(el){
      el.focus();
      el.setSelectionRange(v.length, v.length);
    }
  });
}
// ══════════════════════════════════════════════════════════
// CONSTANTS
// ══════════════════════════════════════════════════════════
const COLORS=['#ef4444','#f97316','#eab308','#22c55e','#14b8a6','#3b82f6','#8b5cf6','#ec4899','#06b6d4','#84cc16','#f43f5e','#a78bfa'];
const API='';
let token=localStorage.getItem('mt_token')||'';

// ══════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════
let state={
  board:{name:'My Monopoly Board',startMoney:1500,bankBalance:2000,goSalary:200},
  teams:[],properties:[],transactions:[],
  activeTab:'home',modal:null,propSearch:'',txPage:0
};
let saveTimer=null;
let es=null;

// ══════════════════════════════════════════════════════════
// AUTH
// ══════════════════════════════════════════════════════════
function switchLTab(t){
  document.querySelectorAll('.ltab').forEach(x=>x.classList.remove('active'));
  document.getElementById('ltab-'+t).classList.add('active');
  document.getElementById('l-pass').autocomplete=t==='login'?'current-password':'new-password';
}
async function doLogin(){
  const tab=document.getElementById('ltab-login').classList.contains('active')?'login':'register';
  const user=document.getElementById('l-user').value.trim();
  const pass=document.getElementById('l-pass').value;
  const errEl=document.getElementById('login-err');
  errEl.innerHTML='';
  if(!user||!pass){errEl.innerHTML='<div class="login-err">Fill all fields</div>';return;}
  try{
    const r=await fetch(`${API}/api/${tab}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:user,password:pass})});
    const d=await r.json();
    if(!r.ok){errEl.innerHTML=`<div class="login-err">${d.error||'Error'}</div>`;return;}
    token=d.token;localStorage.setItem('mt_token',token);
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').classList.add('visible');
    await loadState();
    connectSSE();
  }catch(e){errEl.innerHTML='<div class="login-err">Connection error</div>';}
}
async function doLogout(){
  try{await fetch(`${API}/api/logout`,{method:'POST',headers:{Authorization:'Bearer '+token}});}catch(e){}
  token='';localStorage.removeItem('mt_token');
  location.reload();
}

// ══════════════════════════════════════════════════════════
// SERVER SYNC
// ══════════════════════════════════════════════════════════
function setSyncStatus(s){
  const dot=document.getElementById('sdot');
  const lbl=document.getElementById('sync-lbl');
  if(!dot)return;
  dot.className='sdot'+(s==='off'?' off':s==='sync'?' sync':'');
  lbl.textContent=s==='off'?'Offline':s==='sync'?'Syncing':'Live';
}
async function loadState(){
  try{
    const r=await fetch(`${API}/api/state`,{headers:{Authorization:'Bearer '+token}});
    if(r.status===401){doLogout();return;}
    const d=await r.json();
    mergeServerState(d);render();
  }catch(e){setSyncStatus('off');}
}
function mergeServerState(d){
  if(!d)return;
  state.board={...state.board,...(d.board||{})};
  if(!state.board.goSalary)state.board.goSalary=200;
  state.teams=d.teams||[];
  state.properties=d.properties||[];
  state.transactions=d.transactions||[];
  document.getElementById('hdr-board').textContent=state.board.name||'Game';
}
function schedSave(){
  setSyncStatus('sync');
  clearTimeout(saveTimer);
  saveTimer=setTimeout(pushState,600);
}
async function pushState(){
  try{
    await fetch(`${API}/api/state`,{method:'POST',headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify({board:state.board,teams:state.teams,properties:state.properties,transactions:state.transactions})});
    setSyncStatus('live');
  }catch(e){setSyncStatus('off');}
}
function connectSSE(){
  if(es)es.close();
  es=new EventSource(`${API}/api/events?token=${token}`);
  es.addEventListener('stateUpdate',e=>{
    const d=JSON.parse(e.data);
    const wasModal=state.modal;
    mergeServerState(d);
    if(wasModal)state.modal=wasModal;
    render();
  });
  es.onopen=()=>setSyncStatus('live');
  es.onerror=()=>{setSyncStatus('off');setTimeout(connectSSE,5000);};
}

// ══════════════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════════════
function render(){
  const c=document.getElementById('content');
  if(!c)return;
  ['home','teams','properties','leaderboard','bank','transactions','settings'].forEach(t=>{
    const bn=document.getElementById('bn-'+t);
    const sn=document.getElementById('sn-'+t);
    if(bn)bn.classList.toggle('active',state.activeTab===t);
    if(sn)sn.classList.toggle('active',state.activeTab===t);
  });
  const fab=document.getElementById('fab');
  if(fab)fab.style.display=(state.activeTab==='teams'||state.activeTab==='properties')?'flex':'none';
  switch(state.activeTab){
    case'home':c.innerHTML=homeHTML();break;
    case'teams':c.innerHTML=teamsHTML();break;
    case'properties':c.innerHTML=propsHTML();break;
    case'leaderboard':c.innerHTML=leaderboardHTML();break;
    case'bank':c.innerHTML=bankHTML();break;
    case'transactions':c.innerHTML=transHTML();break;
    case'settings':c.innerHTML=settingsHTML();break;
  }
  document.getElementById('modal-root').innerHTML=modalHTML();
}

// ══════════════════════════════════════════════════════════
// HOME
// ══════════════════════════════════════════════════════════
function homeHTML(){
  const totalCash=state.teams.reduce((s,t)=>s+t.balance,0);
  const totalPropVal=state.properties.reduce((s,p)=>s+getPropValue(p),0);
  const bankProps=state.properties.filter(p=>!p.ownedBy&&!p.mortgaged);
  const totalMoney=totalCash+state.board.bankBalance+totalPropVal;
  return`<div>
    <div class="page-title">Overview</div>
    <div class="economy-card">
      <div class="eco-title">Total Economy</div>
      <div class="eco-val">₹${num(totalMoney)}</div>
      <div class="eco-sub">Cash in play + Bank reserves + All property values</div>
    </div>
    <div class="sgrid">
      <div class="sbox">
        <div class="snum" style="color:var(--gold2)">₹${num(state.board.bankBalance)}</div>
        <div class="slbl">🏦 Bank</div>
      </div>
      <div class="sbox">
        <div class="snum" style="color:var(--g)">₹${num(totalCash)}</div>
        <div class="slbl">💰 Player Cash</div>
      </div>
      <div class="sbox">
        <div class="snum">${state.teams.length}</div>
        <div class="slbl">👥 Players</div>
      </div>
      <div class="sbox">
        <div class="snum">${state.properties.filter(p=>p.ownedBy).length}/${state.properties.length}</div>
        <div class="slbl">🏘️ Owned Props</div>
      </div>
    </div>
    ${bankProps.length?`<div class="card">
      <div class="ct">🏦 Available to Buy / Auction</div>
      ${bankProps.slice(0,5).map(p=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--bd)">
        <div style="display:flex;align-items:center;gap:9px">
          <div style="width:3px;height:26px;border-radius:2px;background:${COLORS[p.colorIdx??0]}"></div>
          <div><div style="font-size:13px;font-weight:600">${esc(p.name)}</div><div style="font-size:11px;color:var(--tx3)">₹${num(p.price)} · ${p.rentType==='dice'?`🎲 ×${p.diceMultiplier||4} dice`:`Rent ₹${num(getActiveRent(p))}`}</div></div>
        </div>
        <div style="display:flex;gap:5px">
          <button class="btn sm suc" onclick="setTab('properties');setTimeout(()=>openBuyProp('${p.id}'),50)">Buy</button>
          <button class="btn sm pur" onclick="setTab('properties');setTimeout(()=>openAuctionForProp('${p.id}'),50)">🔨</button>
        </div>
      </div>`).join('')}
      ${bankProps.length>5?`<div style="font-size:11px;color:var(--tx3);text-align:center;margin-top:10px">+${bankProps.length-5} more in Properties tab</div>`:''}
    </div>`:''}
    <div class="card" style="cursor:pointer" onclick="setTab('leaderboard')">
      <div class="ct">🏆 Standings</div>
      ${state.teams.length?[...state.teams].sort((a,b)=>{
        const av=state.properties.filter(p=>p.ownedBy===a.id).reduce((s,p)=>s+getPropValue(p),0);
        const bv=state.properties.filter(p=>p.ownedBy===b.id).reduce((s,p)=>s+getPropValue(p),0);
        return(b.balance+bv)-(a.balance+av);
      }).map((t,i)=>{
        const tv=state.properties.filter(p=>p.ownedBy===t.id).reduce((s,p)=>s+getPropValue(p),0);
        return`<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--bd)${i===state.teams.length-1?';border:none':''}">
          <span style="font-family:var(--ffd);font-weight:900;color:${i===0?'var(--gold2)':i===1?'#94a3b8':i===2?'#c07a3a':'var(--tx3)'};font-size:15px;width:22px">#${i+1}</span>
          <div style="width:7px;height:7px;border-radius:50%;background:${t.color};flex-shrink:0"></div>
          <div style="flex:1;font-weight:600;font-size:13px">${esc(t.name)}</div>
          <div style="font-weight:700;color:${t.color};font-family:var(--ffm);font-size:14px">₹${num(t.balance+tv)}</div>
        </div>`;
      }).join(''):`<div style="color:var(--tx3);font-size:13px;padding:8px 0">No players yet</div>`}
      <div style="font-size:11px;color:var(--gold2);margin-top:10px;text-align:center;opacity:.8">View full leaderboard →</div>
    </div>
  </div>`;
}

// ══════════════════════════════════════════════════════════
// TEAMS
// ══════════════════════════════════════════════════════════
function teamsHTML(){
  if(!state.teams.length)return`<div class="empty"><span class="empty-icon">👥</span>No players yet.<br>Tap ＋ to add one.</div>`;
  return`<div>
    <div class="page-title">Players</div>
    ${state.teams.map(t=>{
      const props=state.properties.filter(p=>p.ownedBy===t.id);
      const propVal=props.reduce((s,p)=>s+getPropValue(p),0);
      const netWorth=t.balance+propVal;
      return`<div class="pcard" style="--tc:${t.color}">
        <div style="display:flex;align-items:flex-start;justify-content:space-between">
          <div>
            <div class="pn" style="color:${t.color}">${esc(t.name)}</div>
            <div class="pb">₹${num(t.balance)}</div>
            <div style="font-size:11px;color:var(--tx3)">Net worth: <strong style="color:var(--tx2);font-family:var(--ffm)">₹${num(netWorth)}</strong> · ${props.length} props</div>
          </div>
          <div style="display:flex;gap:5px">
            <button class="btn sm" onclick="editTeam('${t.id}')">✏️</button>
            <button class="btn sm dan" onclick="deleteTeam('${t.id}')">🗑️</button>
          </div>
        </div>
        ${props.length?`<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:10px">${props.map(p=>`<span class="${p.mortgaged?'pchip mort':'pchip'}"><span class="cdot" style="background:${COLORS[p.colorIdx??0]}"></span>${esc(p.name)}${p.mortgaged?' 🔒':''}${p.houses?' '+'🏠'.repeat(p.houses):''}</span>`).join('')}</div>`:''}
        <div class="agrid">
          <button class="abtn suc" onclick="openTransact('${t.id}','credit')"><span class="ai">💚</span>Credit</button>
          <button class="abtn dan" onclick="openTransact('${t.id}','debit')"><span class="ai">🔴</span>Debit</button>
          <button class="abtn blu" onclick="passGo('${t.id}')"><span class="ai">🚀</span>Pass GO</button>
          <button class="abtn amb" onclick="openMortgage('${t.id}')"><span class="ai">🔒</span>Mortgage</button>
          <button class="abtn orn" onclick="openRent('${t.id}')"><span class="ai">💸</span>Pay Rent</button>
          <button class="abtn dan" onclick="declareBankruptcy('${t.id}')"><span class="ai">💀</span>Bankrupt</button>
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

// ══════════════════════════════════════════════════════════
// PROPERTIES
// ══════════════════════════════════════════════════════════
function propsHTML(){
  const q=(state.propSearch||'').toLowerCase();
  let props=[...state.properties];
  if(q)props=props.filter(p=>p.name.toLowerCase().includes(q)||(p.group||'').toLowerCase().includes(q));
  const groups=[...new Set(props.map(p=>p.group||''))];
  return`<div>
    <div class="page-title">Properties</div>
    <div class="swrap"><span class="sicon">🔍</span><input type="text" id="prop-search" placeholder="Search properties…" value="${esc(state.propSearch||'')}" oninput="updatePropSearch(this.value)"></div>
    ${!props.length?`<div class="empty"><span class="empty-icon">🏘️</span>No properties found.</div>`:''}
    ${groups.map(g=>{
      const gprops=props.filter(p=>(p.group||'')=== g);
      return`${g?`<div class="gh">${esc(g)}</div>`:''}
      ${gprops.map(p=>{
        const owner=state.teams.find(t=>t.id===p.ownedBy);
        const houseStr = p.houses ? ' ' + '🏠'.repeat(p.houses) : '';
        const canBuild = p.ownedBy && !p.mortgaged && p.rentType !== 'dice' && (p.houses||0) < 3 && p.housePrice > 0;
        return`<div class="prow${p.mortgaged?' mort':''}">

              <div class="pmeta">₹${num(p.price)} · ${p.rentType==='dice'?`🎲 ×${p.diceMultiplier||4} dice`:`Rent ₹${num(getActiveRent(p))}`}${houseStr}${owner?` · <span style="color:${owner.color}">${esc(owner.name)}</span>`:''}</div>
            </div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px">
            <span class="badge ${p.ownedBy?(p.mortgaged?'mortg':'owned'):'bank'}">${p.ownedBy?(p.mortgaged?'Mortgaged':owner?.name||'Owned'):'Bank'}</span>
            <div style="display:flex;gap:4px">
              ${!p.ownedBy?`<button class="btn sm suc" onclick="openBuyProp('${p.id}')">Buy</button><button class="btn sm pur" onclick="openAuctionForProp('${p.id}')">🔨</button>`:''}
              ${canBuild ? `<button class="btn sm suc" onclick="buildHouse('${p.id}')">Build 🏠 (₹${num(p.housePrice)})</button>` : ''}
              ${(p.houses||0) > 0 ? `<button class="btn sm amb" onclick="sellHouse('${p.id}')">Sell 🏠 (₹${num(Math.floor((p.housePrice||0)/2))})</button>` : ''}
              <button class="btn sm" onclick="openEditProp('${p.id}')">✏️</button>
              <button class="btn sm dan" onclick="deleteProp('${p.id}')">🗑️</button>
            </div>
          </div>
        </div>`;
      }).join('')}`;
    }).join('')}
  </div>`;
}

// ══════════════════════════════════════════════════════════
// LEADERBOARD
// ══════════════════════════════════════════════════════════
function leaderboardHTML(){
  const sorted=[...state.teams].sort((a,b)=>{
    const av=state.properties.filter(p=>p.ownedBy===a.id).reduce((s,p)=>s+getPropValue(p),0);
    const bv=state.properties.filter(p=>p.ownedBy===b.id).reduce((s,p)=>s+getPropValue(p),0);
    return(b.balance+bv)-(a.balance+av);
  });
  if(!sorted.length)return`<div class="empty"><span class="empty-icon">🏆</span>No players yet.</div>`;
  const max=sorted.length?((sorted[0].balance)+(state.properties.filter(p=>p.ownedBy===sorted[0].id).reduce((s,p)=>s+getPropValue(p),0))||1):1;

  let html = `<div><div class="page-title">Leaderboard</div>`;

  if (sorted.length >= 2) {
     html += `<div style="display:flex;align-items:flex-end;justify-content:center;gap:10px;margin-bottom:20px;padding:20px 0;">`;
     if(sorted[1]) html += podiumCard(sorted[1], 2, '#94a3b8', 100);
     if(sorted[0]) html += podiumCard(sorted[0], 1, 'var(--gold2)', 130);
     if(sorted[2]) html += podiumCard(sorted[2], 3, '#c07a3a', 80);
     html += `</div>`;
  }

  html += `<div class="lbcard">`;
  html += sorted.map((t,i)=>{
    const propsOwned = state.properties.filter(p=>p.ownedBy===t.id);
    const tv=propsOwned.reduce((s,p)=>s+getPropValue(p),0);
    const totalHouses = propsOwned.reduce((s,p)=>s+(p.houses||0),0);
    const nw=t.balance+tv;
    const pct=Math.round((nw/max)*100);
    const rk=i===0?'g1':i===1?'g2':i===2?'g3':'';
    return`<div class="lbrow">
      <div class="lbrank ${rk}">${i===0?'👑':i===1?'🥈':i===2?'🥉':`#${i+1}`}</div>
      <div style="width:12px;height:12px;border-radius:50%;background:${t.color};flex-shrink:0;box-shadow:0 0 8px ${t.color}80"></div>
      <div style="flex:1;min-width:0">
        <div style="font-weight:700;font-size:15px;color:var(--tx)">${esc(t.name)}</div>
        <div style="font-size:11px;color:var(--tx3);margin-top:2px;display:flex;gap:8px;flex-wrap:wrap">
          <span>💰 ₹${num(t.balance)}</span>
          <span>🏘️ ${propsOwned.length} (₹${num(tv)})</span>
          ${totalHouses>0 ? `<span>🏠 ${totalHouses}</span>` : ''}
        </div>
        <div class="lb-bar-wrap"><div class="lb-bar" style="width:${pct}%;background:linear-gradient(90deg, ${t.color}40, ${t.color})"></div></div>
      </div>
      <div style="font-family:var(--ffm);font-size:16px;font-weight:700;color:${t.color};flex-shrink:0;text-align:right">
        <div>₹${num(nw)}</div>
        <div style="font-size:9px;color:var(--tx3);text-transform:uppercase;letter-spacing:0.5px;font-family:var(--ff);margin-top:2px">Net Worth</div>
      </div>
    </div>`;
  }).join('');
  html += `</div></div>`;
  return html;
}

function podiumCard(t, rank, color, height) {
   const propsOwned = state.properties.filter(p=>p.ownedBy===t.id);
   const nw = t.balance + propsOwned.reduce((s,p)=>s+getPropValue(p),0);

        <div style="width:42px;height:42px;border-radius:50%;background:var(--s2);border:2px solid ${color};display:flex;align-items:center;justify-content:center;font-size:20px;z-index:2;position:relative">${rank===1?'👑':rank===2?'🥈':'🥉'}</div>

function transHTML(){

  const sorted=[...state.transactions].sort((a,b)=>b.time-a.time);

  const slice=sorted.slice(page*PAGE,(page+1)*PAGE);

  const typeIcon={mortgage:'🔒',unmortgage:'🔓',auction:'🔨',rent:'💸',bankruptcy:'💀',credit:'💚',debit:'🔴',admin:'🔧'};
  return`<div>
    <div class="page-title">Ledger <span style="font-size:15px;color:var(--tx3);font-weight:400">(${sorted.length})</span></div>
    <div class="card">
      ${slice.map(tx=>{
        const team=state.teams.find(t=>t.id===tx.teamId);
        const icon=typeIcon[tx.type]||'💱';
        return`<div class="trow">
          <div class="tico">${icon}</div>
          <div style="flex:1;min-width:0">
            <div style="font-size:11px;font-weight:700;color:${team?.color||(tx.teamId==='bank'?'var(--g)':'var(--tx3)')};margin-bottom:2px">${esc(team?.name||(tx.teamId==='bank'?'Bank':'System'))}</div>
            <div style="font-size:12px;color:var(--tx2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(tx.note||tx.type||'Transaction')}</div>
            <div style="font-size:10px;color:var(--tx3);margin-top:2px">${formatTime(tx.time)}</div>
          </div>
          <div style="font-family:var(--ffm);font-size:14px;font-weight:700;flex-shrink:0;color:${tx.amount>0?'var(--g)':tx.amount<0?'var(--r)':'var(--tx3)'}">${tx.amount!==0?(tx.amount>0?'+':'')+'₹'+num(Math.abs(tx.amount)):'—'}</div>
        </div>`;
      }).join('')}
    </div>
    ${totalPages>1?`<div style="display:flex;gap:8px;justify-content:center;margin-top:8px">
      <button class="btn" onclick="state.txPage=Math.max(0,(state.txPage||0)-1);render()" ${page===0?'disabled':''}>← Prev</button>
      <span style="padding:9px 13px;font-size:12px;color:var(--tx3)">Page ${page+1}/${totalPages}</span>
      <button class="btn" onclick="state.txPage=Math.min(${totalPages-1},(state.txPage||0)+1);render()" ${page>=totalPages-1?'disabled':''}>Next →</button>
    </div>`:''}
  </div>`;
}

    return`<div class="moverlay" onclick="closeBg(event)"><div class="modal">

    <div class="mtitle">${m.type==='addProp'?'Add Property':'Edit Property'}</div>
    <div class="fr"><label>Name</label><input type="text" id="p-name" value="${esc(p.name)}" placeholder="e.g. Marina Beach" autofocus></div>
    <div class="f2">
      <div class="fr"><label>Price (₹)</label><input type="number" id="p-price" value="${p.price}" min="0"></div>
      <div class="fr"><label>Base Rent (₹)</label><input type="number" id="p-rent" value="${p.rent}" min="0"></div>
    </div>
    <div class="fr"><label>Rent Type</label>
      <select id="p-renttype" onchange="
        var v=this.value;
        document.getElementById('p-rent-wrap').style.display=v==='fixed'?'':'none';
        document.getElementById('p-houses-wrap').style.display=v==='fixed'?'':'none';
        document.getElementById('p-mult-wrap').style.display=v==='dice'?'':'none';
      ">
        <option value="fixed" ${(p.rentType||'fixed')==='fixed'?'selected':''}>Fixed Rent (₹)</option>
        <option value="dice" ${p.rentType==='dice'?'selected':''}>Dice Roll × Multiplier</option>
      </select>
    </div>
    <div id="p-rent-wrap" style="${(p.rentType||'fixed')==='fixed'?'':'display:none'}">
      <div class="fr"><label>Fixed Rent Amount (₹)</label><input type="number" id="p-rent2" value="${p.rent}" min="0"></div>
    </div>
    <div id="p-mult-wrap" style="${p.rentType==='dice'?'':'display:none'}">
      <div class="fr"><label>Dice Multiplier (e.g. 4 = 4× dice roll)</label><input type="number" id="p-multiplier" value="${p.diceMultiplier||4}" min="1" max="20"></div>
    </div>
    <div id="p-houses-wrap" style="${(p.rentType||'fixed')==='fixed'?'':'display:none'}">
      <div style="font-size:10px;color:var(--tx3);margin-bottom:8px;font-weight:700;text-transform:uppercase;letter-spacing:.7px">🏠 House Pricing (Optional)</div>
      <div class="f2" style="border:1px solid var(--bd);border-radius:var(--rs);padding:12px;background:var(--s2)">
        <div class="fr"><label>Cost to Build 1 🏠</label><input type="number" id="p-hprice" value="${p.housePrice||0}" min="0"></div>
        <div class="fr"><label>Rent with 1 🏠</label><input type="number" id="p-rent1" value="${p.rent1||0}" min="0"></div>
        <div class="fr"><label>Rent with 2 🏠</label><input type="number" id="p-rent2" value="${p.rent2||0}" min="0"></div>
        <div class="fr"><label>Rent with 3 🏠</label><input type="number" id="p-rent3" value="${p.rent3||0}" min="0"></div>
      </div>
    </div>
    <div class="fr" style="margin-top:14px"><label>Group / Area</label>
      <input type="text" id="p-group" value="${esc(p.group||'')}" placeholder="e.g. Marina" list="gl">
      <datalist id="gl">${groups.map(g=>`<option value="${esc(g)}">`).join('')}</datalist>
    </div>
    <div class="fr"><label>Color</label>
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:8px">
        ${COLORS.map((c,i)=>`<div onclick="pickColorIdx(this,'p-color',${i})" class="cswatch${p.colorIdx===i?' sel':''}" style="background:${c}"></div>`).join('')}
      </div>
      <input type="hidden" id="p-color" value="${p.colorIdx}">
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px">
      <button class="btn pri lg" onclick="${m.type==='addProp'?'saveAddProp()':` saveEditProp('${m.propId}')`}">Save</button>
      <button class="btn lg" onclick="closeModal()">Cancel</button>
    </div>
  </div></div>`;}

  // TRANSACT
  if(m.type==='transact'){
    const team=state.teams.find(t=>t.id===m.teamId);if(!team)return'';
    const isCr=m.subtype==='credit';
    return`<div class="moverlay" onclick="closeBg(event)"><div class="modal">
    <span class="mhandle"></span><button class="mclose" onclick="closeModal()">✕</button>
    <div class="mtitle">${isCr?'💚 Credit':'🔴 Debit'}</div>
    <div style="padding:14px;background:var(--s2);border-radius:var(--rs);border:1px solid var(--bd);margin-bottom:16px">
      <div style="font-size:11px;color:var(--tx3);margin-bottom:2px">Player</div>
      <div style="font-weight:700;color:${team.color};font-size:16px">${esc(team.name)}</div>
      <div style="font-family:var(--ffm);font-size:22px;font-weight:700;margin-top:4px">₹${num(team.balance)}</div>
    </div>
    ${isCr?`<div class="info grn" style="margin-bottom:12px">Bank balance: <strong style="font-family:var(--ffm)">₹${num(state.board.bankBalance)}</strong></div>`:''}
    <div class="fr"><label>Amount (₹)</label><input type="number" id="t-amount" placeholder="Enter amount" min="1" autofocus></div>
    <div class="fr"><label>Note (optional)</label><input type="text" id="t-note" placeholder="${isCr?'e.g. Salary':'e.g. Tax'}"></div>
    <div style="margin-top:6px">
      <button class="btn ${isCr?'suc':'dan'} lg" onclick="saveTransact('${team.id}','${m.subtype}')">${isCr?'+ Add Funds':'− Deduct'}</button>
    </div>
  </div></div>`;}

  // RENT
  if(m.type==='rent'){
    const payer=state.teams.find(t=>t.id===m.teamId);if(!payer)return'';
    const ownedByOthers=state.properties.filter(p=>p.ownedBy&&p.ownedBy!==m.teamId);
    const active=ownedByOthers.filter(p=>!p.mortgaged);
    const suspended=ownedByOthers.filter(p=>p.mortgaged);
    return`<div class="moverlay" onclick="closeBg(event)"><div class="modal">
    <span class="mhandle"></span><button class="mclose" onclick="closeModal()">✕</button>
    <div class="mtitle">💸 Pay Rent</div>
    <div style="padding:12px;background:var(--s2);border-radius:var(--rs);border:1px solid var(--bd);margin-bottom:14px">
      <div style="font-size:11px;color:var(--tx3)">Payer</div>
      <div style="font-weight:700;color:${payer.color};font-size:15px">${esc(payer.name)}</div>
      <div style="font-family:var(--ffm);font-size:20px;font-weight:700;margin-top:2px">₹${num(payer.balance)}</div>
    </div>
    ${active.length?`<div class="ct">Tap to pay rent</div>
    <div style="max-height:260px;overflow-y:auto">
    ${active.map(p=>{const owner=state.teams.find(t=>t.id===p.ownedBy);
      const isDice=p.rentType==='dice';
      const rentAmt=getActiveRent(p);
      const houseStr=p.houses ? ' ' + '🏠'.repeat(p.houses) : '';
      return`<div class="prow" style="margin-bottom:6px">
        <div class="pleft">
          <div class="cbar" style="background:${COLORS[p.colorIdx??0]};height:${isDice?40:28}px"></div>
          <div>
            <div class="pname">${esc(p.name)}${houseStr}</div>
            <div class="pmeta">Owner: <span style="color:${owner?.color}">${esc(owner?.name)}</span>${isDice?` · <span style="color:var(--am)">🎲 ×${p.diceMultiplier||4}</span>`:''}</div>
            ${isDice?`<div style="display:flex;align-items:center;gap:5px;margin-top:5px">
              <input type="number" id="dice-${p.id}" placeholder="Dice roll" min="2" max="12" style="width:80px;padding:5px 8px;font-size:12px" oninput="document.getElementById('dicerent-${p.id}').textContent='₹'+((parseInt(this.value)||0)*(${p.diceMultiplier||4}))">
              <span style="font-size:12px;color:var(--am);font-weight:700;font-family:var(--ffm)" id="dicerent-${p.id}">₹0</span>
            </div>`:''}
          </div>
        </div>
        <button class="btn sm blu" onclick="${isDice?`payRentDice('${payer.id}','${p.id}')`:` payRent('${payer.id}','${p.id}')`}">${isDice?'🎲 Pay':'₹'+num(rentAmt)}</button>
      </div>`;}).join('')}
    </div>`:`<div style="color:var(--tx3);font-size:13px;padding:12px 0 8px">No rentable properties owned by others.</div>`}
    ${suspended.length?`<div style="font-size:10px;color:var(--am);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-top:10px;margin-bottom:6px">🔒 Mortgaged — no rent</div>
    ${suspended.map(p=>{const owner=state.teams.find(t=>t.id===p.ownedBy);
      return`<div class="prow mort" style="opacity:.5;margin-bottom:6px">
        <div class="pleft"><div class="cbar" style="background:${COLORS[p.colorIdx??0]};height:28px;opacity:.4"></div>
        <div><div class="pname">${esc(p.name)} 🔒</div><div class="pmeta">Owner: <span style="color:${owner?.color}">${esc(owner?.name)}</span></div></div></div>
        <span class="badge mortg">Suspended</span>
      </div>`;}).join('')}`:''}
    <button class="btn lg" style="margin-top:10px" onclick="closeModal()">Done</button>
  </div></div>`;}

  // MORTGAGE
  if(m.type==='mortgage'){
    const team=state.teams.find(t=>t.id===m.teamId);if(!team)return'';
    const owned=state.properties.filter(p=>p.ownedBy===m.teamId);
    const canMort=owned.filter(p=>!p.mortgaged);
    const isMort=owned.filter(p=>p.mortgaged);
    return`<div class="moverlay" onclick="closeBg(event)"><div class="modal">
    <span class="mhandle"></span><button class="mclose" onclick="closeModal()">✕</button>
    <div class="mtitle">🔒 Mortgage</div>
    <div style="padding:12px;background:var(--s2);border-radius:var(--rs);border:1px solid var(--bd);margin-bottom:14px">
      <div style="font-size:11px;color:var(--tx3)">Player</div>
      <div style="font-weight:700;color:${team.color};font-size:15px">${esc(team.name)}</div>
      <div style="font-family:var(--ffm);font-size:20px;font-weight:700;margin-top:2px">₹${num(team.balance)}</div>
    </div>
    <div class="info amb" style="font-size:11px">🏦 Mortgage = <strong>50% of base price</strong> from bank. Rent suspended. Properties with houses cannot be mortgaged.</div>
    ${canMort.length?`<div class="ct" style="margin-top:14px">Available to Mortgage</div>
    <div style="max-height:200px;overflow-y:auto;margin-bottom:10px">
    ${canMort.map(p=>{
      const mv=Math.floor((p.price||0)/2);
      const hasHouses=(p.houses||0)>0;
      const ok=state.board.bankBalance>=mv && !hasHouses;
      return`<div class="prow" style="cursor:${ok?'pointer':'default'};margin-bottom:6px" ${ok?`onclick="mortgageProp('${p.id}')"`:''}}>
        <div class="pleft"><div class="cbar" style="background:${COLORS[p.colorIdx??0]};height:28px"></div>
        <div><div class="pname">${esc(p.name)}</div><div class="pmeta">Get <strong style="color:var(--am);font-family:var(--ffm)">₹${num(mv)}</strong>${hasHouses?' <span style="color:var(--r)">(Has houses)</span>':(!ok?' <span style="color:var(--r)">(Bank broke)</span>':'')}</div></div></div>
        <button class="btn sm amb" ${!ok?'disabled':''} onclick="event.stopPropagation();mortgageProp('${p.id}')">Mortgage</button>
      </div>`;}).join('')}
    </div>`:`<div style="color:var(--tx3);font-size:12px;padding:10px 0">No properties to mortgage.</div>`}
    ${isMort.length?`<div class="divider"></div>
    <div class="ct" style="color:var(--am)">🔒 Currently Mortgaged</div>
    <div style="max-height:200px;overflow-y:auto">
    ${isMort.map(p=>{const mv=Math.floor((p.price||0)/2);const ok=(team.balance||0)>=mv;
      return`<div class="prow mort" style="cursor:${ok?'pointer':'default'};margin-bottom:6px" ${ok?`onclick="unmortgageProp('${p.id}')"`:''}}>
        <div class="pleft"><div class="cbar" style="background:${COLORS[p.colorIdx??0]};height:28px;opacity:.4"></div>
        <div><div class="pname">${esc(p.name)} 🔒</div><div class="pmeta">Pay: <strong style="color:var(--g);font-family:var(--ffm)">₹${num(mv)}</strong>${!ok?' <span style="color:var(--r)">(insufficient)</span>':''}</div></div></div>
        <button class="btn sm suc" ${!ok?'disabled':''} onclick="event.stopPropagation();unmortgageProp('${p.id}')">Unmortgage</button>
      </div>`;}).join('')}
    </div>`:''}
    <button class="btn lg" style="margin-top:12px" onclick="closeModal()">Done</button>
  </div></div>`;}

  // AUCTION
  if(m.type==='auction'){
    const prop=state.properties.find(p=>p.id===m.propId);if(!prop)return'';
    const curBid=m.currentBid||0;
    const curBidder=m.currentBidderId?state.teams.find(t=>t.id===m.currentBidderId):null;
    return`<div class="moverlay" onclick="closeBg(event)"><div class="modal">
    <span class="mhandle"></span><button class="mclose" onclick="closeModal()">✕</button>
    <div class="mtitle">🔨 Auction</div>
    <div style="display:flex;align-items:center;gap:12px;padding:12px;background:var(--s2);border-radius:var(--rs);border:1px solid var(--bd);margin-bottom:14px">
      <div style="width:3px;height:40px;border-radius:2px;flex-shrink:0;background:${COLORS[prop.colorIdx??0]}"></div>
      <div style="flex:1"><div style="font-size:15px;font-weight:700">${esc(prop.name)}</div><div style="font-size:11px;color:var(--tx3);margin-top:2px">₹${num(prop.price)} · Base Rent ₹${num(prop.rent)}</div></div>
      <span class="badge auct">🔨 Auction</span>
    </div>
    ${curBid>0?`<div style="background:var(--am-bg);border:1px solid var(--am-bd);border-radius:var(--rxs);padding:12px 14px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center">
      <div><div style="font-size:9px;color:var(--am);font-weight:700;text-transform:uppercase;letter-spacing:.6px">Highest Bid</div><div style="font-family:var(--ffm);font-size:24px;font-weight:700;color:var(--am)">₹${num(curBid)}</div></div>
      <div style="text-align:right"><div style="font-size:10px;color:var(--tx3)">By</div><div style="font-weight:700;color:${curBidder?.color||'var(--tx)'}">${esc(curBidder?.name||'—')}</div></div>
    </div>`:`<div class="info blu" style="margin-bottom:12px">No bids yet. Highest bidder wins.</div>`}
    <div class="ct">Place a Bid</div>
    <div style="max-height:260px;overflow-y:auto">
    ${state.teams.map(t=>`<div class="bid-row">
      <div style="flex:1"><div style="font-size:12px;font-weight:700;color:${t.color}">${esc(t.name)}</div><div style="font-size:10px;color:var(--tx3);font-family:var(--ffm)">₹${num(t.balance)}</div></div>
      <input type="number" id="bid-${t.id}" placeholder="₹${curBid+1}" min="${curBid+1}" style="width:90px;padding:7px 9px;font-size:12px">
      <button class="btn sm pri" onclick="placeBid('${prop.id}','${t.id}')">Bid</button>
    </div>`).join('')}
    </div>
    <div class="divider"></div>
    ${curBid>0&&curBidder?`<div style="padding:12px;background:var(--g-bg);border:1px solid var(--g-bd);border-radius:var(--rxs);margin-bottom:10px;display:flex;justify-content:space-between;align-items:center">
      <div><div style="font-size:9px;color:var(--g);font-weight:700;text-transform:uppercase;letter-spacing:.5px">Ready to sell</div><div style="font-weight:700;color:${curBidder.color}">${esc(curBidder.name)}</div><div style="font-size:11px;color:var(--tx3);font-family:var(--ffm)">₹${num(curBid)} → bank</div></div>
      <button class="btn suc" onclick="finalizeAuction('${prop.id}')">🏆 Sell</button>
    </div>`:''}
    <button class="btn lg" onclick="closeModal()">Cancel Auction</button>
  </div></div>`;}

  // BANKRUPTCY
  if(m.type==='bankruptcy'){
    const team=state.teams.find(t=>t.id===m.teamId);if(!team)return'';
    const tp=state.properties.filter(p=>p.ownedBy===m.teamId);
    return`<div class="moverlay" onclick="closeBg(event)"><div class="modal">
    <span class="mhandle"></span><button class="mclose" onclick="closeModal()">✕</button>
    <div class="mtitle">💀 Bankruptcy</div>
    <div style="padding:14px;background:var(--r-bg);border:1px solid var(--r-bd);border-radius:var(--rxs);margin-bottom:14px">
      <div style="font-weight:800;color:${team.color};font-size:15px">${esc(team.name)}</div>
      <div style="font-size:12px;color:var(--tx3);margin-top:3px;font-family:var(--ffm)">Cash: ₹${num(team.balance)} · ${tp.length} properties</div>
    </div>
    <div class="info red" style="font-size:12px;margin-bottom:14px">All cash and properties return to bank. Houses are lost. Player is removed.</div>
    ${tp.length?`<div style="margin-bottom:14px">
      <div style="font-size:10px;color:var(--tx3);margin-bottom:7px;font-weight:700;text-transform:uppercase;letter-spacing:.5px">Returning (${tp.length})</div>
      <div style="display:flex;flex-wrap:wrap;gap:4px">${tp.map(p=>`<span class="pchip"><span class="cdot" style="background:${COLORS[p.colorIdx??0]}"></span>${esc(p.name)}</span>`).join('')}</div>
    </div>`:''}
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <button class="btn dan lg" onclick="confirmBankruptcy('${m.teamId}')">💀 Confirm</button>
      <button class="btn lg" onclick="closeModal()">Cancel</button>
    </div>
  </div></div>`;}

  // ADMIN ADD TEAM
  if(m.type==='adminAddTeam'){return`<div class="moverlay" onclick="closeBg(event)"><div class="modal">
    <span class="mhandle"></span><button class="mclose" onclick="closeModal()">✕</button>
    <div class="mtitle">👤 Add Player (Admin)</div>
    <div class="info grn" style="margin-bottom:14px">Starting balance will be <strong>deducted from bank</strong>. Bank: ₹${num(state.board.bankBalance)}</div>
    <div class="fr"><label>Name</label><input type="text" id="adm-name" placeholder="e.g. Alice" autofocus></div>
    <div class="fr"><label>Starting Balance (₹)</label><input type="number" id="adm-balance" value="${state.board.startMoney}" min="0"></div>
    <div class="fr"><label>Color</label>
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:8px">
        ${COLORS.map((c,i)=>`<div onclick="pickColor(this,'adm-color','${c}')" class="cswatch${i===state.teams.length%COLORS.length?' sel':''}" style="background:${c}"></div>`).join('')}
      </div>
      <input type="hidden" id="adm-color" value="${COLORS[state.teams.length%COLORS.length]}">
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px">
      <button class="btn pri lg" onclick="adminAddTeam()">Add Player</button>
      <button class="btn lg" onclick="closeModal()">Cancel</button>
    </div>
  </div></div>`;}

  // ADMIN SELECT TEAM
  if(m.type==='adminSelectTeam'){return`<div class="moverlay" onclick="closeBg(event)"><div class="modal">
    <span class="mhandle"></span><button class="mclose" onclick="closeModal()">✕</button>
    <div class="mtitle">✏️ Select Player</div>
    ${!state.teams.length?`<div class="empty">No players yet.</div>`:`
    <div style="max-height:400px;overflow-y:auto">
    ${state.teams.map(t=>`<div class="prow" onclick="state.modal={type:'adminEditBalance',teamId:'${t.id}'};render()" style="cursor:pointer;margin-bottom:7px">
      <div style="display:flex;align-items:center;gap:9px;flex:1">
        <div style="width:9px;height:9px;border-radius:50%;background:${t.color}"></div>
        <div><div style="font-weight:700;color:${t.color}">${esc(t.name)}</div><div style="font-size:11px;color:var(--tx3);font-family:var(--ffm)">₹${num(t.balance)}</div></div>
      </div>
      <span style="color:var(--tx3);font-size:18px">›</span>
    </div>`).join('')}
    </div>`}
    <button class="btn lg" style="margin-top:10px" onclick="closeModal()">Cancel</button>
  </div></div>`;}

  // ADMIN EDIT BALANCE
  if(m.type==='adminEditBalance'){
    const team=state.teams.find(t=>t.id===m.teamId);if(!team)return'';
    return`<div class="moverlay" onclick="closeBg(event)"><div class="modal">
    <span class="mhandle"></span><button class="mclose" onclick="closeModal()">✕</button>
    <div class="mtitle">✏️ Edit Balance</div>
    <div class="info blu" style="margin-bottom:14px;font-size:11px">Difference reconciled with bank and logged.</div>
    <div style="padding:12px;background:var(--s2);border-radius:var(--rs);margin-bottom:14px;border:1px solid var(--bd)">
      <div style="font-size:11px;color:var(--tx3)">Editing</div>
      <div style="font-weight:700;color:${team.color};font-size:15px">${esc(team.name)}</div>
      <div style="font-family:var(--ffm);font-size:22px;font-weight:700;margin-top:2px">₹${num(team.balance)}</div>
    </div>
    <div class="fr"><label>New Balance (₹)</label><input type="number" id="adm-newbal" value="${team.balance}" min="0" autofocus></div>
    <div class="fr"><label>Reason</label><input type="text" id="adm-balnote" placeholder="e.g. Balance correction"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px">
      <button class="btn pri lg" onclick="adminEditBalance('${m.teamId}')">Apply</button>
      <button class="btn lg" onclick="closeModal()">Cancel</button>
    </div>
  </div></div>`;}

  return'';
}

// ══════════════════════════════════════════════════════════
// ACTIONS — helpers
// ══════════════════════════════════════════════════════════
function getPropValue(p){
  return (p.mortgaged ? Math.floor((p.price||0)/2) : (p.price||0)) + ((p.houses||0) * (p.housePrice||0));
}
function getActiveRent(p){
  if(p.rentType==='dice') return 0;
  if(p.houses===3) return p.rent3 || p.rent*4;
  if(p.houses===2) return p.rent2 || p.rent*3;
  if(p.houses===1) return p.rent1 || p.rent*2;
  return p.rent || 0;
}
function uid(){return Math.random().toString(36).slice(2,9);}
function stateChanged(){render();schedSave();}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function num(n){return(n||0).toLocaleString('en-IN');}
function formatTime(ts){
  const d=Date.now()-ts;
  if(d<60000)return'Just now';
  if(d<3600000)return Math.floor(d/60000)+'m ago';
  if(d<86400000)return Math.floor(d/3600000)+'h ago';
  return new Date(ts).toLocaleDateString('en-IN',{day:'numeric',month:'short'});
}

window.saveAddTeam=()=>{
  const name=document.getElementById('m-name')?.value?.trim();
  const balance=parseInt(document.getElementById('m-balance')?.value)||0;
  const color=document.getElementById('m-color')?.value||COLORS[0];
  if(!name){toast('Enter a player name','err');return;}
  if(balance<0){toast('Balance cannot be negative','err');return;}
  if(balance>0&&state.board.bankBalance<balance){
    toast(`Bank only has ₹${num(state.board.bankBalance)} — insufficient`,'err');return;
  }
  const t={id:uid(),name,balance,color};
  state.teams.push(t);
  if(balance>0){
    state.board.bankBalance-=balance;
    state.transactions.push({id:uid(),teamId:t.id,amount:balance,note:`Starting balance for ${name} (deducted from bank)`,type:'credit',time:Date.now()});
  }
  state.modal=null;stateChanged();
  toast(`${name} added — ₹${num(balance)} deducted from bank`,'suc');
};

window.editTeam=id=>{const t=state.teams.find(x=>x.id===id);state.modal={type:'editTeam',teamId:id,team:{...t}};render();};

window.saveEditTeam=id=>{
  const t=state.teams.find(x=>x.id===id);if(!t)return;
  const name=document.getElementById('m-name')?.value?.trim()||t.name;
  const newBal=parseInt(document.getElementById('m-balance')?.value)||0;
  const color=document.getElementById('m-color')?.value||t.color;
  if(newBal<0){toast('Balance cannot be negative','err');return;}
  const diff=newBal-t.balance;
  if(diff!==0){
    if(diff>0){
      if(state.board.bankBalance<diff){toast(`Bank only has ₹${num(state.board.bankBalance)}`,'err');return;}
      state.board.bankBalance-=diff;
    }else{
      state.board.bankBalance+=Math.abs(diff);
    }
    state.transactions.push({id:uid(),teamId:id,amount:diff,note:`Balance edit: ${name} ₹${num(t.balance)} → ₹${num(newBal)}`,type:'admin',time:Date.now()});
  }
  t.name=name;t.balance=newBal;t.color=color;
  state.modal=null;stateChanged();toast(`${name} updated`,'suc');
};

window.deleteTeam=id=>{
  if(!confirm('Remove this player?'))return;
  const team=state.teams.find(t=>t.id===id);if(!team)return;
  if(team.balance>0){
    state.board.bankBalance+=team.balance;
    state.transactions.push({id:uid(),teamId:'bank',amount:team.balance,note:`${team.name} removed — cash returned to bank`,type:'admin',time:Date.now()});
  }
  state.properties.forEach(p=>{
    if(p.ownedBy===id){
      if(p.mortgaged){
        const mv=Math.floor((p.price||0)/2);
        state.board.bankBalance-=mv;
      }
      p.ownedBy=null;p.mortgaged=false;p.houses=0;
    }
  });

window.importData=()=>{document.getElementById('import-file').click();};
window.handleImport=e=>{
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      if(!d||typeof d!=='object'){toast('Invalid JSON file','err');return;}
      if(!confirm('Import will overwrite current game data. Continue?'))return;
      if(d.board)state.board={...state.board,...d.board};
      if(Array.isArray(d.teams))state.teams=d.teams;
      if(Array.isArray(d.properties))state.properties=d.properties;
      if(Array.isArray(d.transactions))state.transactions=d.transactions;
      stateChanged();toast('Game imported successfully','suc');
    }catch(err){toast('Failed to parse JSON file','err');}
  };
  reader.readAsText(file);
  e.target.value='';
};
window.resetKeepProps=()=>{
  if(!confirm('Reset players and transactions but KEEP all properties? This cannot be undone!'))return;
  state.teams=[];state.transactions=[];
  state.properties.forEach(p=>{p.ownedBy=null;p.mortgaged=false;p.houses=0;});
  state.board.bankBalance=state.board.bankInitial||2000;
  stateChanged();toast('Game reset — properties kept','suc');
};

  if(diff>0){
    if(state.board.bankBalance<diff){toast(`Bank only has ₹${num(state.board.bankBalance)}`,'err');return;}
    state.board.bankBalance-=diff;
  }else{
    state.board.bankBalance+=Math.abs(diff);
  }
  const oldBal=team.balance;
  team.balance=newBal;
  state.transactions.push({id:uid(),teamId,amount:diff,note:`🔧 ${team.name}: ₹${num(oldBal)} → ₹${num(newBal)} (${note})`,type:'admin',time:Date.now()});
  state.modal=null;stateChanged();toast(`${team.name} → ₹${num(newBal)}`,'suc');
};

window.checkBankruptcyLogs=()=>{
  const bad=state.transactions.filter(t=>t.type==='bankruptcy'&&t.amount===0);
  if(!bad.length)toast('No issues found in bankruptcy logs ✓','suc');
  else toast(`${bad.length} legacy bankruptcy log(s) with amount=0 (display-only)`,'amb');
};

(async()=>{
  if(token){
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').classList.add('visible');
    await loadState();
    connectSSE();
  }
})();
</script>
