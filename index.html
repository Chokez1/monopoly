<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Monopoly Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0a0f;
  --surface:#13131a;
  --surface2:#1c1c26;
  --surface3:#252533;
  --border:rgba(255,255,255,.07);
  --border2:rgba(255,255,255,.12);
  --text:#f4f3ff;
  --text2:#9b99bb;
  --text3:#5c5a7a;
  --accent:#7c5cfc;
  --accent2:#a78bfa;
  --accent-glow:rgba(124,92,252,.2);
  --green:#22c55e;--green-bg:rgba(34,197,94,.1);--green-border:rgba(34,197,94,.2);
  --red:#ef4444;--red-bg:rgba(239,68,68,.1);--red-border:rgba(239,68,68,.2);
  --amber:#f59e0b;--amber-bg:rgba(245,158,11,.1);--amber-border:rgba(245,158,11,.2);
  --blue:#3b82f6;--blue-bg:rgba(59,130,246,.1);--blue-border:rgba(59,130,246,.2);
  --orange:#f97316;--orange-bg:rgba(249,115,22,.1);--orange-border:rgba(249,115,22,.2);
  --r:18px;--r-sm:12px;--r-xs:8px;--r-pill:999px;
  --font:'Inter',sans-serif;
  --nav-h:64px;
  --header-h:56px;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;-webkit-font-smoothing:antialiased;overflow-x:hidden}

/* ── LOGIN ── */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:radial-gradient(ellipse 120% 80% at 50% -10%,rgba(124,92,252,.15) 0%,transparent 60%),var(--bg)}
.login-box{width:100%;max-width:400px}
.login-logo{text-align:center;margin-bottom:32px}
.login-logo-icon{width:64px;height:64px;border-radius:20px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 14px;box-shadow:0 8px 32px var(--accent-glow)}
.login-title{font-size:26px;font-weight:800;letter-spacing:-.5px}
.login-sub{font-size:14px;color:var(--text3);margin-top:4px;font-weight:400}
.login-card{background:var(--surface);border:1px solid var(--border2);border-radius:24px;padding:28px 24px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.login-tabs{display:flex;background:var(--surface2);border-radius:var(--r-sm);padding:4px;gap:4px;margin-bottom:22px}
.login-tab{flex:1;padding:9px;border:none;background:none;color:var(--text3);font-size:14px;border-radius:9px;cursor:pointer;font-family:var(--font);font-weight:600;transition:all .15s}
.login-tab.active{background:var(--surface3);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.4)}
.field{margin-bottom:16px}
.field label{font-size:12px;color:var(--text3);display:block;margin-bottom:6px;font-weight:600;letter-spacing:.3px;text-transform:uppercase}
.field input{width:100%;padding:12px 14px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--r-sm);color:var(--text);font-family:var(--font);font-size:15px;outline:none;transition:border-color .15s,box-shadow .15s}
.field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.login-btn{width:100%;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:var(--r-sm);font-family:var(--font);font-size:15px;font-weight:700;cursor:pointer;letter-spacing:.2px;transition:all .15s;box-shadow:0 4px 20px var(--accent-glow);margin-top:6px}
.login-btn:hover{opacity:.9}
.login-btn:active{transform:scale(.98)}
.login-error{color:var(--red);font-size:13px;text-align:center;margin-top:12px;padding:10px;background:var(--red-bg);border-radius:var(--r-xs);border:1px solid var(--red-border)}

/* ── APP SHELL ── */
#app{display:none;min-height:100vh;flex-direction:column;padding-bottom:var(--nav-h)}
#app.visible{display:flex}

/* ── HEADER ── */
.header{background:rgba(10,10,15,.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 16px;height:var(--header-h);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header-logo{display:flex;align-items:center;gap:10px}
.header-logo-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent)}
.header-logo-text{font-size:17px;font-weight:800;letter-spacing:-.3px}
.header-board-name{font-size:11px;color:var(--text3);margin-top:1px;font-weight:400}
.header-right{display:flex;align-items:center;gap:8px}
.sync-pill{display:flex;align-items:center;gap:6px;padding:5px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-pill);font-size:11px;color:var(--text3);font-weight:500}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0}
.sync-dot.offline{background:var(--red)}
.sync-dot.syncing{background:var(--amber);animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.hdr-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text2);padding:7px 12px;border-radius:var(--r-xs);cursor:pointer;font-size:12px;font-family:var(--font);font-weight:600;transition:all .15s;white-space:nowrap}
.hdr-btn:hover{background:var(--surface3);color:var(--text)}

/* ── BOTTOM NAV ── */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);background:rgba(13,13,20,.92);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid var(--border);display:flex;align-items:stretch;z-index:100;padding:0 4px;padding-bottom:env(safe-area-inset-bottom,0)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;border:none;background:none;color:var(--text3);font-family:var(--font);font-size:10px;font-weight:600;letter-spacing:.3px;text-transform:uppercase;padding:6px 2px;border-radius:var(--r-sm);transition:color .15s;position:relative}
.nav-item.active{color:var(--accent2)}
.nav-icon{font-size:20px;line-height:1;transition:transform .15s}
.nav-item.active .nav-icon{transform:scale(1.15)}
.nav-item::after{content:'';position:absolute;top:6px;left:50%;transform:translateX(-50%);width:0;height:2px;background:var(--accent);border-radius:var(--r-pill);transition:width .2s}
.nav-item.active::after{width:24px}

/* ── SIDEBAR (desktop) ── */
.web-sidebar{display:none;width:220px;min-width:220px;background:var(--surface);border-right:1px solid var(--border);position:sticky;top:var(--header-h);height:calc(100vh - var(--header-h));overflow-y:auto}
.sidebar-nav{padding:12px 8px}
.sidebar-item{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:var(--r-sm);cursor:pointer;font-size:14px;font-weight:500;color:var(--text3);transition:all .15s;margin-bottom:2px;border:none;background:none;width:100%;font-family:var(--font);text-align:left}
.sidebar-item.active{background:var(--accent-glow);color:var(--accent2);font-weight:600}
.sidebar-item:hover:not(.active){background:var(--surface2);color:var(--text)}
.sidebar-icon{font-size:16px;width:20px;text-align:center;flex-shrink:0}
.sidebar-sep{height:1px;background:var(--border);margin:10px 8px}

/* ── CONTENT ── */
.web-layout{display:flex;flex:1;min-height:0}
.web-main{flex:1;overflow:auto;min-height:0}
.content{padding:16px;max-width:820px;width:100%;margin:0 auto}
@media(min-width:768px){
  body:not(.force-mobile) #app{padding-bottom:0}
  body:not(.force-mobile) .bottom-nav{display:none}
  body:not(.force-mobile) .web-sidebar{display:block}
  body:not(.force-mobile) .modal{border-radius:var(--r);max-width:520px;margin:0 auto}
  body:not(.force-mobile) .modal-overlay{align-items:center}
}

/* ── CARDS ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px}
.card-title{font-size:11px;color:var(--text3);margin-bottom:12px;font-weight:700;text-transform:uppercase;letter-spacing:.8px}

/* ── BUTTONS ── */
.btn{padding:9px 14px;border-radius:var(--r-xs);border:1px solid var(--border2);background:var(--surface2);color:var(--text);cursor:pointer;font-size:13px;font-weight:600;font-family:var(--font);transition:all .15s;display:inline-flex;align-items:center;gap:5px}
.btn:hover{background:var(--surface3)}
.btn:active{transform:scale(.97)}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 2px 12px var(--accent-glow)}
.btn.primary:hover{opacity:.9}
.btn.danger{background:var(--red-bg);color:var(--red);border-color:var(--red-border)}
.btn.success{background:var(--green-bg);color:var(--green);border-color:var(--green-border)}
.btn.amber{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-border)}
.btn.blue{background:var(--blue-bg);color:var(--blue);border-color:var(--blue-border)}
.btn.orange{background:var(--orange-bg);color:var(--orange);border-color:var(--orange-border)}
.btn.sm{padding:6px 10px;font-size:12px;border-radius:var(--r-xs)}
.btn.lg{padding:13px 20px;font-size:15px;border-radius:var(--r-sm);width:100%;justify-content:center}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none}

/* ── INPUTS ── */
input,select,textarea{width:100%;padding:11px 13px;border:1px solid var(--border2);border-radius:var(--r-xs);background:var(--surface2);color:var(--text);font-size:14px;outline:none;font-family:var(--font);transition:border-color .15s,box-shadow .15s;-webkit-appearance:none}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
select option{background:var(--surface2)}
.form-row{margin-bottom:14px}
.form-row label{font-size:11px;color:var(--text3);display:block;margin-bottom:6px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.form-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* ── MODALS ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);display:flex;align-items:flex-end;justify-content:center;z-index:200;animation:fadeIn .15s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:24px 24px 0 0;padding:24px 20px;width:100%;max-height:92vh;overflow-y:auto;animation:slideUp .22s cubic-bezier(.4,0,.2,1);padding-bottom:calc(24px + env(safe-area-inset-bottom,0))}
@keyframes slideUp{from{transform:translateY(24px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-handle{width:36px;height:4px;background:var(--border2);border-radius:var(--r-pill);margin:0 auto 20px;display:block}
.modal-title{font-size:20px;font-weight:800;margin-bottom:18px;letter-spacing:-.3px}
.modal-close{float:right;background:var(--surface3);border:1px solid var(--border);font-size:14px;cursor:pointer;color:var(--text2);width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--font)}

/* ── TEAM CARDS ── */
.team-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px;position:relative;overflow:hidden}
.team-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--team-color,var(--accent));border-radius:0 2px 2px 0}
.team-name{font-size:18px;font-weight:800;letter-spacing:-.3px}
.team-balance{font-size:28px;font-weight:900;letter-spacing:-.5px;margin:2px 0 6px}
.action-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-top:12px}
.action-btn{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 4px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);cursor:pointer;font-family:var(--font);font-size:11px;font-weight:600;color:var(--text2);letter-spacing:.2px;text-transform:uppercase;transition:all .15s;border:none}
.action-btn:hover{background:var(--surface3);color:var(--text)}
.action-btn .ab-icon{font-size:18px}
.action-btn.success{background:var(--green-bg);color:var(--green)}
.action-btn.danger{background:var(--red-bg);color:var(--red)}
.action-btn.amber{background:var(--amber-bg);color:var(--amber)}
.action-btn.blue{background:var(--blue-bg);color:var(--blue)}
.action-btn.orange{background:var(--orange-bg);color:var(--orange)}
.action-btn.purple{background:rgba(124,92,252,.1);color:var(--accent2)}

/* ── LEADERBOARD ── */
.lb-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:12px}
.lb-row{display:flex;align-items:center;padding:14px 16px;border-bottom:1px solid var(--border);gap:12px}
.lb-row:last-child{border-bottom:none}
.lb-rank{font-size:20px;font-weight:900;color:var(--text3);width:32px;text-align:center;flex-shrink:0;font-size:22px}
.lb-rank.gold{color:#f59e0b}
.lb-rank.silver{color:#94a3b8}
.lb-rank.bronze{color:#b45309}
.lb-bar-wrap{height:3px;background:var(--surface3);border-radius:var(--r-pill);margin-top:7px;overflow:hidden}
.lb-bar{height:100%;border-radius:var(--r-pill);transition:width .6s cubic-bezier(.4,0,.2,1)}
.prop-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:var(--r-pill);font-size:11px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);font-weight:500}
.prop-chip.mortgaged{border-color:var(--amber-border);background:var(--amber-bg);color:var(--amber)}
.color-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* ── PROPERTIES ── */
.search-wrap{position:relative;margin-bottom:14px}
.search-wrap input{padding-left:38px;background:var(--surface)}
.search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:15px;pointer-events:none}
.prop-row{display:flex;align-items:center;justify-content:space-between;padding:12px;border:1px solid var(--border);border-radius:var(--r-sm);margin-bottom:7px;background:var(--surface);gap:10px}
.prop-row.mortgaged-row{border-color:var(--amber-border);background:var(--amber-bg);background:rgba(245,158,11,.04)}
.prop-left{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.color-bar{width:12px;border-radius:4px;flex-shrink:0}
.prop-name{font-size:14px;font-weight:600}
.prop-meta{font-size:12px;color:var(--text3);margin-top:2px}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:var(--r-pill);font-size:11px;font-weight:600;border:1px solid}
.badge.owned{background:var(--green-bg);color:var(--green);border-color:var(--green-border)}
.badge.free{background:var(--surface2);color:var(--text3);border-color:var(--border)}
.badge.mortgaged{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-border)}
.badge.bank{background:var(--blue-bg);color:var(--blue);border-color:var(--blue-border)}
.badge.auction{background:rgba(124,92,252,.1);color:var(--accent2);border-color:rgba(124,92,252,.25)}

/* ── TRANSACTIONS ── */
.trans-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border);gap:10px}
.trans-row:last-child{border-bottom:none}
.trans-type-icon{width:36px;height:36px;border-radius:var(--r-xs);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}

/* ── STATS GRID ── */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.stat-box{background:var(--surface2);border-radius:var(--r-sm);padding:14px;text-align:center;border:1px solid var(--border)}
.stat-num{font-size:26px;font-weight:900;letter-spacing:-.5px}
.stat-label{font-size:11px;color:var(--text3);margin-top:3px;font-weight:600;text-transform:uppercase;letter-spacing:.4px}

/* ── FAB ── */
.fab{position:fixed;bottom:calc(var(--nav-h) + 16px);right:20px;width:52px;height:52px;border-radius:50%;background:var(--accent);color:#fff;border:none;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px var(--accent-glow);z-index:50;transition:transform .15s}
.fab:hover{transform:scale(1.08)}
.fab:active{transform:scale(.93)}
@media(min-width:768px){body:not(.force-mobile) .fab{bottom:24px}}

/* ── TOASTS ── */
#toast-container{position:fixed;bottom:calc(var(--nav-h) + 12px);left:50%;transform:translateX(-50%);z-index:500;display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none;width:calc(100% - 32px);max-width:360px}
@media(min-width:768px){body:not(.force-mobile) #toast-container{bottom:20px}}
.toast{background:var(--surface3);border:1px solid var(--border2);color:var(--text);padding:11px 18px;border-radius:var(--r-pill);font-size:13px;font-weight:600;box-shadow:0 4px 24px rgba(0,0,0,.5);animation:toastIn .25s cubic-bezier(.4,0,.2,1);white-space:nowrap}
.toast.success{background:var(--green-bg);color:var(--green);border-color:var(--green-border)}
.toast.error{background:var(--red-bg);color:var(--red);border-color:var(--red-border)}
.toast.amber{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-border)}
@keyframes toastIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ── MISC ── */
.empty{text-align:center;color:var(--text3);padding:56px 24px;font-size:14px;line-height:1.6}
.empty-icon{font-size:44px;margin-bottom:14px;display:block}
.group-header{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--text3);margin:20px 0 8px;padding-left:2px}
.divider{height:1px;background:var(--border);margin:14px 0}
.info-box{padding:11px 14px;font-size:13px;color:var(--text3);line-height:1.6;margin-bottom:12px;border-radius:var(--r-xs);border:1px solid var(--border)}
.info-box.amber{border-color:var(--amber-border);background:var(--amber-bg);color:var(--amber)}
.info-box.blue{border-color:var(--blue-border);background:var(--blue-bg);color:var(--blue)}
.info-box.red{border-color:var(--red-border);background:var(--red-bg);color:var(--red)}
.info-box.green{border-color:var(--green-border);background:var(--green-bg);color:var(--green)}
.bank-section{background:var(--surface2);border:1px solid var(--blue-border);border-radius:var(--r-sm);padding:14px;margin-top:10px}
.bank-title{font-size:13px;font-weight:700;color:var(--blue);margin-bottom:10px}
.row{display:flex;gap:8px;align-items:center}
/* Auction */
.bid-row{display:flex;gap:8px;align-items:center;padding:11px 12px;background:var(--surface2);border-radius:var(--r-sm);margin-bottom:7px;border:1px solid var(--border)}
/* Mortgage */
.mortgage-val{font-size:20px;font-weight:800;color:var(--amber)}

/* Admin section */
.admin-section{background:linear-gradient(135deg,rgba(249,115,22,.06) 0%,transparent 100%);border:1px solid var(--orange-border);border-radius:var(--r);padding:16px;margin-bottom:12px}
.admin-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--orange);margin-bottom:14px;display:flex;align-items:center;gap:6px}
.admin-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.admin-action-btn{display:flex;flex-direction:column;align-items:flex-start;gap:4px;padding:12px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);cursor:pointer;font-family:var(--font);transition:all .15s;text-align:left;width:100%}
.admin-action-btn:hover{background:var(--surface3);border-color:var(--border2)}
.admin-action-btn .aa-icon{font-size:20px}
.admin-action-btn .aa-label{font-size:13px;font-weight:700;color:var(--text)}
.admin-action-btn .aa-sub{font-size:11px;color:var(--text3);line-height:1.4}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <div class="login-logo-icon">🎲</div>
      <div class="login-title">Monopoly</div>
      <div class="login-sub">Live Game Tracker</div>
    </div>
    <div class="login-card">
      <div class="field">
        <label>Server URL</label>
        <input type="url" id="server-url" placeholder="http://192.168.x.x:3000">
      </div>
      <div class="login-tabs">
        <button class="login-tab active" id="tab-login" onclick="switchAuthTab('login')">Sign In</button>
        <button class="login-tab" id="tab-register" onclick="switchAuthTab('register')">Register</button>
      </div>
      <div class="field"><label>Username</label><input type="text" id="auth-username" placeholder="Enter username" autocomplete="username"></div>
      <div class="field"><label>Password</label><input type="password" id="auth-password" placeholder="Enter password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doAuth()"></div>
      <div id="auth-error" style="display:none" class="login-error"></div>
      <button class="login-btn" id="auth-btn" onclick="doAuth()">Sign In</button>
    </div>
  </div>
</div>

<div id="app">
  <div class="header">
    <div class="header-logo">
      <div class="header-logo-dot"></div>
      <div>
        <div class="header-logo-text">Monopoly</div>
        <div class="header-board-name" id="header-board-name"></div>
      </div>
    </div>
    <div class="header-right">
      <div class="sync-pill">
        <div class="sync-dot" id="sync-dot"></div>
        <span id="sync-label">Live</span>
      </div>
      <button class="hdr-btn" id="view-toggle-btn" onclick="toggleMobileView()" style="display:none">📱 Mobile</button>
      <button class="hdr-btn" onclick="doLogout()">Sign out</button>
    </div>
  </div>

  <div class="web-layout" id="app-body">
    <div id="sidebar" class="web-sidebar"></div>
    <div class="web-main">
      <div class="content" id="content"></div>
    </div>
  </div>

  <nav class="bottom-nav" id="bottom-nav"></nav>
  <div id="fab-wrap"></div>
</div>

<div id="modal-wrap"></div>
<div id="toast-container"></div>

<script>
const COLORS=['#f87171','#fbbf24','#34d399','#f472b6','#818cf8','#60a5fa','#a78bfa','#4ade80','#fb923c','#e879f9','#2dd4bf','#facc15'];
const COLOR_NAMES=['Red','Amber','Emerald','Pink','Indigo','Blue','Violet','Green','Orange','Fuchsia','Teal','Yellow'];

const NAV_TABS=[
  {id:'leaderboard',label:'Board',icon:'🏆'},
  {id:'teams',label:'Teams',icon:'👥'},
  {id:'properties',label:'Props',icon:'🏠'},
  {id:'transactions',label:'Log',icon:'💸'},
  {id:'settings',label:'More',icon:'⚙️'},
];

let API='',TOKEN='',AUTH_TAB='login';
let state={
  activeTab:'leaderboard',
  board:{name:'My Monopoly Board',startMoney:1500,bankBalance:20580},
  teams:[],properties:[],transactions:[],modal:null,propSearch:''
};
let sseSource=null;

// ── UI TOGGLE ──
window.toggleMobileView=()=>{
  const isMobile=document.body.classList.toggle('force-mobile');
  localStorage.setItem('mono_force_mobile',isMobile);
  const btn=document.getElementById('view-toggle-btn');
  if(btn)btn.innerHTML=isMobile?'💻 Desktop':'📱 Mobile';
};

// ── AUTH ──
function switchAuthTab(t){
  AUTH_TAB=t;
  document.getElementById('tab-login').classList.toggle('active',t==='login');
  document.getElementById('tab-register').classList.toggle('active',t==='register');
  document.getElementById('auth-btn').textContent=t==='login'?'Sign In':'Create Account';
  document.getElementById('auth-error').style.display='none';
}
async function doAuth(){
  const serverUrl=document.getElementById('server-url').value.trim().replace(/\/$/,'');
  const username=document.getElementById('auth-username').value.trim();
  const password=document.getElementById('auth-password').value;
  const errEl=document.getElementById('auth-error');
  errEl.style.display='none';
  if(!serverUrl){showAuthError('Please enter the server URL');return;}
  if(!username||!password){showAuthError('Enter username and password');return;}
  API=serverUrl;
  const endpoint=AUTH_TAB==='login'?'/api/login':'/api/register';
  document.getElementById('auth-btn').textContent='…';
  document.getElementById('auth-btn').disabled=true;
  try{
    const res=await fetch(API+endpoint,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password})});
    const data=await res.json();
    if(!res.ok)throw new Error(data.error||'Auth failed');
    TOKEN=data.token;
    localStorage.setItem('mono_api',API);
    localStorage.setItem('mono_token',TOKEN);
    startApp();
  }catch(e){showAuthError(e.message);}
  finally{
    document.getElementById('auth-btn').disabled=false;
    document.getElementById('auth-btn').textContent=AUTH_TAB==='login'?'Sign In':'Create Account';
  }
}
function showAuthError(msg){const el=document.getElementById('auth-error');el.textContent=msg;el.style.display='block';}
async function doLogout(){
  try{await api('POST','/api/logout');}catch(e){}
  TOKEN='';localStorage.removeItem('mono_token');
  if(sseSource){sseSource.close();sseSource=null;}
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('app').classList.remove('visible');
}

// ── API ──
async function api(method,path,body){
  const opts={method,headers:{'Content-Type':'application/json','Authorization':'Bearer '+TOKEN}};
  if(body)opts.body=JSON.stringify(body);
  const res=await fetch(API+path,opts);
  if(!res.ok){const d=await res.json().catch(()=>({}));throw new Error(d.error||'API error');}
  return res.json();
}
async function saveToServer(newState){
  setSyncing(true);
  try{await api('POST','/api/state',newState);setSyncing(false,true);}
  catch(e){setSyncing(false,false);toast('Sync failed: '+e.message,'error');}
}
function setSyncing(isSyncing,ok){
  const dot=document.getElementById('sync-dot'),label=document.getElementById('sync-label');
  if(!dot)return;
  if(isSyncing){dot.className='sync-dot syncing';label.textContent='Saving…';}
  else if(ok===true){dot.className='sync-dot';label.textContent='Saved';setTimeout(()=>{if(label)label.textContent='Live';},1500);}
  else if(ok===false){dot.className='sync-dot offline';label.textContent='Offline';}
}

// ── SSE ──
function connectSSE(){
  if(sseSource)sseSource.close();
  sseSource=new EventSource(`${API}/api/events?token=${TOKEN}`);
  sseSource.addEventListener('stateUpdate',(e)=>{
    const ns=JSON.parse(e.data);
    state={...state,...ns,modal:state.modal,activeTab:state.activeTab,propSearch:state.propSearch};
    if(state.board.bankBalance===undefined)state.board.bankBalance=20580;
    render();
    document.getElementById('header-board-name').textContent=state.board?.name||'';
  });
  sseSource.onopen=()=>{const d=document.getElementById('sync-dot'),l=document.getElementById('sync-label');if(d)d.className='sync-dot';if(l)l.textContent='Live';};
  sseSource.onerror=()=>{const d=document.getElementById('sync-dot'),l=document.getElementById('sync-label');if(d)d.className='sync-dot offline';if(l)l.textContent='Reconnecting…';};
}

// ── APP START ──
async function startApp(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').classList.add('visible');
  try{
    const s=await api('GET','/api/state');
    state={...state,...s,modal:null};
    if(state.board.bankBalance===undefined)state.board.bankBalance=20580;
    document.getElementById('header-board-name').textContent=state.board?.name||'';
  }catch(e){toast('Could not load game state','error');}
  const vtBtn=document.getElementById('view-toggle-btn');
  if(vtBtn)vtBtn.style.display='flex';
  render();connectSSE();
}
window.addEventListener('load',async()=>{
  if(localStorage.getItem('mono_force_mobile')==='true'){
    document.body.classList.add('force-mobile');
    const btn=document.getElementById('view-toggle-btn');
    if(btn)btn.innerHTML='💻 Desktop';
  }
  const savedApi=localStorage.getItem('mono_api'),savedToken=localStorage.getItem('mono_token');
  const savedUrl=document.getElementById('server-url');
  if(savedApi)savedUrl.value=savedApi;
  if(savedApi&&savedToken){API=savedApi;TOKEN=savedToken;
    try{await api('GET','/api/state');startApp();return;}
    catch(e){TOKEN='';localStorage.removeItem('mono_token');}
  }
});

// ── RENDER ──
function render(){
  renderNav();
  document.getElementById('content').innerHTML=contentHTML();
  const sidebar=document.getElementById('sidebar');
  if(sidebar)sidebar.innerHTML=sidebarHTML();
  const fab=document.getElementById('fab-wrap');
  if(fab&&['teams','properties'].includes(state.activeTab)){
    fab.innerHTML=`<button class="fab" onclick="onFab()">+</button>`;
  }else if(fab)fab.innerHTML='';
  document.getElementById('modal-wrap').innerHTML=modalHTML();
}

function renderNav(){
  const bn=document.getElementById('bottom-nav');
  if(bn)bn.innerHTML=NAV_TABS.map(t=>`<button class="nav-item${state.activeTab===t.id?' active':''}" onclick="setTab('${t.id}')"><span class="nav-icon">${t.icon}</span><span>${t.label}</span></button>`).join('');
}
function sidebarHTML(){
  return`<nav class="sidebar-nav">${NAV_TABS.map(t=>`<button class="sidebar-item${state.activeTab===t.id?' active':''}" onclick="setTab('${t.id}')"><span class="sidebar-icon">${t.icon}</span>${t.label==='More'?'Settings':t.label}</button>`).join('')}</nav>`;
}
function contentHTML(){
  const map={leaderboard:leaderboardHTML,teams:teamsHTML,properties:propertiesHTML,board:boardHTML,transactions:transactionsHTML,settings:settingsHTML};
  return(map[state.activeTab]||(() => ''))();
}

// ── LEADERBOARD ──
function leaderboardHTML(){
  if(!state.teams.length)return`<div class="empty"><span class="empty-icon">🏆</span>No teams yet.<br>Go to Teams tab to add players.</div>`;
  const stats=state.teams.map(t=>{
    const tp=state.properties.filter(p=>p.ownedBy===t.id);
    const tv=tp.reduce((a,p)=>a+(p.mortgaged?Math.floor((p.price||0)/2):(p.price||0)),0);
    return{team:t,props:tp,propCount:tp.length,propValue:tv,balance:t.balance,total:t.balance+tv};
  }).sort((a,b)=>b.total-a.total);
  const maxTotal=stats[0]?.total||1;
  const totalMoney=stats.reduce((a,s)=>a+s.balance,0);
  const totalPropVal=stats.reduce((a,s)=>a+s.propValue,0);
  return`
  <div style="margin-bottom:18px">
    <div style="font-size:24px;font-weight:900;letter-spacing:-.5px;margin-bottom:4px">Leaderboard</div>
    <div style="font-size:13px;color:var(--text3)">Cash: <strong style="color:var(--text)">₹${num(totalMoney)}</strong> · Props: <strong style="color:var(--text)">₹${num(totalPropVal)}</strong> · Bank: <strong style="color:var(--green)">₹${num(state.board.bankBalance)}</strong></div>
  </div>
  <div class="lb-card">
    ${stats.map((s,i)=>{
      const rc=i===0?'gold':i===1?'silver':i===2?'bronze':'';
      const re=i===0?'🥇':i===1?'🥈':i===2?'🥉':`#${i+1}`;
      const pct=Math.max(4,Math.round((s.total/maxTotal)*100));
      const mc=s.props.filter(p=>p.mortgaged).length;
      return`<div class="lb-row">
        <div class="lb-rank ${rc}">${re}</div>
        <div style="width:10px;height:10px;border-radius:50%;background:${s.team.color};flex-shrink:0"></div>
        <div style="flex:1;min-width:0">
          <div style="font-size:15px;font-weight:700;color:${s.team.color};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(s.team.name)}</div>
          <div style="font-size:12px;color:var(--text3);margin-top:2px">₹${num(s.balance)} cash · ${s.propCount} props${mc?` · <span style="color:var(--amber)">🔒${mc}</span>`:''}</div>
          <div class="lb-bar-wrap"><div class="lb-bar" style="width:${pct}%;background:${s.team.color}"></div></div>
          ${s.props.length?`<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:7px">${s.props.slice(0,5).map(p=>`<span class="prop-chip${p.mortgaged?' mortgaged':''}"><span class="color-dot" style="background:${COLORS[p.colorIdx??0]}"></span>${esc(p.name)}${p.mortgaged?' 🔒':''}</span>`).join('')}${s.props.length>5?`<span class="prop-chip">+${s.props.length-5}</span>`:''}</div>`:''}
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div style="font-size:18px;font-weight:800;color:${s.team.color}">₹${num(s.total)}</div>
          <div style="font-size:10px;color:var(--text3);margin-top:2px;font-weight:600;text-transform:uppercase;letter-spacing:.3px">Net worth</div>
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

// ── TEAMS ──
function teamsHTML(){
  if(!state.teams.length)return`<div class="empty"><span class="empty-icon">👥</span>No teams yet.<br>Tap + to add your first team.</div>`;
  return state.teams.map(team=>{
    const props=state.properties.filter(p=>p.ownedBy===team.id);
    const mc=props.filter(p=>p.mortgaged).length;
    return`<div class="team-card" style="--team-color:${team.color}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px">
        <div class="team-name" style="color:${team.color}">${esc(team.name)}</div>
        <div style="display:flex;gap:6px">
          <button class="btn sm" onclick="editTeam('${team.id}')">✏️</button>
          <button class="btn sm danger" onclick="deleteTeam('${team.id}')">✕</button>
        </div>
      </div>
      <div class="team-balance">₹${num(team.balance)}</div>
      <div style="font-size:12px;color:var(--text3);margin-bottom:12px">${props.length} propert${props.length!==1?'ies':'y'}${mc?` · <span style="color:var(--amber)">🔒 ${mc} mortgaged</span>`:''}</div>
      <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px">
        ${props.map(p=>`<span class="prop-chip${p.mortgaged?' mortgaged':''}"><span class="color-dot" style="background:${COLORS[p.colorIdx??0]}"></span>${esc(p.name)}${p.mortgaged?' 🔒':''}</span>`).join('')}
        ${!props.length?`<span style="font-size:12px;color:var(--text3)">No properties</span>`:''}
      </div>
      <div class="action-grid">
        <button class="action-btn success" onclick="openTransact('${team.id}','credit')"><span class="ab-icon">💚</span>Credit</button>
        <button class="action-btn danger" onclick="openTransact('${team.id}','debit')"><span class="ab-icon">🔴</span>Debit</button>
        <button class="action-btn success" onclick="passGo('${team.id}')"><span class="ab-icon">🚦</span>Pass GO</button>
        <button class="action-btn" onclick="openRent('${team.id}')"><span class="ab-icon">💸</span>Pay Rent</button>
        <button class="action-btn amber" onclick="openMortgage('${team.id}')"><span class="ab-icon">🔒</span>Mortgage</button>
        <button class="action-btn blue" onclick="openAssign('${team.id}')"><span class="ab-icon">📦</span>Assign</button>
        <button class="action-btn orange" onclick="promptAuctionForTeam('${team.id}')"><span class="ab-icon">🔨</span>Auction</button>
        <button class="action-btn danger" onclick="declareBankruptcy('${team.id}')"><span class="ab-icon">💀</span>Bankrupt</button>
      </div>
    </div>`;
  }).join('');
}

// ── PROPERTIES ──
function propertiesHTML(){
  const q=(state.propSearch||'').toLowerCase();
  const grouped={};
  state.properties.forEach(p=>{
    if(q&&!p.name.toLowerCase().includes(q)&&!(p.group||'').toLowerCase().includes(q))return;
    const g=p.group||'Ungrouped';
    if(!grouped[g])grouped[g]=[];
    grouped[g].push(p);
  });
  const groups=Object.entries(grouped);
  if(!state.properties.length)return`<div class="empty"><span class="empty-icon">🏠</span>No properties yet.<br>Tap + to add properties.</div>`;
  if(!groups.length)return`<div><div class="search-wrap"><span class="search-icon">🔍</span><input placeholder="Search properties…" value="${esc(state.propSearch||'')}" oninput="searchProps(this.value)"></div><div class="empty">No matches found.</div></div>`;
  return`<div>
    <div class="search-wrap"><span class="search-icon">🔍</span><input placeholder="Search properties…" value="${esc(state.propSearch||'')}" oninput="searchProps(this.value)"></div>
    ${groups.map(([gname,props])=>`
      <div class="group-header">${esc(gname)}</div>
      ${props.map(p=>{
        const owner=p.ownedBy?state.teams.find(t=>t.id===p.ownedBy):null;
        const mv=Math.floor((p.price||0)/2);
        return`<div class="prop-row${p.mortgaged?' mortgaged-row':''}">
          <div class="prop-left">
            <div class="color-bar" style="background:${COLORS[p.colorIdx??0]};height:38px${p.mortgaged?';opacity:.4':''}"></div>
            <div style="flex:1;min-width:0">
              <div class="prop-name">${esc(p.name)}${p.mortgaged?` <span style="font-size:10px;color:var(--amber)">🔒</span>`:''}</div>
              <div class="prop-meta">₹${num(p.price)} · Rent ${p.mortgaged?`<span style="color:var(--amber)">₹0 suspended</span>`:`₹${num(p.rent)}`}</div>
            </div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0">
            ${owner?`<span style="font-size:11px;font-weight:700;padding:3px 8px;border-radius:var(--r-pill);border:1px solid ${owner.color}44;background:${owner.color}18;color:${owner.color}">${esc(owner.name)}</span>`:`<span class="badge bank">🏦 Bank</span>`}
            <div style="display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end">
              ${owner&&!p.mortgaged?`<button class="btn sm amber" onclick="mortgageProp('${p.id}')">Mortgage</button>`:''}
              ${owner&&p.mortgaged?`<button class="btn sm success" onclick="unmortgageProp('${p.id}')">Unmortgage</button>`:''}
              ${!owner?`<button class="btn sm success" onclick="openBuyProp('${p.id}')">Buy</button><button class="btn sm blue" onclick="openAuctionForProp('${p.id}')">🔨</button>`:''}
              <button class="btn sm" onclick="editProp('${p.id}')">✏️</button>
              <button class="btn sm danger" onclick="deleteProp('${p.id}')">✕</button>
            </div>
          </div>
        </div>`;
      }).join('')}
    `).join('')}
  </div>`;
}

// ── BOARD ──
function boardHTML(){
  const total=state.properties.length;
  const owned=state.properties.filter(p=>p.ownedBy).length;
  const mortgaged=state.properties.filter(p=>p.mortgaged).length;
  const bankProps=state.properties.filter(p=>!p.ownedBy);
  const totalCash=state.teams.reduce((a,t)=>a+t.balance,0);
  return`<div>
    <div style="font-size:24px;font-weight:900;letter-spacing:-.5px;margin-bottom:16px">Board</div>
    <div class="card">
      <div class="card-title">Overview</div>
      <div class="stats-grid">
        <div class="stat-box"><div class="stat-num">${total}</div><div class="stat-label">Properties</div></div>
        <div class="stat-box"><div class="stat-num">${owned}</div><div class="stat-label">Owned</div></div>
        <div class="stat-box"><div class="stat-num" style="color:var(--amber)">${mortgaged}</div><div class="stat-label">Mortgaged</div></div>
        <div class="stat-box"><div class="stat-num" style="color:var(--blue)">${bankProps.length}</div><div class="stat-label">With Bank</div></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px">
        <div style="padding:12px;background:var(--surface2);border-radius:var(--r-sm);border:1px solid var(--border)">
          <div style="font-size:11px;color:var(--text3);margin-bottom:4px;font-weight:700;text-transform:uppercase;letter-spacing:.4px">Player Cash</div>
          <div style="font-size:20px;font-weight:800">₹${num(totalCash)}</div>
        </div>
        <div style="padding:12px;background:var(--green-bg);border-radius:var(--r-sm);border:1px solid var(--green-border)">
          <div style="display:flex;justify-content:space-between;align-items:flex-start">
            <div>
              <div style="font-size:11px;color:var(--green);margin-bottom:4px;font-weight:700;text-transform:uppercase;letter-spacing:.4px">Bank Balance</div>
              <div style="font-size:20px;font-weight:800;color:var(--green)">₹${num(state.board.bankBalance)}</div>
            </div>
            <button class="btn sm success" onclick="openBankAdjust()">Edit</button>
          </div>
        </div>
      </div>
    </div>
    ${bankProps.length?`<div class="card">
      <div class="card-title">🏦 Bank Properties — Available</div>
      ${bankProps.map(p=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border)">
        <div style="display:flex;align-items:center;gap:9px">
          <div style="width:10px;height:26px;border-radius:3px;background:${COLORS[p.colorIdx??0]}"></div>
          <div><div style="font-size:14px;font-weight:600">${esc(p.name)}</div><div style="font-size:12px;color:var(--text3)">₹${num(p.price)} · Rent ₹${num(p.rent)}</div></div>
        </div>
        <div style="display:flex;gap:6px">
          <button class="btn sm success" onclick="setTab('properties');setTimeout(()=>openBuyProp('${p.id}'),50)">Buy</button>
          <button class="btn sm blue" onclick="setTab('properties');setTimeout(()=>openAuctionForProp('${p.id}'),50)">🔨 Auction</button>
        </div>
      </div>`).join('')}
    </div>`:''}
    <div class="card" style="cursor:pointer" onclick="setTab('leaderboard')">
      <div class="card-title">🏆 Leaderboard Preview</div>
      ${state.teams.length?[...state.teams].sort((a,b)=>{
        const av=state.properties.filter(p=>p.ownedBy===a.id).reduce((s,p)=>s+(p.price||0),0);
        const bv=state.properties.filter(p=>p.ownedBy===b.id).reduce((s,p)=>s+(p.price||0),0);
        return(b.balance+bv)-(a.balance+av);
      }).map((t,i)=>{
        const tv=state.properties.filter(p=>p.ownedBy===t.id).reduce((s,p)=>s+(p.price||0),0);
        return`<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)${i===state.teams.length-1?';border:none':''}">
          <span style="font-weight:800;color:var(--text3);font-size:13px;width:22px">#${i+1}</span>
          <div style="width:8px;height:8px;border-radius:50%;background:${t.color}"></div>
          <div style="flex:1;font-weight:600;font-size:14px">${esc(t.name)}</div>
          <div style="font-weight:700;color:${t.color}">₹${num(t.balance+tv)}</div>
        </div>`;
      }).join(''):`<div style="color:var(--text3);font-size:14px">No teams yet</div>`}
      <div style="font-size:12px;color:var(--accent2);margin-top:10px;text-align:center">Tap to see full leaderboard →</div>
    </div>
  </div>`;
}

// ── TRANSACTIONS ──
function transactionsHTML(){
  if(!state.transactions.length)return`<div class="empty"><span class="empty-icon">💸</span>No transactions yet.</div>`;
  const sorted=[...state.transactions].sort((a,b)=>b.time-a.time);
  const typeIcon={mortgage:'🔒',unmortgage:'🔓',auction:'🔨',rent:'💸',bankruptcy:'💀',credit:'💚',debit:'🔴',admin:'🔧'};
  const typeColor={mortgage:'amber',unmortgage:'green',rent:'blue',bankruptcy:'red',credit:'green',debit:'red',admin:'orange'};
  return`<div>
    <div style="font-size:24px;font-weight:900;letter-spacing:-.5px;margin-bottom:16px">Transaction Log</div>
    <div class="card">
      <div class="card-title">Recent (${sorted.length})</div>
      ${sorted.slice(0,120).map(tx=>{
        const team=state.teams.find(t=>t.id===tx.teamId);
        const icon=typeIcon[tx.type]||'💱';
        const icoColor=typeColor[tx.type]||'';
        return`<div class="trans-row">
          <div style="width:36px;height:36px;border-radius:var(--r-xs);background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0">${icon}</div>
          <div style="flex:1;min-width:0">
            <div style="font-size:12px;font-weight:700;color:${team?.color||(tx.teamId==='bank'?'var(--green)':'var(--text3)')};margin-bottom:1px">${esc(team?.name||(tx.teamId==='bank'?'Bank':'System'))}</div>
            <div style="font-size:13px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(tx.note||tx.type||'Transaction')}</div>
            <div style="font-size:11px;color:var(--text3);margin-top:2px">${formatTime(tx.time)}</div>
          </div>
          <div style="font-size:16px;font-weight:800;flex-shrink:0;color:${tx.amount>0?'var(--green)':tx.amount<0?'var(--red)':'var(--text3)'}">${tx.amount>0?'+':tx.amount<0?'':tx.amount===0?'—':''}${tx.amount!==0?'₹'+num(Math.abs(tx.amount)):''}</div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

// ── SETTINGS ──

    <div style="font-size:24px;font-weight:900;letter-spacing:-.5px;margin-bottom:16px">Settings</div>

      <div class="form-row"><label>Board Name</label><input type="text" id="board-name" value="${esc(state.board.name)}" oninput="state.board.name=this.value;document.getElementById('header-board-name').textContent=this.value"></div>
      <div class="form-row"><label>Starting Player Money (₹)</label><input type="number" id="start-money" value="${state.board.startMoney}" oninput="state.board.startMoney=parseInt(this.value)||0"></div>
      <div class="form-row"><label>Starting Bank Balance (₹)</label><input type="number" id="start-bank-money" value="${state.board.bankBalance}" oninput="state.board.bankBalance=parseInt(this.value)||0"></div>
      <button class="btn primary" style="margin-top:6px" onclick="saveBoardSettings()">Save Settings</button>

    <div class="admin-section">

          <span class="aa-sub">Force all future debit/credit inputs to positive only</span>

        <button class="admin-action-btn" onclick="openAdminAddTeamWithBank()">

          <span class="aa-label">Add Player (Bank-Aware)</span>

        <button class="admin-action-btn" onclick="openAdminEditBalance()">

    <div class="card">

      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px">
        <button class="btn" onclick="exportData()">📥 Export JSON</button>
        <button class="btn danger" onclick="resetAll()">⚠️ Reset All Data</button>
      </div>
