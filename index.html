<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Monopoly Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#07080d;
  --s1:#0e0f18;
  --s2:#14151f;
  --s3:#1c1d2a;
  --s4:#252636;
  --bd:rgba(255,255,255,.06);
  --bd2:rgba(255,255,255,.11);
  --bd3:rgba(255,255,255,.18);
  --tx:#eeeef5;
  --tx2:#8b8aaa;
  --tx3:#4a4968;
  --ac:#5b7fff;
  --ac2:#8ba4ff;
  --ac-g:rgba(91,127,255,.18);
  --ac-g2:rgba(91,127,255,.08);
  --g:#22d3a0;--g-bg:rgba(34,211,160,.1);--g-bd:rgba(34,211,160,.22);
  --r:#ff5757;--r-bg:rgba(255,87,87,.1);--r-bd:rgba(255,87,87,.22);
  --am:#ffb830;--am-bg:rgba(255,184,48,.1);--am-bd:rgba(255,184,48,.22);
  --bl:#38bdf8;--bl-bg:rgba(56,189,248,.1);--bl-bd:rgba(56,189,248,.22);
  --pu:#a78bfa;--pu-bg:rgba(167,139,250,.1);--pu-bd:rgba(167,139,250,.22);
  --or:#fb923c;--or-bg:rgba(251,146,60,.1);--or-bd:rgba(251,146,60,.22);
  --rr:16px;--rs:10px;--rxs:7px;--rpill:999px;
  --ff:'DM Sans',sans-serif;
  --ffd:'Syne',sans-serif;
  --nh:60px;
  --hh:52px;
  --safe-b:env(safe-area-inset-bottom,0px);
}

html{height:100%;overflow:hidden}
body{font-family:var(--ff);background:var(--bg);color:var(--tx);height:100%;overflow:hidden;font-size:15px;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}

/* ═══ SCROLLBAR ═════════════════════════════════════════════════════════════ */
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--s4);border-radius:4px}

/* ═══ LOGIN ═════════════════════════════════════════════════════════════════ */
#login-screen{
  position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  padding:20px;z-index:999;
  background:radial-gradient(ellipse 100% 70% at 60% 0%,rgba(91,127,255,.12) 0%,transparent 65%),
             radial-gradient(ellipse 60% 50% at 20% 100%,rgba(34,211,160,.07) 0%,transparent 60%),
             var(--bg);
}
.login-wrap{width:100%;max-width:380px}
.login-brand{text-align:center;margin-bottom:28px}
.login-icon{
  width:60px;height:60px;margin:0 auto 12px;border-radius:18px;
  background:linear-gradient(135deg,var(--ac),var(--g));
  display:flex;align-items:center;justify-content:center;font-size:26px;
  box-shadow:0 0 40px rgba(91,127,255,.3),0 8px 24px rgba(0,0,0,.4);
}
.login-h{font-family:var(--ffd);font-size:24px;font-weight:800;letter-spacing:-.4px}
.login-sub{font-size:13px;color:var(--tx3);margin-top:3px}
.login-card{
  background:var(--s1);border:1px solid var(--bd2);border-radius:22px;
  padding:26px 22px;box-shadow:0 24px 64px rgba(0,0,0,.6),0 0 0 1px rgba(255,255,255,.03);
}
.login-tabs{display:flex;background:var(--s2);border-radius:var(--rs);padding:3px;gap:3px;margin-bottom:20px}
.ltab{flex:1;padding:8px;border:none;background:none;color:var(--tx3);font-size:13px;font-family:var(--ffd);font-weight:700;border-radius:8px;cursor:pointer;transition:all .15s;letter-spacing:.2px}
.ltab.active{background:var(--s4);color:var(--tx);box-shadow:0 1px 6px rgba(0,0,0,.5)}
.lfield{margin-bottom:14px}
.lfield label{font-size:11px;color:var(--tx3);display:block;margin-bottom:5px;font-weight:600;letter-spacing:.6px;text-transform:uppercase}
.lfield input{
  width:100%;padding:11px 13px;background:var(--s2);border:1px solid var(--bd2);
  border-radius:var(--rxs);color:var(--tx);font-family:var(--ff);font-size:14px;
  outline:none;transition:border-color .15s,box-shadow .15s;
}
.lfield input:focus{border-color:var(--ac);box-shadow:0 0 0 3px var(--ac-g)}
.login-btn{
  width:100%;padding:13px;background:linear-gradient(135deg,var(--ac),#4060ff);
  color:#fff;border:none;border-radius:var(--rxs);font-family:var(--ffd);
  font-size:14px;font-weight:700;cursor:pointer;letter-spacing:.3px;
  transition:all .15s;box-shadow:0 4px 20px rgba(91,127,255,.35);margin-top:4px;
}
.login-btn:hover{opacity:.88;transform:translateY(-1px)}
.login-btn:active{transform:scale(.98);opacity:1}
.login-err{color:var(--r);font-size:12px;text-align:center;margin-top:10px;padding:9px;background:var(--r-bg);border-radius:var(--rxs);border:1px solid var(--r-bd)}

/* ═══ APP SHELL ═══════════════════════════════════════════════════════════ */
#app{display:none;height:100%;flex-direction:column;overflow:hidden}
#app.visible{display:flex}

/* ═══ HEADER ══════════════════════════════════════════════════════════════ */
.hdr{
  height:var(--hh);flex-shrink:0;
  background:rgba(7,8,13,.9);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-bottom:1px solid var(--bd);padding:0 14px;
  display:flex;align-items:center;justify-content:space-between;
  position:relative;z-index:50;
}
.hdr-left{display:flex;align-items:center;gap:10px}
.hdr-dot{
  width:28px;height:28px;border-radius:9px;flex-shrink:0;
  background:linear-gradient(135deg,var(--ac),var(--g));
  display:flex;align-items:center;justify-content:center;font-size:13px;
  box-shadow:0 0 16px rgba(91,127,255,.3);
}
.hdr-name{font-family:var(--ffd);font-size:15px;font-weight:700;letter-spacing:-.2px;line-height:1.1}
.hdr-board{font-size:10px;color:var(--tx3);font-weight:400;margin-top:1px}
.hdr-right{display:flex;align-items:center;gap:6px}
.sync-chip{
  display:flex;align-items:center;gap:5px;padding:4px 9px;
  background:var(--s2);border:1px solid var(--bd);border-radius:var(--rpill);
  font-size:10px;color:var(--tx3);font-weight:500;
}
.sdot{width:5px;height:5px;border-radius:50%;background:var(--g);flex-shrink:0}
.sdot.off{background:var(--r)}
.sdot.sync{background:var(--am);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.hbtn{
  background:var(--s2);border:1px solid var(--bd);color:var(--tx2);
  padding:6px 10px;border-radius:var(--rxs);cursor:pointer;font-size:11px;
  font-family:var(--ff);font-weight:600;transition:all .15s;white-space:nowrap;
}
.hbtn:hover{background:var(--s3);color:var(--tx)}

/* ═══ LAYOUT ══════════════════════════════════════════════════════════════ */
.layout{display:flex;flex:1;overflow:hidden;min-height:0}

/* sidebar — desktop only */
.sidebar{
  display:none;width:200px;flex-shrink:0;
  background:var(--s1);border-right:1px solid var(--bd);
  overflow-y:auto;padding:10px 8px;
}
.snav-item{
  display:flex;align-items:center;gap:11px;padding:10px 12px;
  border-radius:var(--rs);cursor:pointer;font-size:13px;font-weight:500;
  color:var(--tx2);transition:all .15s;margin-bottom:1px;
  border:none;background:none;width:100%;font-family:var(--ff);text-align:left;
}
.snav-item.active{background:var(--ac-g2);color:var(--ac2);font-weight:600;border:1px solid var(--ac-g)}
.snav-item:hover:not(.active){background:var(--s2);color:var(--tx)}
.snav-icon{font-size:15px;width:18px;text-align:center;flex-shrink:0}
.snav-sep{height:1px;background:var(--bd);margin:8px 6px}

/* main scroll area */
.main{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.content{padding:14px;max-width:800px;margin:0 auto;padding-bottom:calc(var(--nh) + 20px + var(--safe-b))}

/* ═══ BOTTOM NAV (mobile) ═════════════════════════════════════════════════ */
.bnav{
  position:fixed;bottom:0;left:0;right:0;
  height:calc(var(--nh) + var(--safe-b));
  padding-bottom:var(--safe-b);
  background:rgba(10,11,18,.95);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
  border-top:1px solid var(--bd);
  display:flex;align-items:stretch;z-index:50;padding-left:4px;padding-right:4px;
}
.bni{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;cursor:pointer;border:none;background:none;
  color:var(--tx3);font-family:var(--ffd);font-size:9px;font-weight:700;
  letter-spacing:.4px;text-transform:uppercase;padding:6px 2px;
  border-radius:var(--rs);transition:color .15s;position:relative;
}
.bni.active{color:var(--ac2)}
.bni-icon{font-size:18px;line-height:1;transition:transform .15s}
.bni.active .bni-icon{transform:scale(1.2)}
.bni::before{
  content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:0;height:2px;background:linear-gradient(90deg,var(--ac),var(--g));
  border-radius:0 0 4px 4px;transition:width .2s;
}
.bni.active::before{width:28px}

/* ═══ FAB ════════════════════════════════════════════════════════════════ */
.fab{
  position:fixed;bottom:calc(var(--nh) + 14px + var(--safe-b));right:16px;
  width:48px;height:48px;border-radius:50%;
  background:linear-gradient(135deg,var(--ac),#4060ff);
  color:#fff;border:none;font-size:22px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 24px rgba(91,127,255,.45);z-index:40;
  transition:transform .15s,box-shadow .15s;
}
.fab:hover{transform:scale(1.08);box-shadow:0 6px 32px rgba(91,127,255,.55)}
.fab:active{transform:scale(.92)}

/* ═══ CARDS ══════════════════════════════════════════════════════════════ */
.card{background:var(--s1);border:1px solid var(--bd);border-radius:var(--rr);padding:15px;margin-bottom:11px}
.ct{font-size:10px;color:var(--tx3);margin-bottom:11px;font-weight:700;text-transform:uppercase;letter-spacing:.9px;font-family:var(--ffd)}

/* ═══ BUTTONS ════════════════════════════════════════════════════════════ */
.btn{
  padding:8px 13px;border-radius:var(--rxs);border:1px solid var(--bd2);
  background:var(--s2);color:var(--tx);cursor:pointer;font-size:12px;
  font-weight:600;font-family:var(--ff);transition:all .12s;
  display:inline-flex;align-items:center;gap:5px;white-space:nowrap;
}
.btn:hover{background:var(--s3);border-color:var(--bd3)}
.btn:active{transform:scale(.96)}
.btn.pri{background:linear-gradient(135deg,var(--ac),#4060ff);color:#fff;border-color:transparent;box-shadow:0 2px 14px rgba(91,127,255,.35)}
.btn.pri:hover{opacity:.88}
.btn.suc{background:var(--g-bg);color:var(--g);border-color:var(--g-bd)}
.btn.dan{background:var(--r-bg);color:var(--r);border-color:var(--r-bd)}
.btn.amb{background:var(--am-bg);color:var(--am);border-color:var(--am-bd)}
.btn.blu{background:var(--bl-bg);color:var(--bl);border-color:var(--bl-bd)}
.btn.pur{background:var(--pu-bg);color:var(--pu);border-color:var(--pu-bd)}
.btn.orn{background:var(--or-bg);color:var(--or);border-color:var(--or-bd)}
.btn.sm{padding:5px 9px;font-size:11px}
.btn.lg{padding:12px 18px;font-size:13px;width:100%;justify-content:center;border-radius:var(--rs)}
.btn:disabled{opacity:.3;cursor:not-allowed;transform:none;pointer-events:none}

/* ═══ INPUTS ════════════════════════════════════════════════════════════ */
input,select,textarea{
  width:100%;padding:10px 12px;border:1px solid var(--bd2);border-radius:var(--rxs);
  background:var(--s2);color:var(--tx);font-size:13px;outline:none;
  font-family:var(--ff);transition:border-color .15s,box-shadow .15s;
  -webkit-appearance:none;-moz-appearance:none;appearance:none;
}
input:focus,select:focus,textarea:focus{border-color:var(--ac);box-shadow:0 0 0 3px var(--ac-g)}
select option{background:var(--s2)}
.fr{margin-bottom:13px}
.fr label{font-size:10px;color:var(--tx3);display:block;margin-bottom:5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:9px}

/* ═══ MODAL ════════════════════════════════════════════════════════════ */
.moverlay{
  position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);display:flex;align-items:flex-end;
  justify-content:center;z-index:200;animation:fIn .15s ease;
}
@keyframes fIn{from{opacity:0}to{opacity:1}}
.modal{
  background:var(--s1);border:1px solid var(--bd2);border-radius:22px 22px 0 0;
  padding:22px 18px;width:100%;max-height:90vh;overflow-y:auto;
  animation:sUp .2s cubic-bezier(.4,0,.2,1);
  padding-bottom:calc(22px + var(--safe-b));
}
@keyframes sUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.mhandle{width:32px;height:3px;background:var(--bd3);border-radius:99px;margin:0 auto 18px;display:block}
.mtitle{font-family:var(--ffd);font-size:19px;font-weight:800;margin-bottom:16px;letter-spacing:-.3px}
.mclose{float:right;background:var(--s3);border:1px solid var(--bd);font-size:13px;cursor:pointer;color:var(--tx2);width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--ff);line-height:1}

/* desktop modal center */
@media(min-width:768px){
  .moverlay{align-items:center}
  .modal{border-radius:var(--rr);max-width:480px;padding:26px 22px}
}

/* ═══ PLAYER CARDS ═══════════════════════════════════════════════════════ */
.pcard{
  background:var(--s1);border:1px solid var(--bd);border-radius:var(--rr);
  padding:15px;margin-bottom:10px;position:relative;overflow:hidden;
  transition:border-color .15s;
}
.pcard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--tc,var(--ac));border-radius:0 2px 2px 0}
.pcard:hover{border-color:var(--bd2)}
.pn{font-family:var(--ffd);font-size:16px;font-weight:700;letter-spacing:-.2px}
.pb{font-size:26px;font-weight:800;letter-spacing:-.5px;margin:2px 0 8px;font-family:var(--ffd)}
.agrid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:11px}
.abtn{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:9px 4px;background:var(--s2);border:1px solid var(--bd);
  border-radius:var(--rs);cursor:pointer;font-family:var(--ff);
  font-size:10px;font-weight:600;color:var(--tx2);letter-spacing:.2px;
  text-transform:uppercase;transition:all .12s;border:none;
}
.abtn:hover{background:var(--s3);color:var(--tx)}
.abtn:active{transform:scale(.95)}
.abtn .ai{font-size:16px}
.abtn.suc{background:var(--g-bg);color:var(--g)}
.abtn.dan{background:var(--r-bg);color:var(--r)}
.abtn.amb{background:var(--am-bg);color:var(--am)}
.abtn.blu{background:var(--bl-bg);color:var(--bl)}
.abtn.orn{background:var(--or-bg);color:var(--or)}
.abtn.pur{background:var(--pu-bg);color:var(--pu)}

/* ═══ LEADERBOARD ════════════════════════════════════════════════════════ */
.lbcard{background:var(--s1);border:1px solid var(--bd);border-radius:var(--rr);overflow:hidden;margin-bottom:11px}
.lbrow{display:flex;align-items:center;padding:13px 15px;border-bottom:1px solid var(--bd);gap:11px}
.lbrow:last-child{border-bottom:none}
.lbrank{font-family:var(--ffd);font-size:20px;font-weight:900;color:var(--tx3);width:30px;text-align:center;flex-shrink:0}
.lbrank.g1{color:var(--am)}
.lbrank.g2{color:#94a3b8}
.lbrank.g3{color:#b45309}
.lb-bar-wrap{height:2px;background:var(--s3);border-radius:99px;margin-top:6px;overflow:hidden}
.lb-bar{height:100%;border-radius:99px;transition:width .6s cubic-bezier(.4,0,.2,1)}

/* ═══ PROPERTY ROWS ══════════════════════════════════════════════════════ */
.prow{
  display:flex;align-items:center;justify-content:space-between;
  padding:11px;border:1px solid var(--bd);border-radius:var(--rs);
  margin-bottom:7px;background:var(--s1);gap:9px;transition:border-color .15s;
}
.prow:hover{border-color:var(--bd2)}
.prow.mort{border-color:var(--am-bd);background:rgba(255,184,48,.03)}
.pleft{display:flex;align-items:center;gap:9px;flex:1;min-width:0}
.cbar{width:10px;border-radius:3px;flex-shrink:0}
.pname{font-size:13px;font-weight:600}
.pmeta{font-size:11px;color:var(--tx3);margin-top:2px}
.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 7px;border-radius:var(--rpill);font-size:10px;font-weight:600;border:1px solid}
.badge.owned{background:var(--g-bg);color:var(--g);border-color:var(--g-bd)}
.badge.free{background:var(--s2);color:var(--tx3);border-color:var(--bd)}
.badge.mortg{background:var(--am-bg);color:var(--am);border-color:var(--am-bd)}
.badge.bank{background:var(--bl-bg);color:var(--bl);border-color:var(--bl-bd)}
.badge.auct{background:var(--pu-bg);color:var(--pu);border-color:var(--pu-bd)}

/* ═══ TRANSACTIONS ═══════════════════════════════════════════════════════ */
.trow{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--bd);gap:9px}
.trow:last-child{border-bottom:none}
.tico{width:34px;height:34px;border-radius:var(--rxs);background:var(--s2);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}

/* ═══ STATS ══════════════════════════════════════════════════════════════ */
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:11px}
.sbox{background:var(--s2);border-radius:var(--rs);padding:13px;text-align:center;border:1px solid var(--bd)}
.snum{font-family:var(--ffd);font-size:22px;font-weight:900;letter-spacing:-.5px}
.slbl{font-size:10px;color:var(--tx3);margin-top:3px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}

/* ═══ OVERVIEW / BANK TAB ════════════════════════════════════════════════ */
.economy-card{
  background:linear-gradient(135deg,rgba(91,127,255,.12),rgba(34,211,160,.08));
  border:1px solid rgba(91,127,255,.2);border-radius:var(--rr);padding:16px;margin-bottom:11px;
}
.eco-title{font-family:var(--ffd);font-size:11px;font-weight:700;color:var(--ac2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px}
.eco-val{font-family:var(--ffd);font-size:30px;font-weight:900;letter-spacing:-.8px}
.eco-sub{font-size:11px;color:var(--tx3);margin-top:3px}
.bank-hero{
  background:linear-gradient(135deg,rgba(34,211,160,.1),rgba(34,211,160,.04));
  border:1px solid var(--g-bd);border-radius:var(--rr);padding:16px;margin-bottom:11px;
}
.ownership-row{
  display:flex;align-items:center;gap:11px;padding:11px 14px;
  border-bottom:1px solid var(--bd);
}
.ownership-row:last-child{border-bottom:none}
.ow-bar-bg{flex:1;height:5px;background:var(--s3);border-radius:99px;overflow:hidden}
.ow-bar{height:100%;border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1)}

/* ═══ SEARCH ════════════════════════════════════════════════════════════ */
.swrap{position:relative;margin-bottom:13px}
.swrap input{padding-left:36px;background:var(--s1)}
.sicon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--tx3);font-size:13px;pointer-events:none}

/* ═══ SETTINGS ══════════════════════════════════════════════════════════ */
.admin-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.adm-btn{
  background:var(--s2);border:1px solid var(--bd);border-radius:var(--rs);
  padding:13px;cursor:pointer;transition:all .12s;text-align:left;
  font-family:var(--ff);display:flex;flex-direction:column;gap:3px;
}
.adm-btn:hover{background:var(--s3);border-color:var(--bd2)}
.adm-icon{font-size:20px;margin-bottom:4px}
.adm-lbl{font-size:12px;font-weight:700;color:var(--tx);font-family:var(--ffd)}
.adm-sub{font-size:10px;color:var(--tx3);line-height:1.4}
.sep{height:1px;background:var(--bd);margin:13px 0}

/* ═══ INFO BOXES ════════════════════════════════════════════════════════ */
.info{padding:10px 13px;font-size:12px;color:var(--tx3);line-height:1.6;margin-bottom:11px;border-radius:var(--rxs);border:1px solid var(--bd)}
.info.amb{border-color:var(--am-bd);background:var(--am-bg);color:var(--am)}
.info.blu{border-color:var(--bl-bd);background:var(--bl-bg);color:var(--bl)}
.info.red{border-color:var(--r-bd);background:var(--r-bg);color:var(--r)}
.info.grn{border-color:var(--g-bd);background:var(--g-bg);color:var(--g)}

/* ═══ MISC ══════════════════════════════════════════════════════════════ */
.empty{text-align:center;color:var(--tx3);padding:48px 20px;font-size:13px;line-height:1.7}
.empty-icon{font-size:40px;margin-bottom:12px;display:block}
.gh{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--tx3);margin:18px 0 8px;padding-left:2px;font-family:var(--ffd)}
.divider{height:1px;background:var(--bd);margin:13px 0}
.page-title{font-family:var(--ffd);font-size:22px;font-weight:800;letter-spacing:-.4px;margin-bottom:14px}
.cdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;display:inline-block}
.pchip{display:inline-flex;align-items:center;gap:3px;padding:3px 7px;border-radius:var(--rpill);font-size:10px;border:1px solid var(--bd);background:var(--s2);color:var(--tx2);font-weight:500}
.pchip.mort{border-color:var(--am-bd);background:var(--am-bg);color:var(--am)}

/* ═══ AUCTION ════════════════════════════════════════════════════════════ */
.bid-row{display:flex;gap:7px;align-items:center;padding:10px 11px;background:var(--s2);border-radius:var(--rs);margin-bottom:6px;border:1px solid var(--bd)}

/* ═══ TOASTS ═════════════════════════════════════════════════════════════ */
#toast-cnt{
  position:fixed;bottom:calc(var(--nh) + 10px + var(--safe-b));
  left:50%;transform:translateX(-50%);
  z-index:999;display:flex;flex-direction:column;align-items:center;
  gap:6px;pointer-events:none;width:calc(100% - 28px);max-width:340px;
}
.toast{
  background:var(--s3);border:1px solid var(--bd2);color:var(--tx);
  padding:10px 16px;border-radius:var(--rpill);font-size:12px;font-weight:600;
  box-shadow:0 6px 28px rgba(0,0,0,.6);animation:tIn .22s cubic-bezier(.4,0,.2,1);
  white-space:nowrap;max-width:100%;overflow:hidden;text-overflow:ellipsis;
}
.toast.suc{background:var(--g-bg);color:var(--g);border-color:var(--g-bd)}
.toast.err{background:var(--r-bg);color:var(--r);border-color:var(--r-bd)}
.toast.amb{background:var(--am-bg);color:var(--am);border-color:var(--am-bd)}
@keyframes tIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ═══ DESKTOP BREAKPOINT ═════════════════════════════════════════════════ */
@media(min-width:768px){
  :root{--nh:0px}
  .bnav{display:none}
  .sidebar{display:block}
  .fab{bottom:20px}
  #toast-cnt{bottom:16px}
  .content{padding-bottom:20px}
}

/* ═══ COLOR SWATCHES ═════════════════════════════════════════════════════ */
.cswatch{width:32px;height:32px;border-radius:50%;cursor:pointer;transition:all .15s;border:2px solid transparent}
.cswatch.sel{box-shadow:0 0 0 3px var(--ac),0 0 0 5px var(--bg)}
</style>
</head>
<body>

<!-- ═══ LOGIN ═══ -->
<div id="login-screen">
  <div class="login-wrap">
    <div class="login-brand">
      <div class="login-icon">🎲</div>
      <div class="login-h">Monopoly Tracker</div>
      <div class="login-sub">Real-time game management</div>
    </div>
    <div class="login-card">
      <div class="login-tabs">
        <button class="ltab active" id="ltab-login" onclick="switchLTab('login')">Login</button>
        <button class="ltab" id="ltab-register" onclick="switchLTab('register')">Register</button>
      </div>
      <div class="lfield"><label>Username</label><input type="text" id="l-user" autocomplete="username" placeholder="your username"></div>
      <div class="lfield"><label>Password</label><input type="password" id="l-pass" autocomplete="current-password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <button class="login-btn" onclick="doLogin()">Continue →</button>
      <div id="login-err"></div>
    </div>
  </div>
</div>

<!-- ═══ APP ═══ -->
<div id="app">
  <div class="hdr">
    <div class="hdr-left">
      <div class="hdr-dot">🎲</div>
      <div>
        <div class="hdr-name">Monopoly</div>
        <div class="hdr-board" id="hdr-board">Loading…</div>
      </div>
    </div>
    <div class="hdr-right">
      <div class="sync-chip"><div class="sdot" id="sdot"></div><span id="sync-lbl">Live</span></div>
      <button class="hbtn" onclick="doLogout()">Sign out</button>
    </div>
  </div>

  <div class="layout">
    <!-- Sidebar (desktop) -->
    <div class="sidebar" id="sidebar">
      <div style="padding:8px 4px 6px;font-size:10px;color:var(--tx3);font-weight:700;text-transform:uppercase;letter-spacing:.8px;font-family:var(--ffd)">Navigation</div>
      <button class="snav-item active" id="sn-home" onclick="setTab('home')"><span class="snav-icon">🏠</span>Home</button>
      <button class="snav-item" id="sn-teams" onclick="setTab('teams')"><span class="snav-icon">👥</span>Players</button>
      <button class="snav-item" id="sn-properties" onclick="setTab('properties')"><span class="snav-icon">🏘️</span>Properties</button>
      <button class="snav-item" id="sn-leaderboard" onclick="setTab('leaderboard')"><span class="snav-icon">🏆</span>Leaderboard</button>
      <button class="snav-item" id="sn-bank" onclick="setTab('bank')"><span class="snav-icon">🏦</span>Bank & Ownership</button>
      <button class="snav-item" id="sn-transactions" onclick="setTab('transactions')"><span class="snav-icon">💸</span>Transactions</button>
      <div class="snav-sep"></div>
      <button class="snav-item" id="sn-settings" onclick="setTab('settings')"><span class="snav-icon">⚙️</span>Settings</button>
    </div>

    <!-- Main content -->
    <div class="main" id="main-scroll">
      <div class="content" id="content"></div>
    </div>
  </div>

  <!-- Bottom nav (mobile) -->
  <nav class="bnav">
    <button class="bni active" id="bn-home" onclick="setTab('home')"><span class="bni-icon">🏠</span>Home</button>
    <button class="bni" id="bn-teams" onclick="setTab('teams')"><span class="bni-icon">👥</span>Players</button>
    <button class="bni" id="bn-properties" onclick="setTab('properties')"><span class="bni-icon">🏘️</span>Props</button>
    <button class="bni" id="bn-leaderboard" onclick="setTab('leaderboard')"><span class="bni-icon">🏆</span>Board</button>
    <button class="bni" id="bn-bank" onclick="setTab('bank')"><span class="bni-icon">🏦</span>Bank</button>
    <button class="bni" id="bn-settings" onclick="setTab('settings')"><span class="bni-icon">⚙️</span>Settings</button>
  </nav>
</div>

<!-- FAB -->
<button class="fab" id="fab" onclick="onFab()" style="display:none">＋</button>
<!-- Toasts -->
<div id="toast-cnt"></div>
<!-- Modal -->
<div id="modal-root"></div>

<script>
// ══════════════════════════════════════════════════════════
// CONSTANTS
// ══════════════════════════════════════════════════════════
const COLORS=['#ef4444','#f97316','#eab308','#22c55e','#14b8a6','#3b82f6','#8b5cf6','#ec4899','#06b6d4','#84cc16','#f43f5e','#a78bfa'];
const API='';
let token=localStorage.getItem('mt_token')||'';

// ══════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════
let state={
  board:{name:'My Monopoly Board',startMoney:1500,bankBalance:2000,goSalary:200},
  teams:[],properties:[],transactions:[],
  activeTab:'home',modal:null,propSearch:'',txPage:0
};
let saveTimer=null;
let es=null;

// ══════════════════════════════════════════════════════════
// AUTH
// ══════════════════════════════════════════════════════════
function switchLTab(t){
  document.querySelectorAll('.ltab').forEach(x=>x.classList.remove('active'));
  document.getElementById('ltab-'+t).classList.add('active');
  document.getElementById('l-pass').autocomplete=t==='login'?'current-password':'new-password';
}
async function doLogin(){
  const tab=document.getElementById('ltab-login').classList.contains('active')?'login':'register';
  const user=document.getElementById('l-user').value.trim();
  const pass=document.getElementById('l-pass').value;
  const errEl=document.getElementById('login-err');
  errEl.innerHTML='';
  if(!user||!pass){errEl.innerHTML='<div class="login-err">Fill all fields</div>';return;}
  try{
    const r=await fetch(`${API}/api/${tab}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:user,password:pass})});
    const d=await r.json();
    if(!r.ok){errEl.innerHTML=`<div class="login-err">${d.error||'Error'}</div>`;return;}
    token=d.token;localStorage.setItem('mt_token',token);
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').classList.add('visible');
    await loadState();
    connectSSE();
  }catch(e){errEl.innerHTML='<div class="login-err">Connection error</div>';}
}
async function doLogout(){
  try{await fetch(`${API}/api/logout`,{method:'POST',headers:{Authorization:'Bearer '+token}});}catch(e){}
  token='';localStorage.removeItem('mt_token');
  location.reload();
}

// ══════════════════════════════════════════════════════════
// SERVER SYNC
// ══════════════════════════════════════════════════════════
function setSyncStatus(s){
  const dot=document.getElementById('sdot');
  const lbl=document.getElementById('sync-lbl');
  if(!dot)return;
  dot.className='sdot'+(s==='off'?' off':s==='sync'?' sync':'');
  lbl.textContent=s==='off'?'Offline':s==='sync'?'Syncing':'Live';
}
async function loadState(){
  try{
    const r=await fetch(`${API}/api/state`,{headers:{Authorization:'Bearer '+token}});
    if(r.status===401){doLogout();return;}
    const d=await r.json();
    mergeServerState(d);render();
  }catch(e){setSyncStatus('off');}
}
function mergeServerState(d){
  if(!d)return;
  state.board={...state.board,...(d.board||{})};
  if(!state.board.goSalary)state.board.goSalary=200;
  state.teams=d.teams||[];
  state.properties=d.properties||[];
  state.transactions=d.transactions||[];
  document.getElementById('hdr-board').textContent=state.board.name||'Game';
}
function schedSave(){
  setSyncStatus('sync');
  clearTimeout(saveTimer);
  saveTimer=setTimeout(pushState,600);
}
async function pushState(){
  try{
    await fetch(`${API}/api/state`,{method:'POST',headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify({board:state.board,teams:state.teams,properties:state.properties,transactions:state.transactions})});
    setSyncStatus('live');
  }catch(e){setSyncStatus('off');}
}
function connectSSE(){
  if(es)es.close();
  es=new EventSource(`${API}/api/events?token=${token}`);
  es.addEventListener('stateUpdate',e=>{
    const d=JSON.parse(e.data);
    const wasModal=state.modal;
    mergeServerState(d);
    if(wasModal)state.modal=wasModal;
    render();
  });
  es.onopen=()=>setSyncStatus('live');
  es.onerror=()=>{setSyncStatus('off');setTimeout(connectSSE,5000);};
}

// ══════════════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════════════
function render(){
  const c=document.getElementById('content');
  if(!c)return;
  // Tab active states
  ['home','teams','properties','leaderboard','bank','transactions','settings'].forEach(t=>{
    const bn=document.getElementById('bn-'+t);
    const sn=document.getElementById('sn-'+t);
    if(bn)bn.classList.toggle('active',state.activeTab===t);
    if(sn)sn.classList.toggle('active',state.activeTab===t);
  });
  // FAB visibility
  const fab=document.getElementById('fab');
  if(fab)fab.style.display=(state.activeTab==='teams'||state.activeTab==='properties')?'flex':'none';
  // Content
  switch(state.activeTab){
    case'home':c.innerHTML=homeHTML();break;
    case'teams':c.innerHTML=teamsHTML();break;
    case'properties':c.innerHTML=propsHTML();break;
    case'leaderboard':c.innerHTML=leaderboardHTML();break;
    case'bank':c.innerHTML=bankHTML();break;
    case'transactions':c.innerHTML=transHTML();break;
    case'settings':c.innerHTML=settingsHTML();break;
  }
  // Modal
  document.getElementById('modal-root').innerHTML=modalHTML();
}

// ══════════════════════════════════════════════════════════
// HOME
// ══════════════════════════════════════════════════════════
function homeHTML(){
  const totalCash=state.teams.reduce((s,t)=>s+t.balance,0);
  const totalPropVal=state.properties.reduce((s,p)=>s+(p.ownedBy?p.price:0),0);
  const bankProps=state.properties.filter(p=>!p.ownedBy&&!p.mortgaged);
  const totalMoney=totalCash+state.board.bankBalance+totalPropVal;
  return`<div>
    <div class="page-title">Overview</div>
    <div class="economy-card">
      <div class="eco-title">Total Economy</div>
      <div class="eco-val">₹${num(totalMoney)}</div>
      <div class="eco-sub">Cash in circulation + Bank + Property value</div>
    </div>
    <div class="sgrid">
      <div class="sbox">
        <div class="snum" style="color:var(--ac2)">₹${num(state.board.bankBalance)}</div>
        <div class="slbl">🏦 Bank</div>
      </div>
      <div class="sbox">
        <div class="snum" style="color:var(--g)">₹${num(totalCash)}</div>
        <div class="slbl">💰 Player Cash</div>
      </div>
      <div class="sbox">
        <div class="snum">${state.teams.length}</div>
        <div class="slbl">👥 Players</div>
      </div>
      <div class="sbox">
        <div class="snum">${state.properties.filter(p=>p.ownedBy).length}/${state.properties.length}</div>
        <div class="slbl">🏘️ Owned Props</div>
      </div>
    </div>
    ${bankProps.length?`<div class="card">
      <div class="ct">🏦 Available to Buy / Auction</div>
      ${bankProps.slice(0,5).map(p=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--bd)">
        <div style="display:flex;align-items:center;gap:8px">
          <div style="width:8px;height:22px;border-radius:2px;background:${COLORS[p.colorIdx??0]}"></div>
          <div><div style="font-size:13px;font-weight:600">${esc(p.name)}</div><div style="font-size:11px;color:var(--tx3)">₹${num(p.price)} · Rent ₹${num(p.rent)}</div></div>
        </div>
        <div style="display:flex;gap:5px">
          <button class="btn sm suc" onclick="setTab('properties');setTimeout(()=>openBuyProp('${p.id}'),50)">Buy</button>
          <button class="btn sm pur" onclick="setTab('properties');setTimeout(()=>openAuctionForProp('${p.id}'),50)">🔨</button>
        </div>
      </div>`).join('')}
      ${bankProps.length>5?`<div style="font-size:11px;color:var(--tx3);text-align:center;margin-top:8px">+${bankProps.length-5} more in Properties tab</div>`:''}
    </div>`:''}
    <div class="card" style="cursor:pointer" onclick="setTab('leaderboard')">
      <div class="ct">🏆 Leaderboard Preview</div>
      ${state.teams.length?[...state.teams].sort((a,b)=>{
        const av=state.properties.filter(p=>p.ownedBy===a.id).reduce((s,p)=>s+(p.price||0),0);
        const bv=state.properties.filter(p=>p.ownedBy===b.id).reduce((s,p)=>s+(p.price||0),0);
        return(b.balance+bv)-(a.balance+av);
      }).map((t,i)=>{
        const tv=state.properties.filter(p=>p.ownedBy===t.id).reduce((s,p)=>s+(p.price||0),0);
        return`<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--bd)${i===state.teams.length-1?';border:none':''}">
          <span style="font-family:var(--ffd);font-weight:900;color:${i===0?'var(--am)':i===1?'#94a3b8':i===2?'#b45309':'var(--tx3)'};font-size:14px;width:20px">#${i+1}</span>
          <div style="width:7px;height:7px;border-radius:50%;background:${t.color};flex-shrink:0"></div>
          <div style="flex:1;font-weight:600;font-size:13px">${esc(t.name)}</div>
          <div style="font-weight:700;color:${t.color};font-family:var(--ffd)">₹${num(t.balance+tv)}</div>
        </div>`;
      }).join(''):`<div style="color:var(--tx3);font-size:13px">No players yet</div>`}
      <div style="font-size:11px;color:var(--ac2);margin-top:9px;text-align:center">Tap for full leaderboard →</div>
    </div>
  </div>`;
}

// ══════════════════════════════════════════════════════════
// TEAMS
// ══════════════════════════════════════════════════════════
function teamsHTML(){
  if(!state.teams.length)return`<div class="empty"><span class="empty-icon">👥</span>No players yet.<br>Tap ＋ to add one.</div>`;
  return`<div>
    <div class="page-title">Players</div>
    ${state.teams.map(t=>{
      const props=state.properties.filter(p=>p.ownedBy===t.id);
      const propVal=props.reduce((s,p)=>s+(p.price||0),0);
      const netWorth=t.balance+propVal;
      return`<div class="pcard" style="--tc:${t.color}">
        <div style="display:flex;align-items:flex-start;justify-content:space-between">
          <div>
            <div class="pn" style="color:${t.color}">${esc(t.name)}</div>
            <div class="pb">₹${num(t.balance)}</div>
            <div style="font-size:11px;color:var(--tx3)">Net worth: <strong style="color:var(--tx2)">₹${num(netWorth)}</strong> · ${props.length} props</div>
          </div>
          <div style="display:flex;gap:5px">
            <button class="btn sm" onclick="editTeam('${t.id}')">✏️</button>
            <button class="btn sm dan" onclick="deleteTeam('${t.id}')">🗑️</button>
          </div>
        </div>
        ${props.length?`<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:9px">${props.map(p=>`<span class="${p.mortgaged?'pchip mort':'pchip'}"><span class="cdot" style="background:${COLORS[p.colorIdx??0]}"></span>${esc(p.name)}${p.mortgaged?' 🔒':''}</span>`).join('')}</div>`:''}
        <div class="agrid">
          <button class="abtn suc" onclick="openTransact('${t.id}','credit')"><span class="ai">💚</span>Credit</button>
          <button class="abtn dan" onclick="openTransact('${t.id}','debit')"><span class="ai">🔴</span>Debit</button>
          <button class="abtn blu" onclick="passGo('${t.id}')"><span class="ai">🚀</span>Pass GO</button>
          <button class="abtn amb" onclick="openMortgage('${t.id}')"><span class="ai">🔒</span>Mortgage</button>
          <button class="abtn orn" onclick="openRent('${t.id}')"><span class="ai">💸</span>Pay Rent</button>
          <button class="abtn dan" onclick="declareBankruptcy('${t.id}')"><span class="ai">💀</span>Bankrupt</button>
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

// ══════════════════════════════════════════════════════════
// PROPERTIES
// ══════════════════════════════════════════════════════════
function propsHTML(){
  const q=(state.propSearch||'').toLowerCase();
  let props=[...state.properties];
  if(q)props=props.filter(p=>p.name.toLowerCase().includes(q)||(p.group||'').toLowerCase().includes(q));
  const groups=[...new Set(props.map(p=>p.group||''))];
  return`<div>
    <div class="page-title">Properties</div>
    <div class="swrap"><span class="sicon">🔍</span><input type="text" placeholder="Search…" value="${esc(state.propSearch||'')}" oninput="state.propSearch=this.value;render()"></div>
    ${!props.length?`<div class="empty"><span class="empty-icon">🏘️</span>No properties found.</div>`:''}
    ${groups.map(g=>{
      const gprops=props.filter(p=>(p.group||'')=== g);
      return`${g?`<div class="gh">${esc(g)}</div>`:''}
      ${gprops.map(p=>{
        const owner=state.teams.find(t=>t.id===p.ownedBy);
        return`<div class="prow${p.mortgaged?' mort':''}">
          <div class="pleft">
            <div class="cbar" style="background:${COLORS[p.colorIdx??0]};height:34px"></div>
            <div>
              <div class="pname">${esc(p.name)}${p.mortgaged?' 🔒':''}</div>
              <div class="pmeta">₹${num(p.price)} · Rent ₹${num(p.rent)}${owner?` · <span style="color:${owner.color}">${esc(owner.name)}</span>`:''}</div>
            </div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px">
            <span class="badge ${p.ownedBy?(p.mortgaged?'mortg':'owned'):'bank'}">${p.ownedBy?(p.mortgaged?'Mortgaged':owner?.name||'Owned'):'Bank'}</span>
            <div style="display:flex;gap:4px">
              ${!p.ownedBy?`<button class="btn sm suc" onclick="openBuyProp('${p.id}')">Buy</button><button class="btn sm pur" onclick="openAuctionForProp('${p.id}')">🔨</button>`:''}
              <button class="btn sm" onclick="openEditProp('${p.id}')">✏️</button>
              <button class="btn sm dan" onclick="deleteProp('${p.id}')">🗑️</button>
            </div>
          </div>
        </div>`;
      }).join('')}`;
    }).join('')}
  </div>`;
}

// ══════════════════════════════════════════════════════════
// LEADERBOARD
// ══════════════════════════════════════════════════════════
function leaderboardHTML(){
  const sorted=[...state.teams].sort((a,b)=>{
    const av=state.properties.filter(p=>p.ownedBy===a.id).reduce((s,p)=>s+(p.price||0),0);
    const bv=state.properties.filter(p=>p.ownedBy===b.id).reduce((s,p)=>s+(p.price||0),0);
    return(b.balance+bv)-(a.balance+av);
  });
  if(!sorted.length)return`<div class="empty"><span class="empty-icon">🏆</span>No players yet.</div>`;
  const max=sorted.length?((sorted[0].balance)+(state.properties.filter(p=>p.ownedBy===sorted[0].id).reduce((s,p)=>s+(p.price||0),0))||1):1;
  return`<div>
    <div class="page-title">Leaderboard</div>
    <div class="lbcard">
    ${sorted.map((t,i)=>{
      const tv=state.properties.filter(p=>p.ownedBy===t.id).reduce((s,p)=>s+(p.price||0),0);
      const nw=t.balance+tv;
      const pct=Math.round((nw/max)*100);
      const rk=i===0?'g1':i===1?'g2':i===2?'g3':'';
      return`<div class="lbrow">
        <div class="lbrank ${rk}">${i===0?'🥇':i===1?'🥈':i===2?'🥉':`#${i+1}`}</div>
        <div style="width:9px;height:9px;border-radius:50%;background:${t.color};flex-shrink:0"></div>
        <div style="flex:1;min-width:0">
          <div style="font-weight:700;font-size:14px">${esc(t.name)}</div>
          <div style="font-size:11px;color:var(--tx3);margin-top:1px">Cash ₹${num(t.balance)} · Props ₹${num(tv)}</div>
          <div class="lb-bar-wrap"><div class="lb-bar" style="width:${pct}%;background:${t.color}"></div></div>
        </div>
        <div style="font-family:var(--ffd);font-size:17px;font-weight:900;color:${t.color};flex-shrink:0">₹${num(nw)}</div>
      </div>`;
    }).join('')}
    </div>
  </div>`;
}

      <div style="height:4px;background:rgba(34,211,160,.15);border-radius:99px;margin-top:12px;overflow:hidden">
        <div style="height:100%;width:${Math.min(100,Math.round((state.board.bankBalance/Math.max(totalEconomy,1))*100))}%;background:var(--g);border-radius:99px;transition:width .5s"></div>
      </div>
    </div>

    <!-- Economy breakdown -->
    <div class="card">
      <div class="ct">💰 Economy Breakdown</div>
      <div class="sgrid" style="grid-template-columns:1fr 1fr 1fr">
        <div class="sbox"><div class="snum" style="font-size:16px;color:var(--g)">₹${num(state.board.bankBalance)}</div><div class="slbl">Bank</div></div>
        <div class="sbox"><div class="snum" style="font-size:16px;color:var(--ac2)">₹${num(totalCash)}</div><div class="slbl">Players</div></div>

        <div style="height:100%;width:${Math.round((totalCash/Math.max(totalEconomy,1))*100)}%;background:var(--ac);transition:width .5s"></div>
        <div style="height:100%;flex:1;background:var(--am);transition:width .5s"></div>
      </div>
      <div style="display:flex;gap:12px;margin-top:6px;font-size:10px;color:var(--tx3)">
        <span style="display:flex;align-items:center;gap:3px"><span style="width:7px;height:7px;border-radius:50%;background:var(--g);display:inline-block"></span>Bank</span>
        <span style="display:flex;align-items:center;gap:3px"><span style="width:7px;height:7px;border-radius:50%;background:var(--ac);display:inline-block"></span>Players</span>

// ══════════════════════════════════════════════════════════
// TRANSACTIONS
// ══════════════════════════════════════════════════════════
function transHTML(){
  if(!state.transactions.length)return`<div class="empty"><span class="empty-icon">💸</span>No transactions yet.</div>`;
  const sorted=[...state.transactions].sort((a,b)=>b.time-a.time);
  const PAGE=50;
  const page=state.txPage||0;
  const slice=sorted.slice(page*PAGE,(page+1)*PAGE);
  const totalPages=Math.ceil(sorted.length/PAGE);
  const typeIcon={mortgage:'🔒',unmortgage:'🔓',auction:'🔨',rent:'💸',bankruptcy:'💀',credit:'💚',debit:'🔴',admin:'🔧'};
  return`<div>
    <div class="page-title">Transactions <span style="font-size:14px;color:var(--tx3);font-weight:400">(${sorted.length})</span></div>
    <div class="card">
      ${slice.map(tx=>{
        const team=state.teams.find(t=>t.id===tx.teamId);
        const icon=typeIcon[tx.type]||'💱';
        return`<div class="trow">
          <div class="tico">${icon}</div>
          <div style="flex:1;min-width:0">
            <div style="font-size:11px;font-weight:700;color:${team?.color||(tx.teamId==='bank'?'var(--g)':'var(--tx3)')};margin-bottom:1px">${esc(team?.name||(tx.teamId==='bank'?'Bank':'System'))}</div>
            <div style="font-size:12px;color:var(--tx2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(tx.note||tx.type||'Transaction')}</div>
            <div style="font-size:10px;color:var(--tx3);margin-top:2px">${formatTime(tx.time)}</div>
          </div>
          <div style="font-family:var(--ffd);font-size:15px;font-weight:800;flex-shrink:0;color:${tx.amount>0?'var(--g)':tx.amount<0?'var(--r)':'var(--tx3)'}">${tx.amount!==0?(tx.amount>0?'+':'')+'₹'+num(Math.abs(tx.amount)):'—'}</div>
        </div>`;
      }).join('')}
    </div>
    ${totalPages>1?`<div style="display:flex;gap:8px;justify-content:center;margin-top:8px">
      <button class="btn" onclick="state.txPage=Math.max(0,(state.txPage||0)-1);render()" ${page===0?'disabled':''}>← Prev</button>
      <span style="padding:8px 12px;font-size:12px;color:var(--tx3)">Page ${page+1}/${totalPages}</span>
      <button class="btn" onclick="state.txPage=Math.min(${totalPages-1},(state.txPage||0)+1);render()" ${page>=totalPages-1?'disabled':''}>Next →</button>
    </div>`:''}
  </div>`;
}

    <span class="mhandle"></span><button class="mclose" onclick="closeModal()">✕</button>
    <div class="mtitle">🏦 Adjust Bank</div>
    <div style="font-size:13px;color:var(--tx2);margin-bottom:14px">Current: <strong style="color:var(--g)">₹${num(state.board.bankBalance)}</strong></div>
    <div class="fr"><label>Amount (₹)</label><input type="number" id="bank-amt" placeholder="e.g. 1000" min="1" autofocus></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:4px">
      <button class="btn suc lg" onclick="adjustBank(true)">+ Add</button>
      <button class="btn dan lg" onclick="adjustBank(false)">− Remove</button>
    </div>
  </div></div>`;}

  // BUY PROPERTY
  if(m.type==='buyProp'){
    const prop=state.properties.find(p=>p.id===m.propId);if(!prop)return'';
    return`<div class="moverlay" onclick="closeBg(event)"><div class="modal">
    <span class="mhandle"></span><button class="mclose" onclick="closeModal()">✕</button>
    <div class="mtitle">💰 Buy Property</div>
    <div style="padding:13px;background:var(--s2);border-radius:var(--rs);border:1px solid var(--bd);margin-bottom:14px">
      <div style="font-size:16px;font-weight:700">${esc(prop.name)}</div>
      <div style="font-size:12px;color:var(--tx3);margin-top:3px">Price: <strong style="color:var(--tx)">₹${num(prop.price)}</strong></div>
    </div>
    <div class="ct">Select Buyer</div>
    ${state.teams.map(t=>`<div class="prow" style="margin-bottom:7px">
      <div><div style="font-weight:700;color:${t.color}">${esc(t.name)}</div><div style="font-size:11px;color:var(--tx3)">₹${num(t.balance)}</div></div>
      <button class="btn sm suc" onclick="confirmBuyProp('${prop.id}','${t.id}')" ${t.balance<prop.price?'disabled':''}>Buy</button>
    </div>`).join('')}
  </div></div>`;}

  // ADD TEAM (normal FAB — FIX #1: now deducts from bank)

    const t=m.team||{name:'',balance:state.board.startMoney,color:COLORS[state.teams.length%COLORS.length]};

    return`<div class="moverlay" onclick="closeBg(event)"><div class="modal">
    <span class="mhandle"></span><button class="mclose" onclick="closeModal()">✕</button>
    <div class="mtitle">${isEdit?'Edit Player':'Add Player'}</div>
    ${!isEdit?`<div class="info grn" style="margin-bottom:12px">Starting balance will be <strong>deducted from the bank</strong>. Bank: ₹${num(state.board.bankBalance)}</div>`:''}

    <div class="fr"><label>Starting Balance (₹)</label><input type="number" id="m-balance" value="${t.balance}" min="0"></div>
    <div class="fr"><label>Color</label>
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:7px">
        ${COLORS.map(c=>`<div onclick="pickColor(this,'m-color','${c}')" class="cswatch${t.color===c?' sel':''}" style="background:${c}"></div>`).join('')}
      </div>
      <input type="hidden" id="m-color" value="${t.color}">
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:14px">
      <button class="btn pri lg" onclick="${isEdit?`saveEditTeam('${m.teamId}')`:' saveAddTeam()'}">Save</button>
      <button class="btn lg" onclick="closeModal()">Cancel</button>
    </div>
  </div></div>`;}

  // ADD / EDIT PROPERTY
  if(m.type==='addProp'||m.type==='editProp'){
    const p=m.prop||{name:'',price:200,rent:20,group:'',colorIdx:0};
    const groups=[...new Set(state.properties.map(x=>x.group).filter(Boolean))];
    return`<div class="moverlay" onclick="closeBg(event)"><div class="modal">
    <span class="mhandle"></span><button class="mclose" onclick="closeModal()">✕</button>
    <div class="mtitle">${m.type==='addProp'?'Add Property':'Edit Property'}</div>
    <div class="fr"><label>Name</label><input type="text" id="p-name" value="${esc(p.name)}" placeholder="e.g. Marina Beach" autofocus></div>
    <div class="f2">
      <div class="fr"><label>Price (₹)</label><input type="number" id="p-price" value="${p.price}" min="0"></div>
      <div class="fr"><label>Rent (₹)</label><input type="number" id="p-rent" value="${p.rent}" min="0"></div>
    </div>
    <div class="fr"><label>Group / Area</label>
      <input type="text" id="p-group" value="${esc(p.group||'')}" placeholder="e.g. Marina" list="gl">
      <datalist id="gl">${groups.map(g=>`<option value="${esc(g)}">`).join('')}</datalist>
    </div>
    <div class="fr"><label>Color</label>
      <div style="display:flex;flex-wrap:wrap;gap:7px;margin-top:7px">

    const isCr=m.subtype==='credit';

        <button class="btn sm blu" onclick="event.stopPropagation();payRent('${payer.id}','${p.id}')">₹${num(p.rent)}</button>
      </div>`;}).join('')}
    </div>`:`<div style="color:var(--tx3);font-size:13px;padding:12px 0 8px">No rentable properties owned by others.</div>`}
    ${suspended.length?`<div style="font-size:10px;color:var(--am);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-top:10px;margin-bottom:6px">🔒 Mortgaged — no rent</div>

      </div>`;}).join('')}`:''}
    <button class="btn lg" style="margin-top:10px" onclick="closeModal()">Done</button>
  </div></div>`;}

  // MORTGAGE
  if(m.type==='mortgage'){
    const team=state.teams.find(t=>t.id===m.teamId);if(!team)return'';

        <button class="btn sm amb" ${!ok?'disabled':''} onclick="event.stopPropagation();mortgageProp('${p.id}')">Mortgage</button>
      </div>`;}).join('')}

    ${isMort.length?`<div class="divider"></div>
    <div class="ct" style="color:var(--am)">🔒 Currently Mortgaged</div>
    <div style="max-height:200px;overflow-y:auto">
    ${isMort.map(p=>{const mv=Math.floor((p.price||0)/2);const ok=(team.balance||0)>=mv;

        <button class="btn sm suc" ${!ok?'disabled':''} onclick="event.stopPropagation();unmortgageProp('${p.id}')">Unmortgage</button>
      </div>`;}).join('')}
    </div>`:''}
    <button class="btn lg" style="margin-top:12px" onclick="closeModal()">Done</button>
  </div></div>`;}

  // AUCTION
  if(m.type==='auction'){
    const prop=state.properties.find(p=>p.id===m.propId);if(!prop)return'';
    const curBid=m.currentBid||0;

      <span class="badge auct">🔨 Auction</span>
    </div>
    ${curBid>0?`<div style="background:var(--am-bg);border:1px solid var(--am-bd);border-radius:var(--rxs);padding:11px 13px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center">
      <div><div style="font-size:10px;color:var(--am);font-weight:700;text-transform:uppercase;letter-spacing:.4px">Highest Bid</div><div style="font-family:var(--ffd);font-size:22px;font-weight:900;color:var(--am)">₹${num(curBid)}</div></div>
      <div style="text-align:right"><div style="font-size:10px;color:var(--tx3)">By</div><div style="font-weight:700;color:${curBidder?.color||'var(--tx)'}">${esc(curBidder?.name||'—')}</div></div>
    </div>`:`<div class="info blu" style="margin-bottom:10px">No bids yet. Highest bidder wins.</div>`}
    <div class="ct">Place a Bid</div>
    <div style="max-height:260px;overflow-y:auto">
    ${state.teams.map(t=>`<div class="bid-row">
      <div style="flex:1"><div style="font-size:12px;font-weight:700;color:${t.color}">${esc(t.name)}</div><div style="font-size:10px;color:var(--tx3)">₹${num(t.balance)}</div></div>
      <input type="number" id="bid-${t.id}" placeholder="₹${curBid+1}" min="${curBid+1}" style="width:85px;padding:7px;font-size:12px">
      <button class="btn sm pri" onclick="placeBid('${prop.id}','${t.id}')">Bid</button>
    </div>`).join('')}
    </div>
    <div class="divider"></div>
    ${curBid>0&&curBidder?`<div style="padding:11px;background:var(--g-bg);border:1px solid var(--g-bd);border-radius:var(--rxs);margin-bottom:9px;display:flex;justify-content:space-between;align-items:center">
      <div><div style="font-size:10px;color:var(--g);font-weight:700;text-transform:uppercase">Ready to sell</div><div style="font-weight:700;color:${curBidder.color}">${esc(curBidder.name)}</div><div style="font-size:11px;color:var(--tx3)">₹${num(curBid)} → bank</div></div>
      <button class="btn suc" onclick="finalizeAuction('${prop.id}')">🏆 Sell</button>
    </div>`:''}
    <button class="btn lg" onclick="closeModal()">Cancel Auction</button>
  </div></div>`;}

  // BANKRUPTCY
  if(m.type==='bankruptcy'){
    const team=state.teams.find(t=>t.id===m.teamId);if(!team)return'';
    const tp=state.properties.filter(p=>p.ownedBy===m.teamId);
    return`<div class="moverlay" onclick="closeBg(event)"><div class="modal">
    <span class="mhandle"></span><button class="mclose" onclick="closeModal()">✕</button>
    <div class="mtitle">💀 Bankruptcy</div>
    <div style="padding:13px;background:var(--r-bg);border:1px solid var(--r-bd);border-radius:var(--rxs);margin-bottom:12px">
      <div style="font-weight:800;color:${team.color};font-size:15px">${esc(team.name)}</div>
      <div style="font-size:12px;color:var(--tx3);margin-top:3px">Cash: ₹${num(team.balance)} · ${tp.length} properties</div>
    </div>
    <div class="info red" style="font-size:12px;margin-bottom:12px">All cash and properties return to bank. Player is removed.</div>
    ${tp.length?`<div style="margin-bottom:12px">
      <div style="font-size:10px;color:var(--tx3);margin-bottom:7px;font-weight:700;text-transform:uppercase;letter-spacing:.4px">Returning (${tp.length})</div>
      <div style="display:flex;flex-wrap:wrap;gap:4px">${tp.map(p=>`<span class="pchip"><span class="cdot" style="background:${COLORS[p.colorIdx??0]}"></span>${esc(p.name)}</span>`).join('')}</div>
    </div>`:''}
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:7px">
      <button class="btn dan lg" onclick="confirmBankruptcy('${m.teamId}')">💀 Confirm</button>
      <button class="btn lg" onclick="closeModal()">Cancel</button>
    </div>
  </div></div>`;}

  // ADMIN ADD TEAM
  if(m.type==='adminAddTeam'){return`<div class="moverlay" onclick="closeBg(event)"><div class="modal">
    <span class="mhandle"></span><button class="mclose" onclick="closeModal()">✕</button>
    <div class="mtitle">👤 Add Player (Admin)</div>
    <div class="info grn" style="margin-bottom:14px">Starting balance will be <strong>deducted from bank</strong>. Bank: ₹${num(state.board.bankBalance)}</div>
    <div class="fr"><label>Name</label><input type="text" id="adm-name" placeholder="e.g. Alice" autofocus></div>
    <div class="fr"><label>Starting Balance (₹)</label><input type="number" id="adm-balance" value="${state.board.startMoney}" min="0"></div>
    <div class="fr"><label>Color</label>
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:7px">
        ${COLORS.map((c,i)=>`<div onclick="pickColor(this,'adm-color','${c}')" class="cswatch${i===state.teams.length%COLORS.length?' sel':''}" style="background:${c}"></div>`).join('')}
      </div>
      <input type="hidden" id="adm-color" value="${COLORS[state.teams.length%COLORS.length]}">
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:14px">
      <button class="btn pri lg" onclick="adminAddTeam()">Add Player</button>
      <button class="btn lg" onclick="closeModal()">Cancel</button>
    </div>
  </div></div>`;}

  // ADMIN SELECT TEAM
  if(m.type==='adminSelectTeam'){return`<div class="moverlay" onclick="closeBg(event)"><div class="modal">
    <span class="mhandle"></span><button class="mclose" onclick="closeModal()">✕</button>
    <div class="mtitle">✏️ Select Player</div>
    ${!state.teams.length?`<div class="empty">No players yet.</div>`:`
    <div style="max-height:400px;overflow-y:auto">
    ${state.teams.map(t=>`<div class="prow" onclick="state.modal={type:'adminEditBalance',teamId:'${t.id}'};render()" style="cursor:pointer;margin-bottom:7px">
      <div style="display:flex;align-items:center;gap:9px;flex:1">
        <div style="width:9px;height:9px;border-radius:50%;background:${t.color}"></div>
        <div><div style="font-weight:700;color:${t.color}">${esc(t.name)}</div><div style="font-size:11px;color:var(--tx3)">₹${num(t.balance)}</div></div>
      </div>
      <span style="color:var(--tx3);font-size:18px">›</span>
    </div>`).join('')}
    </div>`}
    <button class="btn lg" style="margin-top:9px" onclick="closeModal()">Cancel</button>
  </div></div>`;}

  // ADMIN EDIT BALANCE
  if(m.type==='adminEditBalance'){
    const team=state.teams.find(t=>t.id===m.teamId);if(!team)return'';
    return`<div class="moverlay" onclick="closeBg(event)"><div class="modal">
    <span class="mhandle"></span><button class="mclose" onclick="closeModal()">✕</button>
    <div class="mtitle">✏️ Edit Balance</div>
    <div class="info blu" style="margin-bottom:13px;font-size:11px">Difference reconciled with bank and logged.</div>
    <div style="padding:11px;background:var(--s2);border-radius:var(--rs);margin-bottom:12px;border:1px solid var(--bd)">
      <div style="font-size:11px;color:var(--tx3)">Editing</div>
      <div style="font-weight:700;color:${team.color};font-size:15px">${esc(team.name)}</div>
      <div style="font-family:var(--ffd);font-size:20px;font-weight:900;margin-top:1px">₹${num(team.balance)}</div>
    </div>
    <div class="fr"><label>New Balance (₹)</label><input type="number" id="adm-newbal" value="${team.balance}" min="0" autofocus></div>
    <div class="fr"><label>Reason</label><input type="text" id="adm-balnote" placeholder="e.g. Balance correction"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:4px">
      <button class="btn pri lg" onclick="adminEditBalance('${m.teamId}')">Apply</button>
      <button class="btn lg" onclick="closeModal()">Cancel</button>
    </div>
  </div></div>`;}

  return'';
}

// ACTIONS — helpers

function uid(){return Math.random().toString(36).slice(2,9);}
function stateChanged(){render();schedSave();}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function num(n){return(n||0).toLocaleString('en-IN');}
function formatTime(ts){
  const d=Date.now()-ts;
  if(d<60000)return'Just now';
  if(d<3600000)return Math.floor(d/60000)+'m ago';
  if(d<86400000)return Math.floor(d/3600000)+'h ago';
  return new Date(ts).toLocaleDateString('en-IN',{day:'numeric',month:'short'});
}
function toast(msg,type=''){
  const el=document.createElement('div');
  el.className='toast'+(type?' '+type:'');el.textContent=msg;
  document.getElementById('toast-cnt').appendChild(el);
  setTimeout(()=>el.remove(),3000);
}
window.setTab=t=>{state.activeTab=t;state.txPage=0;render();};
window.closeModal=()=>{state.modal=null;render();};
window.closeBg=e=>{if(e.target===e.currentTarget){state.modal=null;render();}};
window.pickColor=(el,id,c)=>{
  document.getElementById(id).value=c;
  document.querySelectorAll('.cswatch').forEach(x=>x.classList.remove('sel'));
  el.classList.add('sel');
};
window.pickColorIdx=(el,id,i)=>{
  document.getElementById(id).value=i;
  document.querySelectorAll('.cswatch').forEach(x=>x.classList.remove('sel'));
  el.classList.add('sel');
};
function onFab(){
  if(state.activeTab==='teams'){state.modal={type:'addTeam'};render();}
  else if(state.activeTab==='properties'){state.modal={type:'addProp'};render();}
}

// FIX #1 & #5: saveAddTeam now deducts from bank + validates bank balance
window.saveAddTeam=()=>{
  const name=document.getElementById('m-name')?.value?.trim();
  const balance=parseInt(document.getElementById('m-balance')?.value)||0;
  const color=document.getElementById('m-color')?.value||COLORS[0];
  if(!name){toast('Enter a player name','err');return;}
  if(balance<0){toast('Balance cannot be negative','err');return;}
  if(balance>0&&state.board.bankBalance<balance){
    toast(`Bank only has ₹${num(state.board.bankBalance)} — insufficient`,'err');return;
  }
  const t={id:uid(),name,balance,color};
  state.teams.push(t);
  if(balance>0){
    state.board.bankBalance-=balance;
    state.transactions.push({id:uid(),teamId:t.id,amount:balance,note:`Starting balance for ${name} (deducted from bank)`,type:'credit',time:Date.now()});
  }
  state.modal=null;stateChanged();
  toast(`${name} added — ₹${num(balance)} deducted from bank`,'suc');
};

window.editTeam=id=>{const t=state.teams.find(x=>x.id===id);state.modal={type:'editTeam',teamId:id,team:{...t}};render();};

// FIX #2: saveEditTeam now reconciles with bank
window.saveEditTeam=id=>{
  const t=state.teams.find(x=>x.id===id);if(!t)return;
  const name=document.getElementById('m-name')?.value?.trim()||t.name;
  const newBal=parseInt(document.getElementById('m-balance')?.value)||0;
  const color=document.getElementById('m-color')?.value||t.color;
  if(newBal<0){toast('Balance cannot be negative','err');return;}
  const diff=newBal-t.balance;
  if(diff!==0){
    if(diff>0){
      if(state.board.bankBalance<diff){toast(`Bank only has ₹${num(state.board.bankBalance)}`,'err');return;}
      state.board.bankBalance-=diff;
    }else{
      state.board.bankBalance+=Math.abs(diff);
    }
    state.transactions.push({id:uid(),teamId:id,amount:diff,note:`Balance edit: ${name} ₹${num(t.balance)} → ₹${num(newBal)}`,type:'admin',time:Date.now()});
  }
  t.name=name;t.balance=newBal;t.color=color;
  state.modal=null;stateChanged();toast(`${name} updated`,'suc');
};

window.deleteTeam=id=>{
  if(!confirm('Remove this player?'))return;
  const team=state.teams.find(t=>t.id===id);if(!team)return;
  if(team.balance>0){
    state.board.bankBalance+=team.balance;
    state.transactions.push({id:uid(),teamId:'bank',amount:team.balance,note:`${team.name} removed — cash returned to bank`,type:'admin',time:Date.now()});
  }
  // Return mortgaged property value to bank
  state.properties.forEach(p=>{
    if(p.ownedBy===id){
      if(p.mortgaged){
        const mv=Math.floor((p.price||0)/2);
        state.board.bankBalance-=mv; // bank already paid this out, no reclaim needed
      }
      p.ownedBy=null;p.mortgaged=false;
    }
  });
  state.teams=state.teams.filter(t=>t.id!==id);
  stateChanged();toast(`${team.name} removed`,'');
};

window.openEditProp=id=>{const p=state.properties.find(x=>x.id===id);state.modal={type:'editProp',propId:id,prop:{...p}};render();};
window.saveEditProp=id=>{

  p.price=parseInt(document.getElementById('p-price')?.value)||p.price;

// BANK
// ══════════════════════════════════════════════════════════
window.openBankAdjust=()=>{state.modal={type:'adjustBank'};render();};
window.adjustBank=isAdding=>{
  const amt=parseInt(document.getElementById('bank-amt')?.value)||0;
  if(!amt||amt<=0){toast('Enter a valid positive amount','err');return;}
  if(!isAdding&&state.board.bankBalance<amt){toast('Bank does not have that much!','err');return;}
  state.board.bankBalance+=isAdding?amt:-amt;
  state.transactions.push({id:uid(),teamId:'bank',amount:isAdding?amt:-amt,note:isAdding?'Admin: added funds to bank':'Admin: removed funds from bank',type:'admin',time:Date.now()});
  state.modal=null;stateChanged();toast('Bank updated','suc');
};

// FIX #6: passGo uses configurable goSalary
window.passGo=teamId=>{
  const salary=state.board.goSalary||200;
  if(state.board.bankBalance<salary){toast(`Bank needs ₹${num(salary)} for GO`,'err');return;}
  const team=state.teams.find(t=>t.id===teamId);if(!team)return;
  team.balance+=salary;state.board.bankBalance-=salary;
  state.transactions.push({id:uid(),teamId,amount:salary,note:`Passed GO (+₹${num(salary)} from Bank)`,type:'credit',time:Date.now()});
  stateChanged();toast(`₹${num(salary)} paid to ${team.name} for passing GO!`,'suc');
};

window.openTransact=(teamId,subtype)=>{state.modal={type:'transact',teamId,subtype};render();};
window.saveTransact=(teamId,subtype)=>{
  const amount=parseInt(document.getElementById('t-amount')?.value)||0;
  const note=document.getElementById('t-note')?.value?.trim();
  if(!amount||amount<=0){toast('Enter a positive amount','err');return;}
  const team=state.teams.find(t=>t.id===teamId);if(!team)return;
  if(subtype==='credit'){
    if(state.board.bankBalance<amount){toast('Bank has insufficient funds!','err');return;}
    state.board.bankBalance-=amount;team.balance+=amount;
  }else{
    team.balance-=amount;state.board.bankBalance+=amount;
  }
  const delta=subtype==='credit'?amount:-amount;
  state.transactions.push({id:uid(),teamId,amount:delta,note:note||(subtype==='credit'?'Received from Bank':'Paid to Bank'),type:subtype,time:Date.now()});
  state.modal=null;stateChanged();
};

// BUY PROPERTY
// ══════════════════════════════════════════════════════════
window.openBuyProp=propId=>{state.modal={type:'buyProp',propId};render();};
window.confirmBuyProp=(propId,teamId)=>{
  const prop=state.properties.find(p=>p.id===propId);
  const team=state.teams.find(t=>t.id===teamId);
  if(!prop||!team)return;
  if(team.balance<prop.price){toast(`${team.name} has insufficient funds!`,'err');return;}
  team.balance-=prop.price;state.board.bankBalance+=prop.price;
  prop.ownedBy=team.id;prop.mortgaged=false;
  state.transactions.push({id:uid(),teamId,amount:-prop.price,note:`Bought ${prop.name} from Bank`,type:'debit',time:Date.now()});
  toast(`🏠 ${team.name} bought ${prop.name}!`,'suc');
  state.modal=null;stateChanged();
};

// ══════════════════════════════════════════════════════════
// RENT
// ══════════════════════════════════════════════════════════
window.openRent=teamId=>{state.modal={type:'rent',teamId};render();};
window.payRent=(fromId,propId)=>{
  const prop=state.properties.find(p=>p.id===propId);
  if(!prop||!prop.ownedBy)return;
  if(prop.mortgaged){toast('🔒 Property mortgaged — no rent!','amb');return;}
  const payer=state.teams.find(t=>t.id===fromId);
  const owner=state.teams.find(t=>t.id===prop.ownedBy);
  if(!payer||!owner)return;
  payer.balance-=prop.rent;owner.balance+=prop.rent;
  state.transactions.push({id:uid(),teamId:fromId,amount:-prop.rent,note:`Rent: ${prop.name}`,type:'rent',time:Date.now()});
  state.transactions.push({id:uid(),teamId:prop.ownedBy,amount:prop.rent,note:`Rent from ${payer.name}: ${prop.name}`,type:'rent',time:Date.now()});
  toast(`₹${num(prop.rent)} paid to ${owner.name}!`,'suc');
  state.modal={type:'rent',teamId:fromId};stateChanged();
};

// ══════════════════════════════════════════════════════════
// MORTGAGE
// ══════════════════════════════════════════════════════════
window.openMortgage=teamId=>{state.modal={type:'mortgage',teamId};render();};
window.mortgageProp=propId=>{
  const prop=state.properties.find(p=>p.id===propId);
  if(!prop||!prop.ownedBy||prop.mortgaged)return;
  const owner=state.teams.find(t=>t.id===prop.ownedBy);if(!owner)return;
  const mv=Math.floor((prop.price||0)/2);
  if(state.board.bankBalance<mv){toast('Bank insufficient funds for mortgage!','err');return;}
  prop.mortgaged=true;owner.balance+=mv;state.board.bankBalance-=mv;
  state.transactions.push({id:uid(),teamId:owner.id,amount:mv,note:`Mortgage: ${prop.name}`,type:'mortgage',time:Date.now()});
  toast(`🔒 ${prop.name} mortgaged — ₹${num(mv)} from bank`,'amb');
  if(state.modal?.type==='mortgage')state.modal={type:'mortgage',teamId:owner.id};
  stateChanged();
};
window.unmortgageProp=propId=>{
  const prop=state.properties.find(p=>p.id===propId);
  if(!prop||!prop.ownedBy||!prop.mortgaged)return;
  const owner=state.teams.find(t=>t.id===prop.ownedBy);if(!owner)return;
  const mv=Math.floor((prop.price||0)/2);
  if(owner.balance<mv){toast(`Need ₹${num(mv)} to unmortgage`,'err');return;}
  prop.mortgaged=false;owner.balance-=mv;state.board.bankBalance+=mv;
  state.transactions.push({id:uid(),teamId:owner.id,amount:-mv,note:`Unmortgage: ${prop.name}`,type:'unmortgage',time:Date.now()});
  toast(`🔓 ${prop.name} unmortgaged`,'suc');
  if(state.modal?.type==='mortgage')state.modal={type:'mortgage',teamId:owner.id};
  stateChanged();
};

// ══════════════════════════════════════════════════════════
// AUCTION
// ══════════════════════════════════════════════════════════
window.openAuctionForProp=propId=>{
  const prop=state.properties.find(p=>p.id===propId);if(!prop)return;
  if(prop.ownedBy){toast('Property already owned','err');return;}
  state.modal={type:'auction',propId,currentBid:0,currentBidderId:null};render();
};
window.placeBid=(propId,teamId)=>{
  const m=state.modal;if(!m||m.type!=='auction')return;
  const bidAmt=parseInt(document.getElementById(`bid-${teamId}`)?.value)||0;
  const team=state.teams.find(t=>t.id===teamId);if(!team)return;
  if(!bidAmt||bidAmt<=0){toast('Enter a valid bid','err');return;}
  if(bidAmt<=(m.currentBid||0)){toast(`Bid must exceed ₹${num(m.currentBid)}`,'err');return;}
  if(bidAmt>team.balance){toast(`${team.name} only has ₹${num(team.balance)}`,'err');return;}
  state.modal={...m,currentBid:bidAmt,currentBidderId:teamId};
  toast(`🔨 ${team.name} bids ₹${num(bidAmt)}!`,'');render();
};
// FIX #7: finalizeAuction re-validates winner balance
window.finalizeAuction=propId=>{
  const m=state.modal;
  if(!m||m.type!=='auction'||!m.currentBidderId||!m.currentBid)return;
  const prop=state.properties.find(p=>p.id===propId);
  const winner=state.teams.find(t=>t.id===m.currentBidderId);
  if(!prop||!winner)return;
  if(winner.balance<m.currentBid){toast(`${winner.name} no longer has ₹${num(m.currentBid)} — rebid needed`,'err');return;}
  winner.balance-=m.currentBid;state.board.bankBalance+=m.currentBid;
  prop.ownedBy=winner.id;prop.mortgaged=false;
  state.transactions.push({id:uid(),teamId:winner.id,amount:-m.currentBid,note:`Auction: won ${prop.name}`,type:'auction',time:Date.now()});
  toast(`🏆 ${winner.name} won ${prop.name} for ₹${num(m.currentBid)}!`,'suc');
  state.modal=null;stateChanged();
};

// ══════════════════════════════════════════════════════════
// BANKRUPTCY
// ══════════════════════════════════════════════════════════
window.declareBankruptcy=teamId=>{state.modal={type:'bankruptcy',teamId};render();};
window.confirmBankruptcy=teamId=>{
  const team=state.teams.find(t=>t.id===teamId);if(!team)return;
  const tp=state.properties.filter(p=>p.ownedBy===teamId);
  const cashLost=team.balance;
  if(cashLost>0)state.board.bankBalance+=cashLost;
  tp.forEach(p=>{p.ownedBy=null;p.mortgaged=false;});
  state.transactions.push({id:uid(),teamId,amount:-cashLost,note:`💀 Bankruptcy — ₹${num(cashLost)} cash + ${tp.length} props returned`,type:'bankruptcy',time:Date.now()});
  state.teams=state.teams.filter(t=>t.id!==teamId);
  toast(`💀 ${team.name} bankrupt`,'err');
  state.modal=null;stateChanged();
};

// ══════════════════════════════════════════════════════════
// SETTINGS
// ══════════════════════════════════════════════════════════
// FIX #3: saveBoardSettings does NOT overwrite live bankBalance
window.saveBoardSettings=()=>{
  state.board.name=document.getElementById('s-name')?.value?.trim()||state.board.name;
  state.board.startMoney=parseInt(document.getElementById('s-start')?.value)||1500;
  state.board.goSalary=parseInt(document.getElementById('s-go')?.value)||200;
  state.board.bankInitial=parseInt(document.getElementById('s-bank-init')?.value)||2000;
  // bankBalance is NOT modified here
  document.getElementById('hdr-board').textContent=state.board.name;
  stateChanged();toast('Settings saved','suc');
};

// FIX #10: resetAll also resets bank balance and board name to defaults
window.resetAll=()=>{
  if(!confirm('Reset ALL game data? This cannot be undone!'))return;
  state.teams=[];state.properties=[];state.transactions=[];
  state.board.bankBalance=state.board.bankInitial||2000;
  stateChanged();toast('Game reset','suc');
};

window.exportData=()=>{
  const d=JSON.stringify({board:state.board,teams:state.teams,properties:state.properties,transactions:state.transactions},null,2);
  const a=document.createElement('a');a.href='data:text/json;charset=utf-8,'+encodeURIComponent(d);a.download='monopoly-backup.json';a.click();
};

// ══════════════════════════════════════════════════════════
// ADMIN
// ══════════════════════════════════════════════════════════
window.openAdminAddTeam=()=>{state.modal={type:'adminAddTeam'};render();};
window.adminAddTeam=()=>{
  const name=document.getElementById('adm-name')?.value?.trim();
  const balance=parseInt(document.getElementById('adm-balance')?.value)||0;
  const color=document.getElementById('adm-color')?.value||COLORS[0];
  if(!name){toast('Enter a player name','err');return;}
  if(balance<0){toast('Balance cannot be negative','err');return;}
  if(balance>0&&state.board.bankBalance<balance){
    toast(`Bank only has ₹${num(state.board.bankBalance)}`,'err');return;
  }
  const t={id:uid(),name,balance,color};
  state.teams.push(t);
  if(balance>0){
    state.board.bankBalance-=balance;
    state.transactions.push({id:uid(),teamId:t.id,amount:balance,note:`Starting balance for ${name} (admin, deducted from bank)`,type:'credit',time:Date.now()});
  }
  state.modal=null;stateChanged();toast(`${name} added`,'suc');
};

window.openAdminEditBalance=()=>{state.modal={type:'adminSelectTeam'};render();};
window.adminEditBalance=teamId=>{
  const team=state.teams.find(t=>t.id===teamId);if(!team)return;
  const newBal=parseInt(document.getElementById('adm-newbal')?.value)||0;
  const note=document.getElementById('adm-balnote')?.value?.trim()||'Admin balance correction';
  if(newBal<0){toast('Balance cannot be negative','err');return;}
  const diff=newBal-team.balance;
  if(diff===0){toast('No change','');state.modal=null;render();return;}
  if(diff>0){
    if(state.board.bankBalance<diff){toast(`Bank only has ₹${num(state.board.bankBalance)}`,'err');return;}
    state.board.bankBalance-=diff;
  }else{
    state.board.bankBalance+=Math.abs(diff);
  }
  const oldBal=team.balance;
  team.balance=newBal;
  state.transactions.push({id:uid(),teamId,amount:diff,note:`🔧 ${team.name}: ₹${num(oldBal)} → ₹${num(newBal)} (${note})`,type:'admin',time:Date.now()});
  state.modal=null;stateChanged();toast(`${team.name} → ₹${num(newBal)}`,'suc');
};

window.checkBankruptcyLogs=()=>{
  const bad=state.transactions.filter(t=>t.type==='bankruptcy'&&t.amount===0);
  if(!bad.length)toast('No issues found in bankruptcy logs ✓','suc');
  else toast(`${bad.length} legacy bankruptcy log(s) with amount=0 (display-only)`,'amb');
};
