// ── MODAL ──
function modalHTML(){
  if(!state.modal)return'';
  const m=state.modal;

  // ── BANK ADJUST ──
  if(m.type==='adjustBank'){
    return`<div class="modal-overlay" onclick="closeModalBg(event)"><div class="modal">
      <span class="modal-handle"></span>
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div class="modal-title">🏦 Adjust Bank</div>
      <div style="font-size:14px;color:var(--text2);margin-bottom:16px">Current balance: <strong style="color:var(--green)">₹${num(state.board.bankBalance)}</strong></div>
      <div class="form-row"><label>Amount (₹)</label><input type="number" id="bank-amt" placeholder="e.g. 1000" autofocus></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px">
        <button class="btn success lg" onclick="adjustBank(true)">+ Add Funds</button>
        <button class="btn danger lg" onclick="adjustBank(false)">− Remove</button>
      </div>
    </div></div>`;
  }

  // ── BUY PROPERTY ──
  if(m.type==='buyProp'){
    const prop=state.properties.find(p=>p.id===m.propId);
    return`<div class="modal-overlay" onclick="closeModalBg(event)"><div class="modal">
      <span class="modal-handle"></span>
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div class="modal-title">💰 Buy Property</div>
      <div style="padding:14px;background:var(--surface2);border-radius:var(--r-sm);border:1px solid var(--border);margin-bottom:16px">
        <div style="font-size:17px;font-weight:800">${esc(prop.name)}</div>
        <div style="font-size:13px;color:var(--text3);margin-top:4px">Price: <strong style="color:var(--text)">₹${num(prop.price)}</strong></div>
      </div>
      <div class="card-title">Select Buyer</div>
      ${state.teams.map(t=>{
        const canAfford=t.balance>=prop.price;
        return`<div class="prop-row" style="margin-bottom:8px">
          <div><div style="font-weight:700;color:${t.color}">${esc(t.name)}</div><div style="font-size:12px;color:var(--text3)">₹${num(t.balance)}</div></div>
          <button class="btn sm success" onclick="confirmBuyProp('${prop.id}','${t.id}')" ${!canAfford?'disabled':''}>Buy</button>
        </div>`;
      }).join('')}
    </div></div>`;
  }

  // ── ADD / EDIT TEAM ──
  if(m.type==='addTeam'||m.type==='editTeam'){
    const t=m.team||{name:'',balance:state.board.startMoney,color:COLORS[state.teams.length%COLORS.length]};
    return`<div class="modal-overlay" onclick="closeModalBg(event)"><div class="modal">
      <span class="modal-handle"></span>
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div class="modal-title">${m.type==='addTeam'?'Add Team':'Edit Team'}</div>
      <div class="form-row"><label>Team Name</label><input type="text" id="m-name" value="${esc(t.name)}" placeholder="e.g. Team Alpha" autofocus></div>
      <div class="form-row"><label>Starting Balance (₹)</label><input type="number" id="m-balance" value="${t.balance}"></div>
      <div class="form-row"><label>Team Color</label>
        <div style="display:flex;flex-wrap:wrap;gap:10px;margin-top:8px">
          ${COLORS.map((c,i)=>`<div onclick="selectColor(this,'m-color','${c}')" class="color-swatch" style="width:34px;height:34px;border-radius:50%;background:${c};cursor:pointer;outline:${t.color===c?'3px solid var(--accent)':'none'};outline-offset:3px;transition:outline .15s"></div>`).join('')}
        </div>
        <input type="hidden" id="m-color" value="${t.color}">
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:16px">
        <button class="btn primary lg" onclick="${m.type==='addTeam'?'saveAddTeam()':'saveEditTeam(\''+m.teamId+'\')'}">Save</button>
        <button class="btn lg" onclick="closeModal()">Cancel</button>
      </div>
    </div></div>`;
  }

  // ── ADD / EDIT PROPERTY ──
  if(m.type==='addProp'||m.type==='editProp'){
    const p=m.prop||{name:'',price:200,rent:20,group:'',colorIdx:0};
    const groups=[...new Set(state.properties.map(x=>x.group).filter(Boolean))];
    return`<div class="modal-overlay" onclick="closeModalBg(event)"><div class="modal">
      <span class="modal-handle"></span>
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div class="modal-title">${m.type==='addProp'?'Add Property':'Edit Property'}</div>
      <div class="form-row"><label>Property Name</label><input type="text" id="p-name" value="${esc(p.name)}" placeholder="e.g. Marina Beach" autofocus></div>
      <div class="form-2">
        <div class="form-row"><label>Price (₹)</label><input type="number" id="p-price" value="${p.price}"></div>
        <div class="form-row"><label>Rent (₹)</label><input type="number" id="p-rent" value="${p.rent}"></div>
      </div>
      <div class="form-row"><label>Group / Area</label>
        <input type="text" id="p-group" value="${esc(p.group||'')}" placeholder="e.g. Marina, T-Nagar" list="group-list">
        <datalist id="group-list">${groups.map(g=>`<option value="${esc(g)}">`).join('')}</datalist>
      </div>
      <div class="form-row"><label>Color</label>
        <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:8px">
          ${COLORS.map((c,i)=>`<div onclick="selectColorIdx(this,'p-color',${i})" class="prop-color-swatch" style="width:30px;height:30px;border-radius:50%;background:${c};cursor:pointer;outline:${p.colorIdx===i?'3px solid var(--accent)':'none'};outline-offset:3px;transition:outline .15s"></div>`).join('')}
        </div>
        <input type="hidden" id="p-color" value="${p.colorIdx}">
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px">
        <button class="btn primary lg" onclick="${m.type==='addProp'?'saveAddProp()':'saveEditProp(\''+m.propId+'\')'}">Save</button>
        <button class="btn lg" onclick="closeModal()">Cancel</button>
      </div>
    </div></div>`;
  }

  // ── TRANSACT ──
  if(m.type==='transact'){
    const team=state.teams.find(t=>t.id===m.teamId);
    const isCredit=m.subtype==='credit';
    return`<div class="modal-overlay" onclick="closeModalBg(event)"><div class="modal">
      <span class="modal-handle"></span>
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div class="modal-title">${isCredit?'💚 Add Credits':'🔴 Deduct Credits'}</div>
      <div style="padding:14px;background:var(--surface2);border-radius:var(--r-sm);margin-bottom:16px;border:1px solid var(--border)">
        <div style="font-size:12px;color:var(--text3)">Player</div>
        <div style="font-weight:700;color:${team?.color};font-size:16px">${esc(team?.name)}</div>
        <div style="font-size:24px;font-weight:900;margin-top:2px">₹${num(team?.balance)}</div>
      </div>
      <div class="form-row"><label>Amount (₹) — must be positive</label><input type="number" id="t-amount" placeholder="0" min="1" autofocus></div>
      <div class="form-row"><label>Note (optional)</label><input type="text" id="t-note" placeholder="e.g. Salary, Bonus…"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px">
        <button class="btn ${isCredit?'success':'danger'} lg" onclick="saveTransact('${m.teamId}','${m.subtype}')">Confirm</button>
        <button class="btn lg" onclick="closeModal()">Cancel</button>
      </div>
    </div></div>`;
  }

  // ── ASSIGN ──
  if(m.type==='assign'){
    const team=state.teams.find(t=>t.id===m.teamId);
    const allProps=state.properties.filter(p=>!p.ownedBy||p.ownedBy===m.teamId);
    return`<div class="modal-overlay" onclick="closeModalBg(event)"><div class="modal">
      <span class="modal-handle"></span>
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div class="modal-title">📦 Admin Assign</div>
      <div style="font-size:13px;color:var(--text2);margin-bottom:14px">Free assignment to: <strong style="color:${team?.color}">${esc(team?.name)}</strong></div>
      ${!allProps.length?`<div class="empty">No available properties.</div>`:`
        <div style="max-height:380px;overflow-y:auto">
        ${allProps.map(p=>`<div class="prop-row" onclick="toggleAssign('${p.id}','${m.teamId}')" style="cursor:pointer;margin-bottom:7px">
          <div class="prop-left">
            <div class="color-bar" style="background:${COLORS[p.colorIdx??0]};height:30px"></div>
            <div><div class="prop-name">${esc(p.name)}</div><div class="prop-meta">₹${num(p.price)} · Rent ₹${num(p.rent)}</div></div>
          </div>
          ${p.ownedBy===m.teamId?`<span class="badge owned">✓</span>`:`<span class="badge free">Assign</span>`}
        </div>`).join('')}
        </div>`}
      <button class="btn lg" style="margin-top:14px" onclick="closeModal()">Done</button>
    </div></div>`;
  }

  // ── RENT ──
  if(m.type==='rent'){
    const team=state.teams.find(t=>t.id===m.teamId);
    const active=state.properties.filter(p=>p.ownedBy&&p.ownedBy!==m.teamId&&!p.mortgaged);
    const suspended=state.properties.filter(p=>p.ownedBy&&p.ownedBy!==m.teamId&&p.mortgaged);
    return`<div class="modal-overlay" onclick="closeModalBg(event)"><div class="modal">
      <span class="modal-handle"></span>
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div class="modal-title">💸 Pay Rent</div>
      <div style="font-size:13px;color:var(--text2);margin-bottom:14px">Paying from: <strong style="color:${team?.color}">${esc(team?.name)}</strong> (₹${num(team?.balance)})</div>
      ${!active.length&&!suspended.length?`<div style="color:var(--text3);font-size:14px;padding:16px 0;text-align:center">No properties owned by other teams.</div>`:`
        <div style="max-height:380px;overflow-y:auto">
        ${active.map(p=>{
          const owner=state.teams.find(t=>t.id===p.ownedBy);
          return`<div class="prop-row" onclick="payRent('${m.teamId}','${p.id}')" style="cursor:pointer;margin-bottom:7px">
            <div class="prop-left">
              <div class="color-bar" style="background:${COLORS[p.colorIdx??0]};height:30px"></div>
              <div><div class="prop-name">${esc(p.name)}</div><div class="prop-meta">Owner: <span style="color:${owner?.color}">${esc(owner?.name)}</span> · ₹${num(p.rent)}</div></div>
            </div>
            <button class="btn sm primary">₹${num(p.rent)}</button>
          </div>`;
        }).join('')}
        ${suspended.length?`<div style="padding:8px 0 6px;font-size:11px;color:var(--amber);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-top:8px">🔒 Mortgaged — Rent Suspended</div>
        ${suspended.map(p=>{
          const owner=state.teams.find(t=>t.id===p.ownedBy);
          return`<div class="prop-row mortgaged-row" style="opacity:.5;margin-bottom:7px">
            <div class="prop-left">
              <div class="color-bar" style="background:${COLORS[p.colorIdx??0]};height:30px;opacity:.4"></div>
              <div><div class="prop-name">${esc(p.name)} 🔒</div><div class="prop-meta">Owner: <span style="color:${owner?.color}">${esc(owner?.name)}</span> · No rent</div></div>
            </div>
            <span class="badge mortgaged">Suspended</span>
          </div>`;
        }).join('')}`:''}
        </div>`}
      <button class="btn lg" style="margin-top:12px" onclick="closeModal()">Done</button>
    </div></div>`;
  }

  // ── MORTGAGE ──
  if(m.type==='mortgage'){
    const team=state.teams.find(t=>t.id===m.teamId);
    const owned=state.properties.filter(p=>p.ownedBy===m.teamId);
    const canMortgage=owned.filter(p=>!p.mortgaged);
    const isMortgaged=owned.filter(p=>p.mortgaged);
    return`<div class="modal-overlay" onclick="closeModalBg(event)"><div class="modal">
      <span class="modal-handle"></span>
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div class="modal-title">🔒 Mortgage</div>
      <div style="padding:12px;background:var(--surface2);border-radius:var(--r-sm);border:1px solid var(--border);margin-bottom:14px">
        <div style="font-size:12px;color:var(--text3)">Player</div>
        <div style="font-weight:700;color:${team?.color};font-size:16px">${esc(team?.name)}</div>
        <div style="font-size:22px;font-weight:900;margin-top:2px">₹${num(team?.balance)}</div>
      </div>
      <div class="info-box amber" style="font-size:12px">🏦 Mortgage = <strong>50% of property price</strong> from bank. Rent suspended until unmortgaged. Unmortgage costs the same amount.</div>
      ${canMortgage.length?`
        <div class="card-title" style="margin-top:14px">Available to Mortgage</div>
        <div style="max-height:220px;overflow-y:auto;margin-bottom:12px">
        ${canMortgage.map(p=>{
          const mv=Math.floor((p.price||0)/2);
          const bankAffords=state.board.bankBalance>=mv;
          return`<div class="prop-row" style="cursor:${bankAffords?'pointer':'default'};margin-bottom:7px" ${bankAffords?`onclick="mortgageProp('${p.id}')"`:''}>
            <div class="prop-left">
              <div class="color-bar" style="background:${COLORS[p.colorIdx??0]};height:30px"></div>
              <div><div class="prop-name">${esc(p.name)}</div><div class="prop-meta">Get <strong style="color:var(--amber)">₹${num(mv)}</strong>${!bankAffords?' <span style="color:var(--red)">(Bank broke)</span>':''}</div></div>
            </div>
            <button class="btn sm amber" ${!bankAffords?'disabled':''} onclick="event.stopPropagation();mortgageProp('${p.id}')">Mortgage</button>
          </div>`;
        }).join('')}
        </div>`:`<div style="color:var(--text3);font-size:13px;padding:10px 0 14px">No properties to mortgage.</div>`}
      ${isMortgaged.length?`
        <div class="divider"></div>
        <div class="card-title" style="color:var(--amber)">🔒 Currently Mortgaged</div>
        <div style="max-height:220px;overflow-y:auto">
        ${isMortgaged.map(p=>{
          const mv=Math.floor((p.price||0)/2);
          const canAfford=(team?.balance||0)>=mv;
          return`<div class="prop-row mortgaged-row" style="cursor:${canAfford?'pointer':'default'};margin-bottom:7px" ${canAfford?`onclick="unmortgageProp('${p.id}')"`:''}>
            <div class="prop-left">
              <div class="color-bar" style="background:${COLORS[p.colorIdx??0]};height:30px;opacity:.4"></div>
              <div><div class="prop-name">${esc(p.name)} 🔒</div><div class="prop-meta">Pay bank: <strong style="color:var(--green)">₹${num(mv)}</strong>${!canAfford?' <span style="color:var(--red)">(not enough funds)</span>':''}</div></div>
            </div>
            <button class="btn sm success" ${!canAfford?'disabled':''} onclick="event.stopPropagation();unmortgageProp('${p.id}')">Unmortgage</button>
          </div>`;
        }).join('')}
        </div>`:''}
      <button class="btn lg" style="margin-top:14px" onclick="closeModal()">Done</button>
    </div></div>`;
  }

  // ── AUCTION ──
  if(m.type==='auction'){
    const prop=state.properties.find(p=>p.id===m.propId);if(!prop)return'';
    const curBid=m.currentBid||0;
    const curBidder=m.currentBidderId?state.teams.find(t=>t.id===m.currentBidderId):null;
    return`<div class="modal-overlay" onclick="closeModalBg(event)"><div class="modal">
      <span class="modal-handle"></span>
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div class="modal-title">🔨 Auction</div>
      <div style="display:flex;align-items:center;gap:12px;padding:12px;background:var(--surface2);border-radius:var(--r-sm);border:1px solid var(--border);margin-bottom:14px">
        <div style="width:14px;height:44px;border-radius:4px;flex-shrink:0;background:${COLORS[prop.colorIdx??0]}"></div>
        <div style="flex:1">
          <div style="font-size:16px;font-weight:800">${esc(prop.name)}</div>
          <div style="font-size:12px;color:var(--text3);margin-top:2px">Listed: ₹${num(prop.price)} · Rent: ₹${num(prop.rent)}</div>
        </div>
        <span class="badge auction">🔨 Auction</span>
      </div>
      ${curBid>0?`<div style="background:var(--amber-bg);border:1px solid var(--amber-border);border-radius:var(--r-xs);padding:12px 14px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center">
        <div><div style="font-size:11px;color:var(--amber);font-weight:700;text-transform:uppercase;letter-spacing:.4px">Highest Bid</div><div style="font-size:22px;font-weight:900;color:var(--amber)">₹${num(curBid)}</div></div>
        <div style="text-align:right"><div style="font-size:11px;color:var(--text3)">By</div><div style="font-weight:700;color:${curBidder?.color||'var(--text)'}">${esc(curBidder?.name||'—')}</div></div>
      </div>`:`<div class="info-box blue" style="margin-bottom:12px">No bids yet. Highest bidder wins — money goes to Bank.</div>`}
      <div class="card-title">Place a Bid</div>
      <div style="max-height:280px;overflow-y:auto">
      ${state.teams.map(team=>`<div class="bid-row">
        <div style="flex:1"><div style="font-size:13px;font-weight:700;color:${team.color}">${esc(team.name)}</div><div style="font-size:11px;color:var(--text3)">₹${num(team.balance)}</div></div>
        <input type="number" id="bid-${team.id}" placeholder="₹${curBid+1}" min="${curBid+1}" style="width:90px;padding:8px;font-size:13px">
        <button class="btn sm primary" onclick="placeBid('${prop.id}','${team.id}')">Bid</button>
      </div>`).join('')}
      </div>
      <div class="divider"></div>
      ${curBid>0&&curBidder?`<div style="padding:12px;background:var(--green-bg);border:1px solid var(--green-border);border-radius:var(--r-xs);margin-bottom:10px;display:flex;justify-content:space-between;align-items:center">
        <div><div style="font-size:11px;color:var(--green);font-weight:700;text-transform:uppercase">Ready to sell</div><div style="font-weight:700;color:${curBidder.color}">${esc(curBidder.name)}</div><div style="font-size:12px;color:var(--text3)">₹${num(curBid)} → bank</div></div>
        <button class="btn success" onclick="finalizeAuction('${prop.id}')">🏆 Sell</button>
      </div>`:''}
      <button class="btn lg" onclick="closeModal()">Cancel Auction</button>
    </div></div>`;
  }

  // ── BANKRUPTCY ──
  if(m.type==='bankruptcy'){
    const team=state.teams.find(t=>t.id===m.teamId);
    const tp=state.properties.filter(p=>p.ownedBy===m.teamId);
    return`<div class="modal-overlay" onclick="closeModalBg(event)"><div class="modal">
      <span class="modal-handle"></span>
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div class="modal-title">💀 Bankruptcy</div>
      <div style="padding:14px;background:var(--red-bg);border:1px solid var(--red-border);border-radius:var(--r-xs);margin-bottom:14px">
        <div style="font-weight:800;color:${team?.color};font-size:16px">${esc(team?.name)}</div>
        <div style="font-size:13px;color:var(--text3);margin-top:4px">Cash: ₹${num(team?.balance)} · ${tp.length} properties</div>
      </div>
      <div class="info-box red" style="font-size:13px;margin-bottom:14px">All cash and properties return to bank. Player is removed from the game.</div>
      ${tp.length?`<div style="margin-bottom:14px">
        <div style="font-size:12px;color:var(--text3);margin-bottom:8px;font-weight:700;text-transform:uppercase;letter-spacing:.4px">Properties returning (${tp.length})</div>
        <div style="display:flex;flex-wrap:wrap;gap:4px">${tp.map(p=>`<span class="prop-chip"><span class="color-dot" style="background:${COLORS[p.colorIdx??0]}"></span>${esc(p.name)}</span>`).join('')}</div>
      </div>`:''}
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <button class="btn danger lg" onclick="confirmBankruptcy('${m.teamId}')">💀 Confirm</button>
        <button class="btn lg" onclick="closeModal()">Cancel</button>
      </div>
    </div></div>`;
  }

  // ── ADMIN: ADD TEAM (BANK-AWARE) ──
  if(m.type==='adminAddTeam'){
    return`<div class="modal-overlay" onclick="closeModalBg(event)"><div class="modal">
      <span class="modal-handle"></span>
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div class="modal-title">👤 Add Player (Bank-Aware)</div>
      <div class="info-box green" style="font-size:12px;margin-bottom:16px">Starting balance will be <strong>deducted from the bank</strong> and a transaction will be logged.</div>
      <div style="font-size:13px;color:var(--text2);margin-bottom:14px">Bank Balance: <strong style="color:var(--green)">₹${num(state.board.bankBalance)}</strong></div>
      <div class="form-row"><label>Team Name</label><input type="text" id="adm-name" placeholder="e.g. Team Alpha" autofocus></div>
      <div class="form-row"><label>Starting Balance (₹)</label><input type="number" id="adm-balance" value="${state.board.startMoney}"></div>
      <div class="form-row"><label>Team Color</label>
        <div style="display:flex;flex-wrap:wrap;gap:10px;margin-top:8px">
          ${COLORS.map((c,i)=>`<div onclick="selectColor(this,'adm-color','${c}')" class="color-swatch" style="width:34px;height:34px;border-radius:50%;background:${c};cursor:pointer;outline:${i===state.teams.length%COLORS.length?'3px solid var(--accent)':'none'};outline-offset:3px;transition:outline .15s"></div>`).join('')}
        </div>
        <input type="hidden" id="adm-color" value="${COLORS[state.teams.length%COLORS.length]}">
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:16px">
        <button class="btn primary lg" onclick="adminAddTeamWithBank()">Add Player</button>
        <button class="btn lg" onclick="closeModal()">Cancel</button>
      </div>
    </div></div>`;
  }

  // ── ADMIN: EDIT BALANCE (RECONCILED) ──
  if(m.type==='adminEditBalance'){
    const team=state.teams.find(t=>t.id===m.teamId);
    return`<div class="modal-overlay" onclick="closeModalBg(event)"><div class="modal">
      <span class="modal-handle"></span>
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div class="modal-title">✏️ Edit Player Balance</div>
      <div class="info-box blue" style="font-size:12px;margin-bottom:16px">The difference between old and new balance will be <strong>reconciled with the bank</strong> and logged as an admin transaction.</div>
      <div style="padding:12px;background:var(--surface2);border-radius:var(--r-sm);margin-bottom:14px;border:1px solid var(--border)">
        <div style="font-size:12px;color:var(--text3)">Editing</div>
        <div style="font-weight:700;color:${team?.color};font-size:16px">${esc(team?.name)}</div>
        <div style="font-size:20px;font-weight:900;margin-top:2px">₹${num(team?.balance)}</div>
      </div>
      <div class="form-row"><label>New Balance (₹)</label><input type="number" id="adm-newbal" value="${team?.balance}" autofocus></div>
      <div class="form-row"><label>Reason / Note</label><input type="text" id="adm-balnote" placeholder="e.g. Starting balance correction"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px">
        <button class="btn primary lg" onclick="adminEditBalance('${m.teamId}')">Apply</button>
        <button class="btn lg" onclick="closeModal()">Cancel</button>
      </div>
    </div></div>`;
  }

  // ── ADMIN: SELECT TEAM FOR BALANCE EDIT ──
  if(m.type==='adminSelectTeam'){
    return`<div class="modal-overlay" onclick="closeModalBg(event)"><div class="modal">
      <span class="modal-handle"></span>
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div class="modal-title">✏️ Select Player</div>
      ${!state.teams.length?`<div class="empty">No players added yet.</div>`:`
        <div style="max-height:420px;overflow-y:auto">
        ${state.teams.map(t=>`<div class="prop-row" onclick="state.modal={type:'adminEditBalance',teamId:'${t.id}'};render()" style="cursor:pointer;margin-bottom:8px">
          <div style="display:flex;align-items:center;gap:10px;flex:1">
            <div style="width:10px;height:10px;border-radius:50%;background:${t.color}"></div>
            <div><div style="font-weight:700;color:${t.color}">${esc(t.name)}</div><div style="font-size:12px;color:var(--text3)">₹${num(t.balance)}</div></div>
          </div>
          <span style="font-size:20px;color:var(--text3)">›</span>
        </div>`).join('')}
        </div>`}
      <button class="btn lg" style="margin-top:10px" onclick="closeModal()">Cancel</button>
    </div></div>`;
  }

  return'';
}

// ── ACTIONS ──
function uid(){return Math.random().toString(36).slice(2,9);}
function stateChanged(){render();saveToServer({...state,modal:null});}

window.setTab=t=>{state.activeTab=t;render();};
window.closeModal=()=>{state.modal=null;render();};
window.closeModalBg=e=>{if(e.target===e.currentTarget){state.modal=null;render();}};
window.searchProps=v=>{state.propSearch=v;render();};

window.selectColor=(el,inputId,c)=>{
  document.getElementById(inputId).value=c;
  document.querySelectorAll('.color-swatch').forEach(x=>x.style.outline='none');
  el.style.outline='3px solid var(--accent)';el.style.outlineOffset='3px';
};
window.selectColorIdx=(el,inputId,i)=>{
  document.getElementById(inputId).value=i;
  document.querySelectorAll('.prop-color-swatch').forEach(x=>x.style.outline='none');
  el.style.outline='3px solid var(--accent)';el.style.outlineOffset='3px';
};

// ── TEAMS ──
window.saveAddTeam=()=>{
  const name=document.getElementById('m-name')?.value?.trim();
  const balance=parseInt(document.getElementById('m-balance')?.value)||0;
  const color=document.getElementById('m-color')?.value||COLORS[0];
  if(!name){toast('Enter a team name','error');return;}
  state.teams.push({id:uid(),name,balance,color});
  state.modal=null;stateChanged();
};
window.editTeam=id=>{const t=state.teams.find(x=>x.id===id);state.modal={type:'editTeam',teamId:id,team:{...t}};render();};
window.saveEditTeam=id=>{
  const t=state.teams.find(x=>x.id===id);if(!t)return;
  t.name=document.getElementById('m-name')?.value?.trim()||t.name;
  t.balance=parseInt(document.getElementById('m-balance')?.value)||0;
  t.color=document.getElementById('m-color')?.value||t.color;
  state.modal=null;stateChanged();
};
window.deleteTeam=id=>{
  if(!confirm('Remove this team?'))return;
  const team=state.teams.find(t=>t.id===id);
  if(team&&team.balance>0){
    state.board.bankBalance+=team.balance;
    state.transactions.push({id:uid(),teamId:'bank',amount:team.balance,note:`Player ${team.name} removed — cash returned to bank`,type:'admin',time:Date.now()});
  }
  state.teams=state.teams.filter(t=>t.id!==id);
  state.properties.forEach(p=>{if(p.ownedBy===id){p.ownedBy=null;p.mortgaged=false;}});
  stateChanged();
};

// ── PROPERTIES ──
window.saveAddProp=()=>{
  const name=document.getElementById('p-name')?.value?.trim();
  if(!name){toast('Enter a property name','error');return;}
  state.properties.push({id:uid(),name,price:parseInt(document.getElementById('p-price')?.value)||0,rent:parseInt(document.getElementById('p-rent')?.value)||0,group:document.getElementById('p-group')?.value?.trim()||'',colorIdx:parseInt(document.getElementById('p-color')?.value)||0,mortgaged:false,ownedBy:null});
  state.modal=null;stateChanged();
};
window.editProp=id=>{const p=state.properties.find(x=>x.id===id);state.modal={type:'editProp',propId:id,prop:{...p}};render();};
window.saveEditProp=id=>{
  const p=state.properties.find(x=>x.id===id);if(!p)return;
  p.name=document.getElementById('p-name')?.value?.trim()||p.name;
  p.price=parseInt(document.getElementById('p-price')?.value)||0;
  p.rent=parseInt(document.getElementById('p-rent')?.value)||0;
  p.group=document.getElementById('p-group')?.value?.trim()||'';
  p.colorIdx=parseInt(document.getElementById('p-color')?.value)||0;
  state.modal=null;stateChanged();
};
window.deleteProp=id=>{
  if(!confirm('Remove this property?'))return;
  state.properties=state.properties.filter(p=>p.id!==id);stateChanged();
};

// ── BANK ──
window.openBankAdjust=()=>{state.modal={type:'adjustBank'};render();};
window.adjustBank=(isAdding)=>{
  const amt=parseInt(document.getElementById('bank-amt')?.value)||0;
  if(!amt||amt<=0)return toast('Enter a valid positive amount','error');
  if(!isAdding&&state.board.bankBalance<amt)return toast('Bank does not have that much!','error');
  state.board.bankBalance+=isAdding?amt:-amt;
  state.transactions.push({id:uid(),teamId:'bank',amount:isAdding?amt:-amt,note:isAdding?'Admin: added funds to bank':'Admin: removed funds from bank',type:'admin',time:Date.now()});
  state.modal=null;stateChanged();toast('Bank updated','success');
};

window.passGo=teamId=>{
  if(state.board.bankBalance<200){toast('Bank insufficient funds for GO!','error');return;}
  const team=state.teams.find(t=>t.id===teamId);if(!team)return;
  team.balance+=200;state.board.bankBalance-=200;
  state.transactions.push({id:uid(),teamId,amount:200,note:'Passed GO (+₹200 from Bank)',type:'credit',time:Date.now()});
  stateChanged();toast(`₹200 paid to ${team.name} for passing GO!`,'success');
};

window.openTransact=(teamId,subtype)=>{state.modal={type:'transact',teamId,subtype};render();};

// BUG FIX #3: Validates amount is strictly positive (no negative inputs allowed)
window.saveTransact=(teamId,subtype)=>{
  const amount=parseInt(document.getElementById('t-amount')?.value)||0;
  const note=document.getElementById('t-note')?.value?.trim();
  if(!amount||amount<=0){toast('Enter a positive amount','error');return;}
  const team=state.teams.find(t=>t.id===teamId);if(!team)return;
  if(subtype==='credit'){
    if(state.board.bankBalance<amount){toast('Bank has insufficient funds!','error');return;}
    state.board.bankBalance-=amount;team.balance+=amount;
  }else{
    team.balance-=amount;state.board.bankBalance+=amount;
  }
  const delta=subtype==='credit'?amount:-amount;
  state.transactions.push({id:uid(),teamId,amount:delta,note:note||(subtype==='credit'?'Received from Bank':'Paid to Bank'),type:subtype,time:Date.now()});
  state.modal=null;stateChanged();
};

// ── PROPERTY ASSIGN & BUY ──
window.openAssign=teamId=>{state.modal={type:'assign',teamId};render();};
window.toggleAssign=(propId,teamId)=>{
  const p=state.properties.find(x=>x.id===propId);if(!p)return;
  const wasOwned=p.ownedBy===teamId;
  if(wasOwned){p.ownedBy=null;p.mortgaged=false;}else{p.ownedBy=teamId;}
  state.transactions.push({id:uid(),teamId,amount:0,note:`Admin assign: ${p.name} ${wasOwned?'unassigned':'assigned'}`,type:'admin',time:Date.now()});
  state.modal={type:'assign',teamId};stateChanged();
};
window.openBuyProp=propId=>{state.modal={type:'buyProp',propId};render();};
window.confirmBuyProp=(propId,teamId)=>{
  const prop=state.properties.find(p=>p.id===propId);
  const team=state.teams.find(t=>t.id===teamId);
  if(!prop||!team)return;
  if(team.balance<prop.price){toast(`${team.name} has insufficient funds!`,'error');return;}
  team.balance-=prop.price;state.board.bankBalance+=prop.price;
  prop.ownedBy=team.id;prop.mortgaged=false;
  state.transactions.push({id:uid(),teamId,amount:-prop.price,note:`Bought ${prop.name} from Bank`,type:'debit',time:Date.now()});
  toast(`🏠 ${team.name} bought ${prop.name}!`,'success');
  state.modal=null;stateChanged();
};

// ── RENT ──
window.openRent=teamId=>{state.modal={type:'rent',teamId};render();};
window.payRent=(fromId,propId)=>{
  const prop=state.properties.find(p=>p.id===propId);
  if(!prop||!prop.ownedBy)return;
  if(prop.mortgaged){toast('🔒 Property mortgaged — no rent!','amber');return;}
  const payer=state.teams.find(t=>t.id===fromId);
  const owner=state.teams.find(t=>t.id===prop.ownedBy);
  if(!payer||!owner)return;
  payer.balance-=prop.rent;owner.balance+=prop.rent;
  state.transactions.push({id:uid(),teamId:fromId,amount:-prop.rent,note:`Rent: ${prop.name}`,type:'rent',time:Date.now()});
  state.transactions.push({id:uid(),teamId:prop.ownedBy,amount:prop.rent,note:`Rent from ${payer.name}: ${prop.name}`,type:'rent',time:Date.now()});
  toast(`₹${num(prop.rent)} paid to ${owner.name}!`,'success');
  state.modal={type:'rent',teamId:fromId};stateChanged();
};

// ── MORTGAGE ──
window.openMortgage=teamId=>{state.modal={type:'mortgage',teamId};render();};
window.mortgageProp=propId=>{
  const prop=state.properties.find(p=>p.id===propId);
  if(!prop||!prop.ownedBy||prop.mortgaged)return;
  const owner=state.teams.find(t=>t.id===prop.ownedBy);if(!owner)return;
  const mv=Math.floor((prop.price||0)/2);
  if(state.board.bankBalance<mv){toast('Bank insufficient funds for mortgage!','error');return;}
  prop.mortgaged=true;owner.balance+=mv;state.board.bankBalance-=mv;
  state.transactions.push({id:uid(),teamId:owner.id,amount:mv,note:`Mortgage: ${prop.name} — bank pays 50%`,type:'mortgage',time:Date.now()});
  toast(`🔒 ${prop.name} mortgaged — ₹${num(mv)} from bank`,'amber');
  if(state.modal?.type==='mortgage')state.modal={type:'mortgage',teamId:owner.id};
  stateChanged();
};
window.unmortgageProp=propId=>{
  const prop=state.properties.find(p=>p.id===propId);
  if(!prop||!prop.ownedBy||!prop.mortgaged)return;
  const owner=state.teams.find(t=>t.id===prop.ownedBy);if(!owner)return;
  const mv=Math.floor((prop.price||0)/2);
  if(owner.balance<mv){toast(`Need ₹${num(mv)} to unmortgage`,'error');return;}
  prop.mortgaged=false;owner.balance-=mv;state.board.bankBalance+=mv;
  state.transactions.push({id:uid(),teamId:owner.id,amount:-mv,note:`Unmortgage: ${prop.name}`,type:'unmortgage',time:Date.now()});
  toast(`🔓 ${prop.name} unmortgaged — ₹${num(mv)} paid to bank`,'success');
  if(state.modal?.type==='mortgage')state.modal={type:'mortgage',teamId:owner.id};
  stateChanged();
};

// ── AUCTION ──
window.promptAuctionForTeam=teamId=>{
  const bankProps=state.properties.filter(p=>!p.ownedBy);
  if(!bankProps.length){toast('No bank-owned properties for auction','error');return;}
  toast('Go to Properties tab → tap 🔨 on a bank-owned property','');
};
window.openAuctionForProp=propId=>{
  const prop=state.properties.find(p=>p.id===propId);if(!prop)return;
  if(prop.ownedBy){toast('Property already owned','error');return;}
  state.modal={type:'auction',propId,currentBid:0,currentBidderId:null};render();
};
window.placeBid=(propId,teamId)=>{
  const m=state.modal;if(!m||m.type!=='auction')return;
  const inputEl=document.getElementById(`bid-${teamId}`);
  const bidAmt=parseInt(inputEl?.value)||0;
  const team=state.teams.find(t=>t.id===teamId);if(!team)return;
  if(!bidAmt||bidAmt<=0){toast('Enter a valid bid','error');return;}
  if(bidAmt<=(m.currentBid||0)){toast(`Bid must exceed ₹${num(m.currentBid)}`,'error');return;}
  if(bidAmt>team.balance){toast(`${team.name} only has ₹${num(team.balance)}`,'error');return;}
  state.modal={...m,currentBid:bidAmt,currentBidderId:teamId};
  toast(`🔨 ${team.name} bids ₹${num(bidAmt)}!`,'');render();
};
window.finalizeAuction=propId=>{
  const m=state.modal;
  if(!m||m.type!=='auction'||!m.currentBidderId||!m.currentBid)return;
  const prop=state.properties.find(p=>p.id===propId);
  const winner=state.teams.find(t=>t.id===m.currentBidderId);
  if(!prop||!winner)return;
  winner.balance-=m.currentBid;state.board.bankBalance+=m.currentBid;
  prop.ownedBy=winner.id;prop.mortgaged=false;
  state.transactions.push({id:uid(),teamId:winner.id,amount:-m.currentBid,note:`Auction: won ${prop.name} (paid to bank)`,type:'auction',time:Date.now()});
  toast(`🏆 ${winner.name} won ${prop.name} for ₹${num(m.currentBid)}!`,'success');
  state.modal=null;stateChanged();
};

// ── BANKRUPTCY ──
window.declareBankruptcy=teamId=>{state.modal={type:'bankruptcy',teamId};render();};

// BUG FIX #2: Records actual cash amount in bankruptcy transaction
window.confirmBankruptcy=teamId=>{
  const team=state.teams.find(t=>t.id===teamId);if(!team)return;
  const tp=state.properties.filter(p=>p.ownedBy===teamId);
  const cashLost=team.balance;
  if(cashLost>0){state.board.bankBalance+=cashLost;}
  tp.forEach(p=>{p.ownedBy=null;p.mortgaged=false;});
  // FIX: amount now records actual cash lost (was incorrectly 0)
  state.transactions.push({
    id:uid(),teamId,
    amount:-cashLost,
    note:`💀 Bankruptcy — ₹${num(cashLost)} cash + ${tp.length} properties returned to bank`,
    type:'bankruptcy',time:Date.now()
  });
  state.teams=state.teams.filter(t=>t.id!==teamId);
  toast(`💀 ${team.name} bankrupt — returned to bank`,'error');
  state.modal=null;stateChanged();
};

// ── SETTINGS ──
window.saveBoardSettings=()=>{
  state.board.name=document.getElementById('board-name')?.value?.trim()||state.board.name;
  state.board.startMoney=parseInt(document.getElementById('start-money')?.value)||1500;
  state.board.bankBalance=parseInt(document.getElementById('start-bank-money')?.value)||0;
  document.getElementById('header-board-name').textContent=state.board.name;
  stateChanged();toast('Settings saved','success');
};
window.exportData=()=>{
  const d=JSON.stringify(state,null,2);const a=document.createElement('a');
  a.href='data:text/json;charset=utf-8,'+encodeURIComponent(d);a.download='monopoly-backup.json';a.click();
};
window.resetAll=()=>{
  if(!confirm('Reset ALL game data? This cannot be undone!'))return;
  state.teams=[];state.properties=[];state.transactions=[];stateChanged();toast('All data reset','success');
};

// ── ADMIN ACTIONS ──

// BUG FIX #4: Bank-aware team addition — deducts starting balance from bank
window.openAdminAddTeamWithBank=()=>{state.modal={type:'adminAddTeam'};render();};
window.adminAddTeamWithBank=()=>{
  const name=document.getElementById('adm-name')?.value?.trim();
  const balance=parseInt(document.getElementById('adm-balance')?.value)||0;
  const color=document.getElementById('adm-color')?.value||COLORS[0];
  if(!name){toast('Enter a player name','error');return;}
  if(balance>0&&state.board.bankBalance<balance){
    toast(`Bank only has ₹${num(state.board.bankBalance)} — not enough for starting balance`,'error');return;
  }
  const newTeam={id:uid(),name,balance,color};
  state.teams.push(newTeam);
  if(balance>0){
    state.board.bankBalance-=balance;
    state.transactions.push({id:uid(),teamId:newTeam.id,amount:balance,note:`Starting balance for ${name} (deducted from bank)`,type:'credit',time:Date.now()});
  }
  state.modal=null;stateChanged();
  toast(`${name} added — ₹${num(balance)} deducted from bank`,'success');
};

// BUG FIX #7: Edit balance with full bank reconciliation + transaction log
window.openAdminEditBalance=()=>{state.modal={type:'adminSelectTeam'};render();};
window.adminEditBalance=teamId=>{
  const team=state.teams.find(t=>t.id===teamId);if(!team)return;
  const newBal=parseInt(document.getElementById('adm-newbal')?.value)||0;
  const note=document.getElementById('adm-balnote')?.value?.trim()||'Admin balance correction';
  if(newBal<0){toast('Balance cannot be negative','error');return;}
  const diff=newBal-team.balance;
  if(diff===0){toast('No change — balance is already that amount','');state.modal=null;render();return;}
  // Reconcile with bank
  if(diff>0){
    // Player gaining money — bank pays
    if(state.board.bankBalance<diff){toast(`Bank only has ₹${num(state.board.bankBalance)}. Insufficient for this increase.`,'error');return;}
    state.board.bankBalance-=diff;
  }else{
    // Player losing money — bank receives
    state.board.bankBalance+=Math.abs(diff);
  }
  const oldBal=team.balance;
  team.balance=newBal;
  state.transactions.push({
    id:uid(),teamId,
    amount:diff,
    note:`🔧 Admin edit: ${team.name} ₹${num(oldBal)} → ₹${num(newBal)} (${note})`,
    type:'admin',time:Date.now()
  });
  state.modal=null;stateChanged();
  toast(`${team.name} balance updated to ₹${num(newBal)}`,'success');
};

window.openAdminBankruptcyFix=()=>{
  const bad=state.transactions.filter(t=>t.type==='bankruptcy'&&t.amount===0);
  if(!bad.length){toast('No bankruptcy transactions with missing amounts found ✓','success');return;}
  toast(`Found ${bad.length} bankruptcy log(s) with amount=0. These are legacy entries and cannot be auto-fixed (team no longer exists). They are display-only issues.`,'amber');
};
window.openAdminNegativeGuard=()=>{
  toast('Negative input guard is always active in this version — all credit/debit inputs require a positive amount ✓','success');
};

function onFab(){
  if(state.activeTab==='teams'){state.modal={type:'addTeam'};render();}
  else if(state.activeTab==='properties'){state.modal={type:'addProp'};render();}
}

// ── UTILITIES ──
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function num(n){return(n||0).toLocaleString('en-IN');}
function formatTime(ts){
  const diff=Date.now()-ts;
  if(diff<60000)return'Just now';
  if(diff<3600000)return Math.floor(diff/60000)+'m ago';
  if(diff<86400000)return Math.floor(diff/3600000)+'h ago';
  return new Date(ts).toLocaleDateString('en-IN',{day:'numeric',month:'short'});
}
function toast(msg,type=''){
  const el=document.createElement('div');
  el.className='toast'+(type?' '+type:'');el.textContent=msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(()=>el.remove(),3000);
}
</script>
</body>
